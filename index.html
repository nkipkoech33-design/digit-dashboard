<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digit Analyzer – 10k Window, Exact Match</title>
  <style>
    :root {
      --bg: #0f172a; --surface: #1e293b; --border: #1e293b; --text: white;
      --text-secondary: #94a3b8; --accent: #facc15; --good: #4ade80; --bad: #f87171;
      --highlight: #38bdf8;
    }
    body.light {
      --bg: #f8fafc; --surface: #e2e8f0; --border: #cbd5e1; --text: #0f172a;
      --text-secondary: #475569; --good: #16a34a; --bad: #dc2626;
    }
    body { background: var(--bg); color: var(--text); font-family: Arial; margin: 0; padding: 10px; padding-top: 140px; }
    .controls {
      position: fixed; top: 0; left: 0; right: 0; background: var(--surface);
      padding: 10px; border-bottom: 2px solid var(--accent); z-index: 10;
      display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
    }
    .window-selector {
      background: var(--border); border-radius: 12px; padding: 8px 15px;
      display: flex; align-items: center; gap: 10px; font-weight: bold;
    }
    .window-selector input[type=range] { width: 220px; }
    .window-selector output { font-size: 1.2em; color: var(--accent); min-width: 60px; }
    .market { border: 1px solid var(--border); padding: 6px; border-radius: 6px; background: var(--bg); margin-bottom: 8px; }
    .price { text-align: center; font-size: 22px; color: var(--highlight); font-weight: bold; }
    .win { text-align: center; font-size: 12px; margin-top: 2px; }
    .progress { font-size: 11px; color: var(--text-secondary); margin: 4px 0; }
    .grid { display: grid; grid-template-columns: repeat(5, 2.5cm); gap: 10px; justify-content: center; margin-top: 8px; }
    .box { width: 2.5cm; height: 2.5cm; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); }
    .most { background: green; } .second { background: blue; } .secondLeast { background: orange; } .least { background: red; }
    .digit { font-size: 48px; font-weight: bold; }
    .percent { font-size: 13px; }
    .tick { display: grid; grid-template-columns: repeat(50, 1fr); font-size: 10px; margin-top: 8px; text-align: center; }
    .e { color: lime; } .o { color: red; }
    .even-bar-container, .odd-bar-container { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
    .even-bar-rail, .odd-bar-rail { flex: 1; height: 8px; background: var(--border); border-radius: 10px; overflow: hidden; }
    .even-bar-fill { height: 100%; background: var(--good); width: 0%; transition: width 0.2s; }
    .odd-bar-fill  { height: 100%; background: var(--bad); width: 0%; transition: width 0.2s; }
    .bar-label { font-size: 11px; font-weight: bold; min-width: 30px; color: var(--text-secondary); }
    .bar-pct { font-size: 10px; min-width: 40px; text-align: right; color: var(--text-secondary); }
    .small-control { display: flex; align-items: center; gap: 5px; font-size: 12px; }
    .apply-btn { padding: 6px 14px; border-radius: 8px; background: var(--accent); color: #000; font-weight: bold; cursor: pointer; border: none; }
    @media(max-width:600px) { .grid { grid-template-columns: repeat(5, 1fr); } .box { width: auto; } }
  </style>
</head>
<body>
<div class="controls">
  <div class="window-selector">
    <span>🕒 Tick Window:</span>
    <input type="range" id="windowSlider" min="100" max="10000" value="10000" step="100">
    <output id="windowValue">10000</output>
    <button class="apply-btn" id="applyBtn">Apply</button>
  </div>
  <div class="small-control">
    <span>🔍 Analysis bars:</span>
    <input type="range" id="analysisSlider" min="10" max="1000" value="100" step="10">
    <span id="analysisValue">100</span>
  </div>
  <button id="refreshBtn">🔄 Re‑Sync</button>
  <button id="themeToggle">🌓 Theme</button>
</div>

<div id="markets"></div>

<script>
  (function() {
    const TOKEN = "PUT_TOKEN_HERE";  // ⚠️ Replace with your Deriv token
    const MARKETS = [
      {sym:"R_10",name:"Volatility 10"},{sym:"R_25",name:"Volatility 25"},{sym:"R_50",name:"Volatility 50"},
      {sym:"R_75",name:"Volatility 75"},{sym:"R_100",name:"Volatility 100"},
      {sym:"1HZ10V",name:"Volatility 10 (1s)"},{sym:"1HZ15V",name:"Volatility 15 (1s)"},{sym:"1HZ25V",name:"Volatility 25 (1s)"},
      {sym:"1HZ30V",name:"Volatility 30 (1s)"},{sym:"1HZ50V",name:"Volatility 50 (1s)"},{sym:"1HZ75V",name:"Volatility 75 (1s)"},
      {sym:"1HZ90V",name:"Volatility 90 (1s)"},{sym:"1HZ100V",name:"Volatility 100 (1s)"},
      {sym:"JD10",name:"Jump 10"},{sym:"JD25",name:"Jump 25"},{sym:"JD50",name:"Jump 50"},
      {sym:"JD75",name:"Jump 75"},{sym:"JD100",name:"Jump 100"}
    ];

    let windowSize = 10000;          // start with 10k
    let analysisTicks = 100;         // even/odd bars
    let store = {};                  // digits per market
    let priceStore = {};             // last formatted price
    let ready = {};                  // true once store.length >= windowSize
    let ws = null;

    // ---- UI ----
    const windowSlider = document.getElementById('windowSlider');
    const windowValue = document.getElementById('windowValue');
    const applyBtn = document.getElementById('applyBtn');
    const analysisSlider = document.getElementById('analysisSlider');
    const analysisValue = document.getElementById('analysisValue');

    applyBtn.addEventListener('click', () => {
      windowSize = parseInt(windowSlider.value);
      windowValue.textContent = windowSize;
      resetAndFetch();
    });

    windowSlider.addEventListener('input', () => {
      windowValue.textContent = windowSlider.value;
    });

    analysisSlider.addEventListener('input', () => {
      analysisTicks = parseInt(analysisSlider.value);
      analysisValue.textContent = analysisTicks;
      refreshAllBars();
    });

    document.getElementById('refreshBtn').addEventListener('click', resetAndFetch);
    document.getElementById('themeToggle').addEventListener('click', () => document.body.classList.toggle('light'));

    function resetAndFetch() {
      if (ws) ws.close();
      MARKETS.forEach(m => {
        store[m.sym] = [];
        priceStore[m.sym] = '—';
        ready[m.sym] = false;
      });
      connect();
    }

    function connect() {
      ws = new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");
      ws.onopen = () => {
        ws.send(JSON.stringify({authorize: TOKEN}));
        MARKETS.forEach(m => {
          // Fetch the first 5000 ticks
          ws.send(JSON.stringify({ticks_history: m.sym, count: 5000, end: "latest", style: "ticks"}));
        });
        // After a short delay, fetch another 5000 (total 10k) – this avoids hitting limits
        setTimeout(() => {
          MARKETS.forEach(m => {
            ws.send(JSON.stringify({ticks_history: m.sym, count: 5000, end: "latest", style: "ticks"}));
            // Subscribe to live ticks
            ws.send(JSON.stringify({ticks: m.sym, subscribe: 1}));
          });
        }, 2000);
      };

      ws.onmessage = (msg) => {
        const data = JSON.parse(msg.data);
        if (data.history) {
          const sym = data.echo_req.ticks_history;
          const prices = data.history.prices;
          const digits = prices.map(p => {
            const formatted = parseFloat(p).toFixed(2);
            return parseInt(formatted.slice(-1));
          });
          // Merge with existing data, then keep last 12000
          if (!store[sym]) store[sym] = [];
          store[sym] = store[sym].concat(digits).slice(-12000);
          // Update price from last history price
          priceStore[sym] = prices.length ? parseFloat(prices[prices.length-1]).toFixed(2) : '—';
          updateReady(sym);
          renderMarket(sym);
        }

        if (data.tick) {
          const sym = data.tick.symbol;
          const quote = parseFloat(data.tick.quote);
          const formatted = quote.toFixed(data.tick.pip_size || 2);
          const digit = parseInt(formatted.slice(-1));

          if (!store[sym]) store[sym] = [];
          store[sym].push(digit);
          // keep at most 12000 to avoid over‑growth
          if (store[sym].length > 12000) store[sym] = store[sym].slice(-12000);
          priceStore[sym] = formatted;

          updateReady(sym);
          renderMarket(sym);
        }

        if (data.error) console.warn('WS error:', data.error);
      };

      ws.onclose = () => console.log('WS closed');
    }

    function updateReady(sym) {
      ready[sym] = store[sym] && store[sym].length >= windowSize;
    }

    function renderMarket(sym) {
      const mkt = MARKETS.find(m => m.sym === sym);
      let container = document.getElementById(`mkt-${sym}`);
      if (!container) {
        container = document.createElement('div');
        container.id = `mkt-${sym}`;
        container.className = 'market';
        document.getElementById('markets').appendChild(container);
      }

      if (!ready[sym]) {
        const have = store[sym] ? store[sym].length : 0;
        const pct = windowSize ? Math.min(100, Math.floor(have / windowSize * 100)) : 0;
        container.innerHTML = `<b>${mkt.name}</b><div class="price">⌛ Loading…</div><div class="progress">Fetched ${have} / ${windowSize} ticks (${pct}%)</div>`;
        return;
      }

      const full = store[sym];
      const windowData = full.slice(-windowSize);   // last exactly windowSize
      const total = windowData.length;
      const counts = new Array(10).fill(0);
      windowData.forEach(d => counts[d]++);

      const perc = counts.map(c => ((c / total) * 100).toFixed(1));
      const evenCount = counts[0]+counts[2]+counts[4]+counts[6]+counts[8];
      const evenPct = ((evenCount / total) * 100).toFixed(1);
      const oddPct = (((total - evenCount) / total) * 100).toFixed(1);

      const sorted = counts.map((v,i) => ({v,i})).sort((a,b) => b.v - a.v);
      const most = sorted[0].i, second = sorted[1].i, secondLeast = sorted[8].i, least = sorted[9].i;

      function box(i) {
        let cls = '';
        if (i === most) cls = 'most';
        else if (i === second) cls = 'second';
        else if (i === least) cls = 'least';
        else if (i === secondLeast) cls = 'secondLeast';
        return `<div class="box ${cls}"><div class="digit">${i}</div><div class="percent">${perc[i]}%</div></div>`;
      }

      // Even/odd bars for analysis window
      const aTotal = Math.min(analysisTicks, total);
      const aSlice = windowData.slice(-aTotal);
      const aEvens = aSlice.filter(d => d % 2 === 0).length;
      const aOdds = aTotal - aEvens;
      const aEvenPct = ((aEvens / aTotal) * 100).toFixed(1);
      const aOddPct = ((aOdds / aTotal) * 100).toFixed(1);

      const lastPrice = priceStore[sym] || '—';

      container.innerHTML = `
        <b>${mkt.name}</b>
        <div class="price">${lastPrice}</div>
        <div class="win">🎲 EVEN ${evenPct}% | ODD ${oddPct}% (last ${windowSize})</div>
        <div class="even-bar-container">
          <span class="bar-label" style="color:var(--good);">EVEN</span>
          <div class="even-bar-rail"><div class="even-bar-fill" style="width:${aEvenPct}%;"></div></div>
          <span class="bar-pct">${aEvenPct}%</span>
        </div>
        <div class="odd-bar-container">
          <span class="bar-label" style="color:var(--bad);">ODD</span>
          <div class="odd-bar-rail"><div class="odd-bar-fill" style="width:${aOddPct}%;"></div></div>
          <span class="bar-pct">${aOddPct}%</span>
        </div>
        <div class="grid">${[0,2,4,6,8].map(box).join('')}</div>
        <div class="grid">${[1,3,5,7,9].map(box).join('')}</div>
        <div class="tick">${windowData.slice(-50).map(d => `<span class="${d%2===0?'e':'o'}">${d%2===0?'E':'O'}</span>`).join('')}</div>
      `;
    }

    function refreshAllBars() {
      MARKETS.forEach(m => renderMarket(m.sym));
    }

    // Start
    resetAndFetch();
  })();
</script>
</body>
</html>

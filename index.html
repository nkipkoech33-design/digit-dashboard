<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Digit Analyzer FIXED</title>

<style>
body{background:#0f172a;color:white;font-family:Arial;margin:0;}
.wrapper{display:flex;}

.left{width:70%;padding:10px;display:flex;flex-direction:column;gap:8px;}
.right{width:30%;border-left:1px solid #1e293b;padding:10px;}

.market{border:1px solid #1e293b;padding:6px;border-radius:6px;cursor:pointer;}
.market.active{border:2px solid yellow;}

/* 🔥 BLINK */
.signal{
animation:blink 0.6s infinite;
border:2px solid yellow;
}
@keyframes blink{
0%{opacity:1;}
50%{opacity:0.4;}
100%{opacity:1;}
}

.signal-text{
text-align:center;
font-weight:bold;
margin:4px 0;
}
.buy-even{color:lime;}
.buy-odd{color:red;}

/* PRICE */
.price{
color:#38bdf8;
font-size:22px;
font-weight:bold;
text-align:center;
margin-bottom:5px;
}

.win{font-size:12px;text-align:center;}

.grid{
display:grid;
grid-template-columns:repeat(5, 2.5cm);
gap:10px;
margin-top:10px;
justify-content:center;
}

.box{
width:2.5cm;
height:2.5cm;
border-radius:6px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:relative;
border:1px solid #1e293b;
}

.most{background:green;}
.second{background:blue;}
.secondLeast{background:orange;}
.least{background:red;}

.digit{font-size:48px;font-weight:bold;}
.percent{font-size:13px;}

.pointer{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:42px;
font-weight:bold;
text-shadow:0 0 10px black, 0 0 15px black;
animation:pulsePointer 0.6s infinite;
}
.pointer.even{color:lime;}
.pointer.odd{color:red;}

@keyframes pulsePointer{
0%{transform:translate(-50%,-50%) scale(1);}
50%{transform:translate(-50%,-50%) scale(1.25);}
100%{transform:translate(-50%,-50%) scale(1);}
}

.flash{animation:flashBox 0.25s;}
@keyframes flashBox{
0%{box-shadow:0 0 25px white;}
100%{box-shadow:none;}
}

.repeat{animation:pulse 0.4s infinite;box-shadow:0 0 20px yellow;}
.repeat-count{position:absolute;top:4px;right:6px;color:yellow;font-weight:bold;}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

.tick{
display:grid;
grid-template-columns:repeat(50,1fr);
margin-top:10px;
font-size:10px;
justify-content:center;
}
.e{color:lime;}
.o{color:red;}
</style>
</head>

<body>

<div class="wrapper">
<div class="left" id="markets"></div>
<div class="right"></div>
</div>

<script>

let token="PUT_TOKEN_HERE";

const markets=[
{sym:"R_10",name:"Volatility 10 Index"},
{sym:"R_25",name:"Volatility 25 Index"},
{sym:"R_50",name:"Volatility 50 Index"},
{sym:"R_75",name:"Volatility 75 Index"},
{sym:"R_100",name:"Volatility 100 Index"},
{sym:"1HZ10V",name:"Volatility 10 (1s)"},
{sym:"1HZ15V",name:"Volatility 15 (1s)"},
{sym:"1HZ25V",name:"Volatility 25 (1s)"},
{sym:"1HZ30V",name:"Volatility 30 (1s)"},
{sym:"1HZ50V",name:"Volatility 50 (1s)"},
{sym:"1HZ75V",name:"Volatility 75 (1s)"},
{sym:"1HZ90V",name:"Volatility 90 (1s)"},
{sym:"1HZ100V",name:"Volatility 100 (1s)"},
{sym:"JD10",name:"Jump 10 Index"},
{sym:"JD25",name:"Jump 25 Index"},
{sym:"JD50",name:"Jump 50 Index"},
{sym:"JD75",name:"Jump 75 Index"},
{sym:"JD100",name:"Jump 100 Index"}
];

let ws=new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");

let store={},priceMap={},pipMap={},historyLoaded={},lastDigitMap={};

let audio=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

ws.onopen=()=>{
ws.send(JSON.stringify({authorize:token}));

markets.forEach(m=>{
store[m.sym]=[];
historyLoaded[m.sym]=false;

ws.send(JSON.stringify({
ticks_history:m.sym,count:1000,end:"latest",style:"ticks"
}));

ws.send(JSON.stringify({ticks:m.sym,subscribe:1}));
});
};

ws.onmessage=(msg)=>{
let d=JSON.parse(msg.data);

if(d.history){
let s=d.echo_req.ticks_history;
let pip=pipMap[s]||2;

store[s]=d.history.prices.map(p=>{
let f=parseFloat(p).toFixed(pip);
return parseInt(f.slice(-1));
});

historyLoaded[s]=true;
}

if(d.tick){
let s=d.tick.symbol;
pipMap[s]=d.tick.pip_size;

let price=parseFloat(d.tick.quote).toFixed(pipMap[s]);
let digit=parseInt(price.slice(-1));

priceMap[s]=price;
lastDigitMap[s]=digit;

if(!historyLoaded[s]) return;

store[s].push(digit);
if(store[s].length>1000) store[s].shift();

render();
}
};

function render(){

let wrap=document.getElementById("markets");
wrap.innerHTML="";

/* SORT MARKETS (SIGNALS FIRST) */
let sorted=[...markets].sort((a,b)=>{
return (checkSignal(b.sym)?1:0)-(checkSignal(a.sym)?1:0);
});

sorted.forEach(m=>{

let arr=store[m.sym];
if(!arr || arr.length<1000) return;

let counts=Array(10).fill(0);
arr.forEach(d=>counts[d]++);

let total=arr.length;

let evenDigits=[0,2,4,6,8];
let oddDigits=[1,3,5,7,9];

let evenSum=evenDigits.reduce((s,i)=>s+counts[i],0);
let oddSum=oddDigits.reduce((s,i)=>s+counts[i],0);

let evenPerc=(evenSum/total)*100;
let oddPerc=(oddSum/total)*100;

/* SIGNAL LOGIC */
let signal="";
let isSignal=false;

if(evenPerc>oddPerc && oddDigits.every(i=>(counts[i]/total)*100<10)){
signal="BUY EVEN"; isSignal=true;
}
else if(oddPerc>evenPerc && evenDigits.every(i=>(counts[i]/total)*100<10)){
signal="BUY ODD"; isSignal=true;
}

/* ALARM */
if(isSignal){ audio.play(); }

let div=document.createElement("div");
div.className="market "+(isSignal?"signal":"");

div.innerHTML=`
<b>${m.name}</b>
<div class="price">${priceMap[m.sym]}</div>

${isSignal?`<div class="signal-text ${signal==='BUY EVEN'?'buy-even':'buy-odd'}">${signal}</div>`:""}

<div class="tick">${arr.slice(-50).map(d=>`<span class="${d%2==0?'e':'o'}">${d%2==0?'E':'O'}</span>`).join("")}</div>
`;

wrap.appendChild(div);

});
}

function checkSignal(sym){
let arr=store[sym];
if(!arr || arr.length<1000) return false;

let counts=Array(10).fill(0);
arr.forEach(d=>counts[d]++);

let total=arr.length;

let even=[0,2,4,6,8];
let odd=[1,3,5,7,9];

let evenSum=even.reduce((s,i)=>s+counts[i],0);
let oddSum=odd.reduce((s,i)=>s+counts[i],0);

let evenPerc=(evenSum/total)*100;
let oddPerc=(oddSum/total)*100;

if(evenPerc>oddPerc && odd.every(i=>(counts[i]/total)*100<10)) return true;
if(oddPerc>evenPerc && even.every(i=>(counts[i]/total)*100<10)) return true;

return false;
}

</script>

</body>
</html>

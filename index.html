<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Deriv Pro Analyzer – BEAST MODE (FULL)</title>
<style>
  /* ===== COMPLETE STYLES (same as before, compact but functional) ===== */
  :root {
    --bg-body: #0b1120;
    --bg-card: #111827;
    --bg-header: #1e293b;
    --bg-panel: #0a0f1c;
    --bg-digit: #1e293b;
    --border-color: #2d3a4e;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --price-color: #facc15;
    --status-green-bg: #0a2f1a;
    --status-red-bg: #450a0a;
    --signal-bg: #2e1e3e;
    --signal-strong-bg: #3b0f3b;
    --strength-meter-bg: #334155;
    --strength-fill: #4ade80;
    --btn-bg: #3b82f6;
    --btn-hover: #2563eb;
    --warning-bg: #2d1a0a;
    --ruler-under-bg: #1e3a1e;
    --ruler-over-bg: #3b1e0a;
    --ruler-marker: #facc15;
    --last50-font-size: 1.3rem;
    --trade-active: #10b981;
    --signal-glow-green: 0 0 8px #4ade80;
    --signal-glow-red: 0 0 8px #f87171;
  }
  body.light {
    --bg-body: #f8fafc;
    --bg-card: #ffffff;
    --bg-header: #e2e8f0;
    --bg-panel: #f1f5f9;
    --bg-digit: #ffffff;
    --border-color: #cbd5e1;
    --text-primary: #0f172a;
    --text-secondary: #475569;
    --price-color: #0f172a;
    --status-green-bg: #dcfce7;
    --status-red-bg: #fee2e2;
    --signal-bg: #dbeafe;
    --signal-strong-bg: #bfdbfe;
    --strength-meter-bg: #cbd5e1;
    --strength-fill: #15803d;
    --btn-bg: #2563eb;
    --btn-hover: #1d4ed8;
    --warning-bg: #fef9c3;
    --ruler-under-bg: #bbf7d0;
    --ruler-over-bg: #fed7aa;
    --ruler-marker: #0f172a;
    --last50-font-size: 1.3rem;
    --trade-active: #059669;
    --signal-glow-green: 0 0 8px #15803d;
    --signal-glow-red: 0 0 8px #b91c1c;
  }
  * { box-sizing: border-box; transition: background 0.2s, color 0.2s; }
  body {
    font-family: 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-body);
    color: var(--text-primary);
    margin: 0;
    padding: 1rem;
    height: 100vh;
    overflow: hidden;
  }
  .container {
    max-width: 1800px;
    margin: 0 auto;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 0.5rem;
    flex-shrink: 0;
  }
  .global-trade-selector { display: flex; gap: 0.5rem; background: var(--bg-header); padding: 0.3rem 0.8rem; border-radius: 2rem; }
  .global-trade-btn { background: none; border: none; font-size: 1rem; padding: 0.3rem 0.8rem; border-radius: 1.5rem; cursor: pointer; opacity: 0.6; font-weight: bold; color: var(--text-primary); }
  .global-trade-btn.active { opacity: 1; background: var(--trade-active); box-shadow: 0 0 4px currentColor; }
  .status-bar { background: var(--bg-header); padding: 0.3rem 1rem; border-radius: 2rem; display: inline-block; font-size: 0.8rem; margin-bottom: 0.5rem; flex-shrink: 0; }
  .mode-toggle { background: var(--btn-bg); border: none; padding: 0.3rem 0.8rem; border-radius: 2rem; color: white; cursor: pointer; font-weight: bold; }
  .controls {
    background: var(--bg-header);
    padding: 0.5rem;
    border-radius: 1rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    align-items: flex-end;
    margin-bottom: 1rem;
    flex-shrink: 0;
  }
  .input-group { flex: 1; min-width: 100px; }
  .input-group label { font-size: 0.6rem; display: block; color: var(--text-secondary); }
  .token-input, .setting-input {
    width: 100%;
    background: var(--bg-body);
    border: 1px solid var(--border-color);
    padding: 0.2rem 0.4rem;
    border-radius: 1rem;
    color: var(--text-primary);
    font-size: 0.7rem;
  }
  .setting-input { width: 70px; display: inline-block; }
  .connect-btn { background: var(--btn-bg); border: none; padding: 0.2rem 0.8rem; border-radius: 1.5rem; color: white; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
  .strong-markets-panel { background: var(--bg-header); border-radius: 0.8rem; padding: 0.3rem 0.8rem; margin-bottom: 0.8rem; border-left: 3px solid #facc15; flex-shrink: 0; }
  .strong-markets-panel h3 { font-size: 0.8rem; margin: 0 0 0.2rem 0; }
  .strong-list { display: flex; flex-wrap: wrap; gap: 0.3rem; font-size: 0.65rem; }
  .strong-item { background: var(--bg-panel); padding: 0.1rem 0.4rem; border-radius: 1rem; }
  .market-grid {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
    padding-right: 0.3rem;
  }
  .market-card {
    background: var(--bg-card);
    border-radius: 1rem;
    border: 2px solid var(--border-color);
    overflow: hidden;
  }
  .market-card.signal-active-green { border-color: #4ade80; box-shadow: var(--signal-glow-green); }
  .market-card.signal-active-red { border-color: #f87171; box-shadow: var(--signal-glow-red); }
  .market-header {
    background: var(--bg-header);
    padding: 0.4rem 0.8rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.8rem;
  }
  .market-title { font-weight: bold; display: flex; align-items: center; gap: 0.3rem; flex-wrap: wrap; }
  .live-price-big { font-size: 1.3rem; font-weight: bold; font-family: monospace; background: var(--bg-body); padding: 0 0.3rem; border-radius: 0.5rem; color: var(--price-color); }
  .live-tick-badge { background: #0f172a; font-size: 0.55rem; padding: 0.1rem 0.3rem; border-radius: 0.8rem; color: #4ade80; }
  .market-status { font-size: 0.6rem; padding: 0.1rem 0.3rem; border-radius: 0.8rem; background: var(--status-red-bg); }
  .advanced-panel {
    background: var(--bg-panel);
    margin: 0.3rem 0.6rem;
    padding: 0.2rem 0.5rem;
    border-radius: 0.8rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: space-between;
    align-items: center;
    font-size: 0.7rem;
  }
  .tick-frequency, .mtf-indicator { background: var(--bg-body); padding: 0.1rem 0.4rem; border-radius: 1rem; }
  .export-btn { background: var(--btn-bg); border: none; padding: 0.1rem 0.5rem; border-radius: 1rem; color: white; cursor: pointer; font-size: 0.65rem; }
  .strength-indicator { background: var(--bg-panel); border-radius: 1.5rem; padding: 0.1rem 0.5rem; font-size: 0.75rem; display: inline-block; margin: 0.1rem 0.8rem; }
  .digits-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; padding: 0.5rem; background: var(--bg-body); }
  .digits-grid.evenodd { display: flex; flex-direction: column; gap: 4px; }
  .digits-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
  .digit-cell { background: var(--bg-digit); border-radius: 0.5rem; padding: 0.2rem; text-align: center; position: relative; border: 1px solid var(--border-color); }
  .digit-cell span.digit { font-size: 0.9rem; font-weight: bold; display: block; }
  .digit-cell .percent { font-size: 0.55rem; color: var(--text-secondary); }
  .digit-cell .trend { font-size: 0.65rem; margin-left: 2px; }
  .pointer-marker { position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); width: 16px; height: 2px; background: #ffcc00; border-radius: 2px; }
  .most { background: #15803d; }
  .second { background: #1e40af; }
  .least { background: #b91c1c; }
  .secondleast { background: #c2410c; }
  .hot { box-shadow: 0 0 4px #facc15; }
  .cold { opacity: 0.6; }
  .info-row { display: flex; flex-wrap: wrap; gap: 0.3rem; padding: 0.3rem; background: var(--bg-body); font-size: 0.65rem; border-top: 1px solid var(--border-color); }
  .parity-stats, .overunder-stats, .streak-stats, .prediction-box { background: var(--bg-panel); padding: 0.1rem 0.3rem; border-radius: 0.8rem; }
  .letter-sequence-wrapper { padding: 0.2rem 0.5rem; background: var(--bg-body); border-bottom: 1px solid var(--border-color); }
  .letter-sequence { font-family: monospace; font-size: 0.8rem; font-weight: bold; text-align: center; background: var(--bg-panel); border-radius: 0.5rem; padding: 0.2rem; margin: 0.1rem; }
  .digit-ruler { display: flex; align-items: center; gap: 0.3rem; padding: 0.2rem 0.5rem; }
  .ruler-bar { flex: 1; height: 12px; background: linear-gradient(90deg, var(--ruler-under-bg) 0%, var(--ruler-under-bg) 55.5%, var(--ruler-over-bg) 55.6%, var(--ruler-over-bg) 100%); border-radius: 6px; position: relative; }
  .ruler-marker { position: absolute; width: 5px; height: 18px; background: var(--ruler-marker); top: -3px; border-radius: 2px; transform: translateX(-50%); }
  .signal-area, .overunder-signal-area { padding: 0.2rem; text-align: center; font-size: 0.7rem; }
  .signal-flash { background: var(--signal-bg); color: #facc15; padding: 2px 6px; border-radius: 1rem; display: inline-block; }
  .signal-strong { background: var(--signal-strong-bg); }
  .strength-meter { width: 80px; height: 4px; background: var(--strength-meter-bg); display: inline-block; margin-left: 5px; overflow: hidden; border-radius: 2px; }
  .strength-fill { height: 100%; background: var(--strength-fill); width: 0%; }
  .prediction-digit { font-size: 0.9rem; font-weight: bold; background: var(--bg-panel); padding: 0 0.2rem; border-radius: 0.4rem; }
  .digit-match-panel { background: var(--bg-panel); margin: 0.3rem; padding: 0.5rem; border-radius: 0.8rem; font-size: 0.7rem; }
  .match-controls { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
  .match-controls select, .match-controls input { background: var(--bg-digit); border: 1px solid var(--border-color); padding: 0.1rem 0.3rem; border-radius: 0.8rem; color: var(--text-primary); }
  .match-stats { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.3rem; }
  .match-prob { background: var(--bg-digit); padding: 0.1rem 0.3rem; border-radius: 0.8rem; }
  .match-best { background: #15803d; padding: 0.1rem 0.4rem; border-radius: 0.8rem; }
  .auto-pattern { background: var(--bg-body); padding: 0.3rem; margin-top: 0.3rem; border-radius: 0.6rem; text-align: center; border-left: 2px solid #facc15; }
  .entry-signal { background: var(--warning-bg); color: #b45309; padding: 0.2rem; border-radius: 0.5rem; margin: 0.2rem 0; }
  .success-stats { background: var(--bg-header); padding: 0.2rem; border-radius: 0.5rem; text-align: center; font-size: 0.7rem; margin-top: 0.2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
  .reset-btn { background: #475569; border: none; border-radius: 0.8rem; padding: 0.1rem 0.4rem; color: white; cursor: pointer; font-size: 0.6rem; }
  .hidden { display: none; }
  footer { font-size: 0.6rem; text-align: center; margin-top: 0.5rem; color: var(--text-secondary); flex-shrink: 0; }
  @media (max-width: 700px) {
    .digits-grid { gap: 2px; }
    .digit-cell span.digit { font-size: 0.7rem; }
    .live-price-big { font-size: 1rem; }
    .letter-sequence { font-size: 0.7rem; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <h1 style="font-size:1.2rem; margin:0;">⚡ DERIV PRO ANALYZER – BEAST MODE</h1>
    <div style="display: flex; gap: 0.3rem;">
      <div class="global-trade-selector">
        <button class="global-trade-btn" data-type="evenodd">🎲 Even/Odd</button>
        <button class="global-trade-btn active" data-type="overunder">📊 Over/Under</button>
        <button class="global-trade-btn" data-type="differs">🔄 Differs/Matches</button>
      </div>
      <button class="mode-toggle" onclick="toggleMode()">🌓</button>
    </div>
  </div>
  <div class="status-bar" id="connectionStatus">⚫ Disconnected</div>
  <div class="controls">
    <div class="input-group"><label>🔑 TOKEN</label><input type="password" id="token" class="token-input" placeholder="API token"></div>
    <div class="input-group"><label>EO Gap</label><input type="number" id="gapThreshold" class="setting-input" value="2"></div>
    <div class="input-group"><label>EO Min</label><input type="number" id="signalDuration" class="setting-input" value="5"></div>
    <div class="input-group"><label>OU Gap</label><input type="number" id="ouGapThreshold" class="setting-input" value="2"></div>
    <div class="input-group"><label>OU Min</label><input type="number" id="ouDuration" class="setting-input" value="5"></div>
    <div class="input-group"><label>Min Prob%</label><input type="number" id="minPatternProb" class="setting-input" value="35"></div>
    <div class="input-group"><label>Min Occ</label><input type="number" id="minOccurrences" class="setting-input" value="80"></div>
    <div class="input-group"><label>🔊</label><select id="soundEnabled" class="setting-input" style="width:50px"><option value="true">ON</option><option value="false">OFF</option></select></div>
    <div class="input-group"><label>Sig Thresh</label><input type="number" id="signalThreshold" class="setting-input" value="60"></div>
    <div class="input-group"><label>🔔 Notif</label><select id="notifEnabled" class="setting-input" style="width:50px"><option value="true">ON</option><option value="false" selected>OFF</option></select></div>
    <button onclick="connectWebSocket()" class="connect-btn">🚀 CONNECT</button>
  </div>
  <div id="strongMarketsPanel" class="strong-markets-panel hidden">
    <h3>🔥 STRONG MARKETS</h3>
    <div id="strongList" class="strong-list"></div>
  </div>
  <div id="marketsContainer" class="market-grid"></div>
  <footer>✅ BEAST MODE: Multi‑timeframe agreement (20|50|100), tick frequency, notifications, CSV export.</footer>
</div>

<script>
  // Market symbols and names
  const DECIMAL_MAP = {
    "1HZ10V":2,"1HZ15V":3,"1HZ25V":2,"1HZ30V":3,
    "1HZ50V":2,"1HZ75V":2,"1HZ90V":3,"1HZ100V":2,
    "R_10":3,"R_25":3,"R_50":4,"R_75":4,"R_100":2,
    "JD10":2,"JD25":2,"JD50":2,"JD75":2,"JD100":2
  };
  const MARKET_NAMES = {
    "1HZ10V":"Vol10 1s","1HZ15V":"Vol15 1s","1HZ25V":"Vol25 1s","1HZ30V":"Vol30 1s",
    "1HZ50V":"Vol50 1s","1HZ75V":"Vol75 1s","1HZ90V":"Vol90 1s","1HZ100V":"Vol100 1s",
    "R_10":"Vol10","R_25":"Vol25","R_50":"Vol50","R_75":"Vol75","R_100":"Vol100",
    "JD10":"J10","JD25":"J25","JD50":"J50","JD75":"J75","JD100":"J100"
  };
  const ALL_SYMBOLS = Object.keys(MARKET_NAMES);
  let marketData = {};
  let evenOddSignalExpiry = {};
  let activeEvenOddSignal = {};
  let ouSignalExpiry = {};
  let activeOUSignal = {};
  let ws = null;
  let invalidSymbols = new Set();
  let bestPattern = {};
  let pendingEntry = {};
  let successStats = {};
  let consecutiveLosses = {};
  let globalTradeType = 'overunder';
  let lastNotifiedScore = {};
  let tickTimestamps = {};

  function getSettings() {
    return {
      gapThreshold: parseInt(document.getElementById('gapThreshold').value) || 2,
      durationMin: parseInt(document.getElementById('signalDuration').value) || 5,
      minTicks: 20,
      ouGapThreshold: parseInt(document.getElementById('ouGapThreshold').value) || 2,
      ouDuration: parseInt(document.getElementById('ouDuration').value) || 5,
      minPatternProb: parseInt(document.getElementById('minPatternProb').value) || 35,
      minOccurrences: parseInt(document.getElementById('minOccurrences').value) || 80,
      soundEnabled: document.getElementById('soundEnabled').value === 'true',
      signalThreshold: parseInt(document.getElementById('signalThreshold').value) || 60,
      notifEnabled: document.getElementById('notifEnabled').value === 'true'
    };
  }

  function lastDigitFromFormatted(str) {
    let digits = str.replace(/\./g,'');
    if(digits.length===0) return 0;
    return parseInt(digits.charAt(digits.length-1),10)||0;
  }
  function formatHistoryPrice(symbol, priceNum) {
    let dec = DECIMAL_MAP[symbol] ?? 2;
    return priceNum.toFixed(dec);
  }
  function updateDigitRuler(symbol, lastDigit) {
    const rulerDiv = document.getElementById(`ruler_${symbol}`);
    if (!rulerDiv) return;
    const marker = rulerDiv.querySelector('.ruler-marker');
    if (marker) marker.style.left = `${(lastDigit/9)*100}%`;
  }

  // Pattern scan (lookahead 1-4, last 200 ticks)
  function scanBestPattern(symbol) {
    let data = marketData[symbol];
    if(!data || data.digitsArray.length < 100) return null;
    let arr = data.digitsArray;
    let settings = getSettings();
    let startIdx = Math.max(0, arr.length - 200);
    let bestProb = 0, bestEntry = null, bestLookahead = null, bestOutcome = null, bestTotal = 0;
    const lookaheads = [1,2,3,4];
    for(let entry=0; entry<=9; entry++) {
      for(let look of lookaheads) {
        let counts = new Array(10).fill(0);
        let total = 0;
        for(let i=startIdx; i<arr.length - look; i++) {
          if(arr[i] === entry) {
            let outcome = arr[i+look];
            if(outcome !== undefined) { counts[outcome]++; total++; }
          }
        }
        if(total >= settings.minOccurrences) {
          let maxCnt = Math.max(...counts);
          let outcome = counts.indexOf(maxCnt);
          let prob = (maxCnt / total) * 100;
          if(prob > bestProb && prob >= settings.minPatternProb) {
            bestProb = prob; bestEntry = entry; bestLookahead = look; bestOutcome = outcome; bestTotal = total;
          }
        }
      }
    }
    if(bestEntry !== null) return { entryDigit: bestEntry, lookahead: bestLookahead, outcomeDigit: bestOutcome, probability: bestProb.toFixed(1), occurrences: bestTotal };
    return null;
  }
  function updateAutoPattern(symbol) {
    let pattern = scanBestPattern(symbol);
    let panel = document.getElementById(`autoPattern_${symbol}`);
    if(!pattern) { if(panel) panel.innerHTML = `🤖 No pattern meets thresholds.`; return; }
    bestPattern[symbol] = pattern;
    if(panel) panel.innerHTML = `🤖 BEST: Entry ${pattern.entryDigit} → after ${pattern.lookahead} ticks → ${pattern.outcomeDigit} (${pattern.probability}%)`;
    updateStatsDisplay(symbol);
  }
  function updateStatsDisplay(symbol) {
    let stats = successStats[symbol] || { hits:0, total:0 };
    let rate = stats.total===0 ? 0 : ((stats.hits/stats.total)*100).toFixed(1);
    let statsDiv = document.getElementById(`successStats_${symbol}`);
    if(statsDiv) statsDiv.innerHTML = `<span>📊 Success: ${stats.hits}/${stats.total} (${rate}%)</span><button class="reset-btn" onclick="window.resetStats('${symbol}')">Reset</button>`;
  }
  function resetStats(symbol) {
    successStats[symbol] = { hits:0, total:0 };
    consecutiveLosses[symbol] = 0;
    updateStatsDisplay(symbol);
  }
  function checkEntrySignal(symbol, newDigit) {
    let pattern = bestPattern[symbol];
    if(!pattern) return;
    let losses = consecutiveLosses[symbol] || 0;
    if(!pendingEntry[symbol] && newDigit === pattern.entryDigit && losses >= 2) {
      pendingEntry[symbol] = { entryDigit: pattern.entryDigit, lookahead: pattern.lookahead, outcomeDigit: pattern.outcomeDigit, remainingTicks: pattern.lookahead };
      let signalDiv = document.getElementById(`entrySignal_${symbol}`);
      if(signalDiv) { signalDiv.innerHTML = `🔔 ENTRY! ${pattern.entryDigit} → expect ${pattern.outcomeDigit} in ${pattern.lookahead} ticks`; signalDiv.style.background = "#1e3a1e"; if(getSettings().soundEnabled) gentleBeep(); }
    }
    if(pendingEntry[symbol]) {
      pendingEntry[symbol].remainingTicks--;
      let pending = pendingEntry[symbol];
      if(pending.remainingTicks === 0) {
        let actualDigit = newDigit;
        if(!successStats[symbol]) successStats[symbol] = { hits:0, total:0 };
        successStats[symbol].total++;
        if(actualDigit === pending.outcomeDigit) {
          successStats[symbol].hits++;
          consecutiveLosses[symbol] = 0;
          let outcomeDiv = document.getElementById(`entrySignal_${symbol}`);
          if(outcomeDiv) { outcomeDiv.innerHTML = `✅ HIT! ${pending.entryDigit} → ${pending.outcomeDigit}`; outcomeDiv.style.background = "#0a2f1a"; if(getSettings().soundEnabled) gentleBeep(); }
        } else {
          consecutiveLosses[symbol] = (consecutiveLosses[symbol] || 0) + 1;
          let outcomeDiv = document.getElementById(`entrySignal_${symbol}`);
          if(outcomeDiv) { outcomeDiv.innerHTML = `❌ MISS: expected ${pending.outcomeDigit} got ${actualDigit}`; outcomeDiv.style.background = "#2d0a0a"; }
        }
        updateStatsDisplay(symbol);
        setTimeout(() => { let div = document.getElementById(`entrySignal_${symbol}`); if(div) div.innerHTML = ''; }, 4000);
        delete pendingEntry[symbol];
      }
    }
  }

  // Multi-timeframe agreement
  function getMultiTimeframeAgreement(symbol, last50) {
    let data = marketData[symbol];
    if (!data || data.digitsArray.length < 100) return { agree: false, direction: null, tfs: {} };
    let arr = data.digitsArray;
    let tf20 = arr.slice(-20), tf50 = arr.slice(-50), tf100 = arr.slice(-100);
    let getDir = (ticks) => {
      if (globalTradeType === 'evenodd') {
        let even = ticks.filter(d=>d%2===0).length, odd = ticks.length-even;
        return even > odd ? 'EVEN' : (odd > even ? 'ODD' : null);
      } else {
        let over = ticks.filter(d=>d>=5).length, under = ticks.length-over;
        return over > under ? 'OVER' : (under > over ? 'UNDER' : null);
      }
    };
    let d20 = getDir(tf20), d50 = getDir(tf50), d100 = getDir(tf100);
    let agree = (d20 && d20 === d50 && d50 === d100);
    return { agree, direction: d20, tfs: {20:d20,50:d50,100:d100} };
  }

  function updateTickFrequency(symbol) {
    let now = Date.now();
    if (!tickTimestamps[symbol]) tickTimestamps[symbol] = [];
    tickTimestamps[symbol].push(now);
    tickTimestamps[symbol] = tickTimestamps[symbol].filter(ts => now - ts <= 10000);
    let freq = tickTimestamps[symbol].length;
    let freqDiv = document.getElementById(`tickFreq_${symbol}`);
    if (freqDiv) freqDiv.innerText = `⚡ ${freq} ticks/10s`;
  }

  function exportCSV(symbol) {
    let data = marketData[symbol];
    if (!data || !data.digitsArray.length) return;
    let digits = data.digitsArray.slice(-200);
    let csv = "data:text/csv;charset=utf-8,Tick Index,Digit\n" + digits.map((d,i)=>`${i+1},${d}`).join("\n");
    let link = document.createElement('a');
    link.setAttribute('href', encodeURI(csv));
    link.setAttribute('download', `${symbol}_digits.csv`);
    document.body.appendChild(link); link.click(); document.body.removeChild(link);
  }

  function computeSignalScore(symbol, last50) {
    if (!last50 || last50.length < 20) return 0;
    let settings = getSettings();
    let evenCnt = last50.filter(d=>d%2===0).length, oddCnt = last50.length-evenCnt;
    let overCnt = last50.filter(d=>d>=5).length, underCnt = last50.length-overCnt;
    let eoGap = Math.abs(evenCnt-oddCnt), ouGap = Math.abs(overCnt-underCnt);
    let eoScore = (eoGap <= settings.gapThreshold) ? Math.min(50, Math.floor(50*(1-(eoGap-1)/(settings.gapThreshold+1)))) : 0;
    let ouScore = (ouGap <= settings.ouGapThreshold) ? Math.min(50, Math.floor(50*(1-(ouGap-1)/(settings.ouGapThreshold+1)))) : 0;
    let patternScore = 0;
    let pattern = bestPattern[symbol];
    if (pattern && pattern.probability) patternScore = Math.min(40, Math.floor(parseFloat(pattern.probability)*0.8));
    return Math.min(100, eoScore+ouScore+patternScore);
  }

  function processTick(symbol, priceNumeric, quoteDisplay=null) {
    if(!marketData[symbol]) marketData[symbol] = { digitsArray:[], digitCounts:new Array(10).fill(0), last50Array:[], lastDigit:null, lastPriceDisplay:"—" };
    let data = marketData[symbol];
    let displayStr = (quoteDisplay !== null) ? String(quoteDisplay) : formatHistoryPrice(symbol, priceNumeric);
    data.lastPriceDisplay = displayStr;
    let digit = lastDigitFromFormatted(displayStr);
    data.lastDigit = digit;
    data.digitsArray.push(digit);
    data.digitCounts[digit]++;
    if(data.digitsArray.length>1000) { let removed = data.digitsArray.shift(); data.digitCounts[removed]--; }
    data.last50Array.push(digit);
    if(data.last50Array.length>50) data.last50Array.shift();
    updateTickFrequency(symbol);
    checkEntrySignal(symbol, digit);
    updateDigitRuler(symbol, digit);
    renderMarket(symbol);
  }

  function updateEvenOddSignal(symbol, last50, now, settings) {
    let evenCnt = last50.filter(d=>d%2===0).length, oddCnt = last50.length-evenCnt, gap = Math.abs(evenCnt-oddCnt);

    let signalDiv = document.getElementById(`evenOddSignal_${symbol}`);
    if(!signalDiv) return;
    let strength = (last50.length >= settings.minTicks && gap <= settings.gapThreshold) ? Math.min(100, Math.floor(100*(1-(gap-1)/(settings.gapThreshold+1)) + (last50.length/100)*20)) : 0;
    if(!isActive && last50.length >= settings.minTicks && gap <= settings.gapThreshold) {
      let predicted = evenCnt > oddCnt ? "ODD 🔴" : "EVEN 🟢";
      evenOddSignalExpiry[symbol] = now + settings.durationMin*60000;
      activeEvenOddSignal[symbol] = predicted;
      signalDiv.innerHTML = `<div class="signal-flash signal-strong">🎲 ${predicted} SIGNAL (${settings.durationMin}min) <div class="strength-meter"><div class="strength-fill" style="width:${strength}%"></div></div></div>`;
      if(settings.soundEnabled) gentleBeep();
    } else if(isActive) {

      let mins = Math.floor(remaining/60), secs = remaining%60;

    } else {
      signalDiv.innerHTML = `<span class="no-signal">⚡ no even/odd signal (gap ${gap} > ${settings.gapThreshold} or ticks ${last50.length}/${settings.minTicks})</span>`;
    }
  }

  function getRankSet(data, rank) {
    let digitCounts = data.digitCounts.map((cnt,idx)=>({digit:idx,count:cnt}));
    let sorted = [...digitCounts].sort((a,b)=>b.count-a.count);
    if(rank==='most') { let max=sorted[0].count; return new Set(sorted.filter(i=>i.count===max).map(i=>i.digit)); }
    else if(rank==='second') { let max=sorted[0].count, second=null; for(let i of sorted) if(i.count!==max) { second=i.count; break; } if(second===null) return new Set(); return new Set(sorted.filter(i=>i.count===second).map(i=>i.digit)); }
    else if(rank==='least') { let min=sorted[sorted.length-1].count; return new Set(sorted.filter(i=>i.count===min).map(i=>i.digit)); }
    else if(rank==='secondleast') { let min=sorted[sorted.length-1].count, secondMin=null; for(let i=sorted.length-2;i>=0;i--) if(sorted[i].count!==min) { secondMin=sorted[i].count; break; } if(secondMin===null) return new Set(); return new Set(sorted.filter(i=>i.count===secondMin).map(i=>i.digit)); }
    return new Set();
  }
  function getHotColdDigits(data) {
    let total = data.digitCounts.reduce((a,b)=>a+b,0);
    if(total===0) return {hot:new Set(), cold:new Set()};
    let pct = data.digitCounts.map(c=>c/total);
    let sorted = pct.map((p,i)=>({dig:i,p})).sort((a,b)=>b.p-a.p);
    return {hot:new Set(sorted.slice(0,2).map(x=>x.dig)), cold:new Set(sorted.slice(-2).map(x=>x.dig))};
  }
  function calculateTrends(data) {
    let trends={};
    let totalOverall = data.digitCounts.reduce((a,b)=>a+b,0);
    if(totalOverall===0) return trends;
    let overallPct = data.digitCounts.map(c=>c/totalOverall);
    let last50 = data.last50Array;
    if(last50.length<20) return trends;
    let last50Counts = new Array(10).fill(0);
    last50.forEach(d=>last50Counts[d]++);
    let last50Total = last50.length;
    for(let d=0;d<10;d++) {
      let pctLast50 = last50Counts[d]/last50Total;
      let pctOverall = overallPct[d];
      let diff = pctLast50 - pctOverall;
      trends[d] = Math.abs(diff) > 0.02 ? (diff > 0 ? '↑' : '↓') : '→';
    }
    return trends;
  }
  function predictNextDigit(last50Array) {
    if(last50Array.length<10) return {digit:null,prob:0};
    let weights = new Array(10).fill(0);
    for(let i=0;i<last50Array.length;i++) {
      let digit = last50Array[i];
      let weight = (i>=last50Array.length-10) ? 3 : 1;
      weights[digit] += weight;
    }
    let totalW = weights.reduce((a,b)=>a+b,0);
    let maxW = 0, best=null;
    for(let d=0;d<10;d++) if(weights[d]>maxW) { maxW=weights[d]; best=d; }
    let prob = totalW>0 ? (maxW/totalW*100).toFixed(1) : 0;
    return {digit:best, prob:prob};
  }

  function createDigitCell(digit, pct, trend, isLast, isMost, isSecond, isLeast, isSecondLeast, isHot, isCold) {
    let cell = document.createElement('div');
    cell.className = 'digit-cell';
    if(isMost) cell.classList.add('most');
    else if(isSecond) cell.classList.add('second');
    else if(isLeast) cell.classList.add('least');
    else if(isSecondLeast) cell.classList.add('secondleast');
    if(isHot) cell.classList.add('hot');
    if(isCold) cell.classList.add('cold');
    cell.innerHTML = `<span class="digit">${digit}</span><div class="percent">${pct}%</div>`;
    if(trend && trend!=='→') { let trendSpan = document.createElement('span'); trendSpan.className='trend'; trendSpan.innerText=trend; cell.appendChild(trendSpan); }
    else if(trend==='→') { let trendSpan = document.createElement('span'); trendSpan.className='trend'; trendSpan.innerText='→'; cell.appendChild(trendSpan); }
    if(isLast) { let ptr = document.createElement('div'); ptr.className='pointer-marker'; cell.appendChild(ptr); }
    return cell;
  }

  function rebuildDigitGrid(symbol) {
    let data = marketData[symbol];
    if(!data) return;
    let total = data.digitCounts.reduce((a,b)=>a+b,0);
    if(total===0) return;
    let pct = data.digitCounts.map(c=>((c/total)*100).toFixed(2));
    let trends = calculateTrends(data);
    let hotSet = getHotColdDigits(data).hot, coldSet = getHotColdDigits(data).cold;
    let mostSet = getRankSet(data,'most'), secondSet=getRankSet(data,'second'), leastSet=getRankSet(data,'least'), secondLeastSet=getRankSet(data,'secondleast');
    let lastDigit = data.lastDigit;
    let container = document.getElementById(`digitsContainer_${symbol}`);
    if(!container) return;
    if(globalTradeType==='evenodd') {
      let evens=[0,2,4,6,8], odds=[1,3,5,7,9];
      container.className='digits-grid evenodd';
      container.innerHTML='';
      let row1=document.createElement('div'); row1.className='digits-row';
      evens.forEach(d=>row1.appendChild(createDigitCell(d,pct[d],trends[d],lastDigit===d,mostSet.has(d),secondSet.has(d),leastSet.has(d),secondLeastSet.has(d),hotSet.has(d),coldSet.has(d))));
      let row2=document.createElement('div'); row2.className='digits-row';
      odds.forEach(d=>row2.appendChild(createDigitCell(d,pct[d],trends[d],lastDigit===d,mostSet.has(d),secondSet.has(d),leastSet.has(d),secondLeastSet.has(d),hotSet.has(d),coldSet.has(d))));
      container.appendChild(row1); container.appendChild(row2);
    } else {
      container.className='digits-grid';
      container.innerHTML='';
      for(let d=0;d<10;d++) container.appendChild(createDigitCell(d,pct[d],trends[d],lastDigit===d,mostSet.has(d),secondSet.has(d),leastSet.has(d),secondLeastSet.has(d),hotSet.has(d),coldSet.has(d)));
    }
  }

  function updateStrongMarkets() {
    let threshold = getSettings().signalThreshold;
    let strong = [];
    for(let sym of ALL_SYMBOLS) {
      let data = marketData[sym];
      if(!data || !data.last50Array || data.last50Array.length<20) continue;
      let score = computeSignalScore(sym, data.last50Array);
      if(score >= threshold) strong.push({sym, score, name: MARKET_NAMES[sym]});
      if(getSettings().notifEnabled && (!lastNotifiedScore[sym] || lastNotifiedScore[sym] !== score) && score >= threshold) {
        if(Notification.permission === "granted") new Notification(`Strong signal on ${MARKET_NAMES[sym]}`, {body:`Score: ${score}`});
        else if(Notification.permission !== "denied") Notification.requestPermission();
        lastNotifiedScore[sym] = score;
      }
    }
    strong.sort((a,b)=>b.score-a.score);
    let panel = document.getElementById('strongMarketsPanel');
    let listDiv = document.getElementById('strongList');
    if(strong.length) { panel.classList.remove('hidden'); listDiv.innerHTML = strong.map(s=>`<span class="strong-item">${s.name} (${s.score})</span>`).join(''); }
    else panel.classList.add('hidden');

    for(let sym of ALL_SYMBOLS) {
      let card = document.getElementById(`market_${sym}`);
      if(!card) continue;
      let data = marketData[sym];
      if(!data || !data.last50Array || data.last50Array.length<20) { card.classList.remove('signal-active-green','signal-active-red'); continue; }
      let score = computeSignalScore(sym, data.last50Array);
      if(score >= threshold) {
        let last50 = data.last50Array;
        let over=last50.filter(d=>d>=5).length, under=last50.length-over, even=last50.filter(d=>d%2===0).length, odd=last50.length-even;
        if(globalTradeType === 'overunder') {
          if(over>under) card.classList.add('signal-active-green');
          else if(under>over) card.classList.add('signal-active-red');
          else card.classList.remove('signal-active-green','signal-active-red');
        } else if(globalTradeType === 'evenodd') {
          if(even>odd) card.classList.add('signal-active-green');
          else if(odd>even) card.classList.add('signal-active-red');
          else card.classList.remove('signal-active-green','signal-active-red');
        } else card.classList.add('signal-active-green');
      } else card.classList.remove('signal-active-green','signal-active-red');
    }
  }

  function renderMarket(symbol) {
    let data = marketData[symbol];
    if(!data || data.digitsArray.length===0) return;
    let priceSpan = document.getElementById(`livePriceBig_${symbol}`);
    if(priceSpan) priceSpan.innerText = data.lastPriceDisplay;

      let ouSpan = document.getElementById(`overUnderStats_${symbol}`);
      if(ouSpan) ouSpan.innerHTML = `📈 Over 4: ${overPct}% | Under 5: ${underPct}%`;
      let streak=1, lastParity=last50[last50.length-1]%2===0?'E':'O';
      for(let i=last50.length-2;i>=0;i--) if((last50[i]%2===0?'E':'O')===lastParity) streak++; else break;
      let streakSpan = document.getElementById(`streakStats_${symbol}`);
      if(streakSpan) streakSpan.innerHTML = `📊 Streak: ${streak}x ${lastParity}`;
      let parityLetters = last50.map(d=>d%2===0?'<span style="color:#4ade80;">E</span>':'<span style="color:#f87171;">O</span>').join('');
      let ouLetters = last50.map(d=>d>=5?'<span style="color:#4ade80;">O</span>':'<span style="color:#f87171;">U</span>').join('');
      let paritySeqDiv = document.getElementById(`paritySeq_${symbol}`);
      if(paritySeqDiv) paritySeqDiv.innerHTML = parityLetters;
      let ouSeqDiv = document.getElementById(`ouSeq_${symbol}`);
      if(ouSeqDiv) ouSeqDiv.innerHTML = ouLetters;
      let prediction = predictNextDigit(last50);

      if(predSpan) predSpan.innerHTML = `🔮 Next digit: ${prediction.digit !== null ? `<span class="prediction-digit">${prediction.digit}</span> (${prediction.prob}%)` : '—'}`;
      let settings = getSettings();
      let now = Date.now();
      updateEvenOddSignal(symbol, last50, now, settings);
      updateOverUnderSignal(symbol, last50, now, settings);
      updateStrengthIndicator(symbol, last50, globalTradeType);
      let mtf = getMultiTimeframeAgreement(symbol, last50);
      let mtfDiv = document.getElementById(`mtf_${symbol}`);
      if(mtfDiv) {

      }
    }
    rebuildDigitGrid(symbol);
    updateStrongMarkets();
  }

  function manualAnalyze(symbol) {
    let entry = parseInt(document.getElementById(`match_entry_${symbol}`).value,10);
    let lookahead = parseInt(document.getElementById(`match_lookahead_${symbol}`).value,10);
    let data = marketData[symbol];
    if(!data || data.digitsArray.length===0) { document.getElementById(`match_stats_${symbol}`).innerHTML = 'Not enough data.'; return; }
    let arr = data.digitsArray;
    let counts = new Array(10).fill(0), total=0;
    for(let i=0;i<arr.length-lookahead;i++) if(arr[i]===entry) { let out=arr[i+lookahead]; if(out!==undefined) { counts[out]++; total++; } }
    if(total===0) { document.getElementById(`match_stats_${symbol}`).innerHTML = `No occurrences.`; return; }
    let probs = counts.map(c=>((c/total)*100).toFixed(1));
    let best=0, bestP=0;
    for(let d=0;d<10;d++) { let p=parseFloat(probs[d]); if(p>bestP) { bestP=p; best=d; } }
    let html = `<div>Entry ${entry} → after ${lookahead} ticks:</div>`;
    for(let d=0;d<10;d++) if(parseFloat(probs[d])>0) html += `<div class="match-prob">${d}: ${probs[d]}%</div>`;
    html += `<div class="match-best">🎯 Best: ${best} (${bestP}%)</div>`;
    document.getElementById(`match_stats_${symbol}`).innerHTML = html;
  }

  function subscribeToMarket(symbol) {

    if(invalidSymbols.has(symbol)) return;
    ws.send(JSON.stringify({ ticks_history: symbol, count: 500, end: "latest", style: "ticks" }));
    ws.send(JSON.stringify({ ticks: symbol, subscribe: 1 }));

  function handleMessage(msg) {
    if(!msg) return;
    if(msg.msg_type === 'tick' && msg.tick) {
      let sym = msg.tick.symbol;
      if(MARKET_NAMES[sym] && !invalidSymbols.has(sym)) {
        if(!marketData[sym]) processTick(sym, msg.tick.quote, msg.tick.quote_display);
        else processTick(sym, msg.tick.quote, msg.tick.quote_display);
        let statusSpan = document.getElementById(`status_${sym}`);
        if(statusSpan && statusSpan.innerText !== '🟢 live') { statusSpan.innerText = '🟢 live'; statusSpan.style.background = '#0a2f1a'; statusSpan.style.color = '#4ade80'; }
      }
      return;
    }
    if(msg.msg_type === 'history' && msg.history && msg.echo_req && msg.echo_req.ticks_history) {
      let sym = msg.echo_req.ticks_history;
      if(MARKET_NAMES[sym] && !invalidSymbols.has(sym)) {
        msg.history.prices.forEach(p => processTick(sym, p, null));
        updateAutoPattern(sym);
      }
      return;
    }
    if(msg.error && msg.error.code === 'InvalidSymbol' && msg.echo_req && msg.echo_req.ticks_history) {
      let sym = msg.echo_req.ticks_history;
      if(MARKET_NAMES[sym] && !invalidSymbols.has(sym)) {
        invalidSymbols.add(sym);
        createMarketUI(sym, MARKET_NAMES[sym], true);
        let statusSpan = document.getElementById(`status_${sym}`);
        if(statusSpan) { statusSpan.innerText = '🔴 BLOCKED'; statusSpan.style.background = '#450a0a'; statusSpan.style.color = '#f87171'; }
      }
      return;
    }
    if(msg.msg_type === 'authorize') {
      if(msg.error) { document.getElementById('connectionStatus').innerHTML = '❌ Auth failed'; return; }
      document.getElementById('connectionStatus').innerHTML = '✅ Connected – loading markets...';
      document.getElementById('marketsContainer').innerHTML = '';
      marketData = {};
      invalidSymbols.clear();
      evenOddSignalExpiry = {};
      activeEvenOddSignal = {};
      ouSignalExpiry = {};
      activeOUSignal = {};
      bestPattern = {};
      pendingEntry = {};
      successStats = {};
      consecutiveLosses = {};
      tickTimestamps = {};
      for(let sym of ALL_SYMBOLS) createMarketUI(sym, MARKET_NAMES[sym], false);
      let idx = 0;
      function subNext() {
        if(idx >= ALL_SYMBOLS.length) { document.getElementById('connectionStatus').innerHTML = '✅ Streaming live'; setInterval(() => { for(let sym of ALL_SYMBOLS) if(marketData[sym] && marketData[sym].digitsArray.length >= 100) updateAutoPattern(sym); }, 10000); return; }
        let sym = ALL_SYMBOLS[idx];
        if(!invalidSymbols.has(sym)) subscribeToMarket(sym);
        idx++; setTimeout(subNext, 250);
      }
      subNext();
      setTimeout(() => setGlobalTradeType(globalTradeType), 500);
      return;
    }
  }

  let pingInterval;
  function startPing() { if(pingInterval) clearInterval(pingInterval); pingInterval = setInterval(()=>{ if(ws && ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify({ping:1})); }, 25000); }
  function connectWebSocket() {
    let token = document.getElementById('token').value.trim();
    if(!token) { alert("Enter API token"); return; }
    if(ws && (ws.readyState===WebSocket.OPEN || ws.readyState===WebSocket.CONNECTING)) ws.close();
    document.getElementById('connectionStatus').innerHTML = '⏳ Connecting...';
    ws = new WebSocket('wss://ws.derivws.com/websockets/v3?app_id=1089');
    ws.onopen = () => { ws.send(JSON.stringify({ authorize: token })); startPing(); };
    ws.onmessage = (e) => { try { handleMessage(JSON.parse(e.data)); } catch(err) { console.warn(err); } };
    ws.onerror = () => { document.getElementById('connectionStatus').innerHTML = '⚠️ WebSocket error'; };
    ws.onclose = () => { if(pingInterval) clearInterval(pingInterval); };
  }

  function toggleMode() { document.body.classList.toggle('light'); }

  function setGlobalTradeType(type) {
    globalTradeType = type;
    document.querySelectorAll('.global-trade-btn').forEach(btn => {
      if(btn.getAttribute('data-type') === type) btn.classList.add('active');
      else btn.classList.remove('active');
    });
    for(let sym of ALL_SYMBOLS) {
      let parityStats = document.getElementById(`parityStats_${sym}`);
      let overunderStats = document.getElementById(`overUnderStats_${sym}`);
      let paritySeqWrapper = document.getElementById(`paritySeqWrapper_${sym}`);
      let ouSeqWrapper = document.getElementById(`ouSeqWrapper_${sym}`);
      let evenOddSignal = document.getElementById(`evenOddSignal_${sym}`);
      let overUnderSignal = document.getElementById(`overUnderSignal_${sym}`);
      let patternPanel = document.querySelector(`#market_${sym} .digit-match-panel`);
      let strengthIndicator = document.getElementById(`strengthIndicator_${sym}`);
      if(type === 'evenodd') {
        if(parityStats) parityStats.classList.remove('hidden');
        if(overunderStats) overunderStats.classList.add('hidden');
        if(paritySeqWrapper) paritySeqWrapper.classList.remove('hidden');
        if(ouSeqWrapper) ouSeqWrapper.classList.add('hidden');
        if(evenOddSignal) evenOddSignal.classList.remove('hidden');
        if(overUnderSignal) overUnderSignal.classList.add('hidden');
        if(patternPanel) patternPanel.classList.add('hidden');
        if(strengthIndicator) strengthIndicator.classList.remove('hidden');
      } else if(type === 'overunder') {
        if(parityStats) parityStats.classList.add('hidden');
        if(overunderStats) overunderStats.classList.remove('hidden');
        if(paritySeqWrapper) paritySeqWrapper.classList.add('hidden');
        if(ouSeqWrapper) ouSeqWrapper.classList.remove('hidden');
        if(evenOddSignal) evenOddSignal.classList.add('hidden');
        if(overUnderSignal) overUnderSignal.classList.remove('hidden');
        if(patternPanel) patternPanel.classList.add('hidden');
        if(strengthIndicator) strengthIndicator.classList.remove('hidden');
      } else {
        if(parityStats) parityStats.classList.add('hidden');
        if(overunderStats) overunderStats.classList.add('hidden');
        if(paritySeqWrapper) paritySeqWrapper.classList.add('hidden');
        if(ouSeqWrapper) ouSeqWrapper.classList.add('hidden');
        if(evenOddSignal) evenOddSignal.classList.add('hidden');
        if(overUnderSignal) overUnderSignal.classList.add('hidden');
        if(patternPanel) patternPanel.classList.remove('hidden');
        if(strengthIndicator) strengthIndicator.classList.add('hidden');
      }
      rebuildDigitGrid(sym);
      let last50 = marketData[sym]?.last50Array;
      if(last50 && last50.length) updateStrengthIndicator(sym, last50, type);
    }
  }

  let audioCtx=null;
  function gentleBeep() {
    try{ if(!audioCtx) audioCtx=new AudioContext(); if(audioCtx.state==='suspended') audioCtx.resume(); let o=audioCtx.createOscillator(); let g=audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.value=880; g.gain.value=0.1; o.start(); g.gain.exponentialRampToValueAtTime(0.00001,audioCtx.currentTime+0.2); o.stop(audioCtx.currentTime+0.2); }catch(e){}
  }

  window.manualAnalyze = manualAnalyze;
  window.resetStats = resetStats;
  window.connectWebSocket = connectWebSocket;
  window.toggleMode = toggleMode;
  window.setGlobalTradeType = setGlobalTradeType;
  window.exportCSV = exportCSV;

  document.querySelectorAll('.global-trade-btn').forEach(btn => btn.onclick = () => setGlobalTradeType(btn.getAttribute('data-type')));
  setInterval(() => { for(let sym in marketData) if(marketData[sym].digitsArray.length) renderMarket(sym); }, 1000);
</script>
</body>

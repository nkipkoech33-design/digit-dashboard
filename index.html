<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Digit Analyzer FINAL — Strength + Confidence</title>

<style>
body{background:#0f172a;color:white;font-family:Arial;margin:0;}
.wrapper{display:flex;}
.left{width:70%;padding:10px;display:flex;flex-direction:column;gap:8px;}
.right{width:30%;border-left:1px solid #1e293b;padding:10px;}

.market{border:1px solid #1e293b;padding:6px;border-radius:6px;transition:0.1s;}
.signal{animation:blink 0.6s infinite;border:2px solid yellow;}
@keyframes blink{0%{opacity:1;}50%{opacity:0.4;}100%{opacity:1;}}

.price{text-align:center;font-size:22px;color:#38bdf8;font-weight:bold;}
.win{text-align:center;font-size:12px;}

/* metrics row */
.metrics{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    background:rgba(15,23,42,0.7);
    padding:6px 10px;
    border-radius:12px;
    margin:8px 0 6px 0;
    font-size:12px;
    flex-wrap:wrap;
}
.metric-item{
    display:flex;
    align-items:center;
    gap:6px;
    background:#1e293b;
    padding:3px 10px;
    border-radius:20px;
    backdrop-filter:blur(2px);
}
.metric-label{
    font-weight:bold;
    letter-spacing:0.5px;
}
.strength-value{
    color:#facc15;
    font-weight:bold;
}
.confidence-value{
    color:#4ade80;
    font-weight:bold;
}
.strength-bar-bg{
    width:70px;
    background:#334155;
    border-radius:20px;
    height:6px;
    overflow:hidden;
}
.strength-bar-fill{
    background:linear-gradient(90deg,#facc15,#f97316);
    height:6px;
    width:0%;
    border-radius:20px;
}
.confidence-badge{
    background:#0f172a;
    padding:2px 8px;
    border-radius:16px;
    font-weight:bold;
}
.no-signal .confidence-placeholder{
    color:#94a3b8;
}
.grid{
display:grid;
grid-template-columns:repeat(5,2.5cm);
gap:10px;
justify-content:center;
margin-top:8px;
}

.box{
width:2.5cm;height:2.5cm;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
position:relative;border-radius:6px;
border:1px solid #1e293b;
}

.most{background:green;}
.second{background:blue;}
.secondLeast{background:orange;}
.least{background:red;}

.digit{font-size:48px;font-weight:bold;}
.percent{font-size:13px;}

.pointer{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
font-size:42px;font-weight:bold;
animation:pulse 0.6s infinite;
}
.pointer.even{color:lime;}
.pointer.odd{color:red;}

@keyframes pulse{
0%{transform:translate(-50%,-50%) scale(1);}
50%{transform:translate(-50%,-50%) scale(1.25);}
100%{transform:translate(-50%,-50%) scale(1);}
}

.flash{animation:flash 0.25s;}
@keyframes flash{0%{box-shadow:0 0 25px white;}100%{box-shadow:none;}}

.repeat{box-shadow:0 0 20px yellow;}
.repeat-count{
position:absolute;top:4px;right:6px;
color:yellow;font-weight:bold;
}

.tick{
display:grid;
grid-template-columns:repeat(50,1fr);
font-size:10px;margin-top:8px;
text-align:center;
}
.e{color:lime;}
.o{color:red;}

.signal-text{text-align:center;font-weight:bold;margin-top:4px;}
.buy-even{color:lime;}
.buy-odd{color:red;}

@media(max-width:1200px){
    .left{width:100%;}
    .right{display:none;}
    .grid{grid-template-columns:repeat(5,2.2cm);}
    .box{width:2.2cm;height:2.2cm;}
    .digit{font-size:36px;}
}
</style>
</head>

<body>
<div class="wrapper">
<div class="left" id="markets"></div>
<div class="right"></div>
</div>

<script>
let token="PUT_TOKEN_HERE";

const markets=[
{sym:"R_10",name:"Volatility 10 Index"},
{sym:"R_25",name:"Volatility 25 Index"},
{sym:"R_50",name:"Volatility 50 Index"},
{sym:"R_75",name:"Volatility 75 Index"},
{sym:"R_100",name:"Volatility 100 Index"},
{sym:"1HZ10V",name:"Volatility 10 (1s)"},
{sym:"1HZ15V",name:"Volatility 15 (1s)"},
{sym:"1HZ25V",name:"Volatility 25 (1s)"},
{sym:"1HZ30V",name:"Volatility 30 (1s)"},
{sym:"1HZ50V",name:"Volatility 50 (1s)"},
{sym:"1HZ75V",name:"Volatility 75 (1s)"},
{sym:"1HZ90V",name:"Volatility 90 (1s)"},
{sym:"1HZ100V",name:"Volatility 100 (1s)"},
{sym:"JD10",name:"Jump 10 Index"},
{sym:"JD25",name:"Jump 25 Index"},
{sym:"JD50",name:"Jump 50 Index"},
{sym:"JD75",name:"Jump 75 Index"},
{sym:"JD100",name:"Jump 100 Index"}
];

let ws=new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");

let store={},priceMap={},pipMap={},historyLoaded={},lastDigitMap={};
let audio=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

ws.onopen=()=>{
ws.send(JSON.stringify({authorize:token}));

markets.forEach(m=>{
store[m.sym]=[];
historyLoaded[m.sym]=false;

ws.send(JSON.stringify({
ticks_history:m.sym,count:1000,end:"latest",style:"ticks"
}));

ws.send(JSON.stringify({ticks:m.sym,subscribe:1}));
});
};

ws.onmessage=(msg)=>{
let d=JSON.parse(msg.data);

if(d.history){
let s=d.echo_req.ticks_history;
let pip=pipMap[s]||2;

store[s]=d.history.prices.map(p=>{
let f=parseFloat(p).toFixed(pip);
return parseInt(f.slice(-1));
});

historyLoaded[s]=true;
}

if(d.tick){
let s=d.tick.symbol;
pipMap[s]=d.tick.pip_size;

let price=parseFloat(d.tick.quote).toFixed(pipMap[s]);
let digit=parseInt(price.slice(-1));

priceMap[s]=price;
lastDigitMap[s]=digit;

if(!historyLoaded[s]) return;

store[s].push(digit);
if(store[s].length>1000) store[s].shift();

render();
}
};

function repeat(arr){
let last=arr[arr.length-1],c=0;
for(let i=arr.length-1;i>=0;i--){
if(arr[i]===last)c++;else break;
}
return c;
}

// Compute signal strength (higher = stronger)
// Based on even-odd % difference, and also penalize if opposing digits are close to threshold 10%
function computeSignalStrength(evenP, oddP, perc, signalType) {
    if (!signalType) return 0;
    let diff = Math.abs(evenP - oddP);
    let strengthRaw = diff;
    if (signalType === "BUY EVEN") {
        const oddDigits = [1,3,5,7,9];
        let maxOpposing = Math.max(...oddDigits.map(d => parseFloat(perc[d])));
        let distanceTo10 = Math.max(0, 10 - maxOpposing);
        // combine: diff contributes up to 70%, distanceTo10 up to 30%
        let composite = (diff * 0.7) + (distanceTo10 * 3);
        return Math.min(100, composite);
    } 
    else if (signalType === "BUY ODD") {
        const evenDigits = [0,2,4,6,8];
        let maxOpposing = Math.max(...evenDigits.map(d => parseFloat(perc[d])));
        let distanceTo10 = Math.max(0, 10 - maxOpposing);
        let composite = (diff * 0.7) + (distanceTo10 * 3);
        return Math.min(100, composite);
    }
    return strengthRaw;
}

// Helper: compute strength + confidence metrics for display
function computeStrengthAndConfidence(evenP, oddP, perc, signalType) {
    let strengthRaw = Math.abs(evenP - oddP);
    let strength = strengthRaw.toFixed(1);
    
    let confidencePercent = "—";
    
    if (signalType === "BUY EVEN") {
        const oddDigits = [1,3,5,7,9];
        let oddPercs = oddDigits.map(d => parseFloat(perc[d]));
        let maxOpposing = Math.max(...oddPercs);
        let margin = 10 - maxOpposing;
        let rawConf = (margin / 10) * 100;
        rawConf = Math.min(100, Math.max(0, rawConf));
        confidencePercent = `${rawConf.toFixed(0)}%`;
    } 
    else if (signalType === "BUY ODD") {
        const evenDigits = [0,2,4,6,8];
        let evenPercs = evenDigits.map(d => parseFloat(perc[d]));
        let maxOpposing = Math.max(...evenPercs);
        let margin = 10 - maxOpposing;
        let rawConf = (margin / 10) * 100;
        rawConf = Math.min(100, Math.max(0, rawConf));
        confidencePercent = `${rawConf.toFixed(0)}%`;
    }
    else {
        confidencePercent = "⚡ wait";
    }
    
    return { strength, strengthRaw, confidencePercent };
}

// Get signal info for a market: { isActive, signalType, signalStrength }
function getSignalInfo(sym) {
    let arr = store[sym];
    if (!arr || arr.length < 1000) return { isActive: false, signalType: null, signalStrength: 0 };
    
    let counts = Array(10).fill(0);
    arr.forEach(d => counts[d]++);
    let total = arr.length;
    let perc = counts.map(c => (c/total)*100);
    
    let evenSum = counts[0]+counts[2]+counts[4]+counts[6]+counts[8];
    let oddSum = counts[1]+counts[3]+counts[5]+counts[7]+counts[9];
    let evenP = (evenSum/total)*100;
    let oddP = (oddSum/total)*100;
    
    let signalType = null;
    if(evenP > oddP && [1,3,5,7,9].every(i => perc[i] < 10)) {
        signalType = "BUY EVEN";
    }
    else if(oddP > evenP && [0,2,4,6,8].every(i => perc[i] < 10)) {
        signalType = "BUY ODD";
    }
    
    let isActive = signalType !== null;
    let signalStrength = 0;
    if (isActive) {
        signalStrength = computeSignalStrength(evenP, oddP, perc, signalType);
    }
    return { isActive, signalType, signalStrength, evenP, oddP, perc, counts, total };
}

function render(){
    let wrap = document.getElementById("markets");
    wrap.innerHTML = "";
    
    // Build array with market objects + precomputed signal info
    let marketItems = [];
    markets.forEach(m => {
        let arr = store[m.sym];
        if (!arr || arr.length < 1000) return;
        let info = getSignalInfo(m.sym);
        marketItems.push({
            market: m,
            arr: arr,
            info: info
        });
    });
    
    // Sort: first by signal active (true top), then by signalStrength descending, then by name
    marketItems.sort((a,b) => {
        if (a.info.isActive !== b.info.isActive) {
            return a.info.isActive ? -1 : 1;
        }
        if (a.info.isActive && b.info.isActive) {
            // both active: stronger signal first
            return b.info.signalStrength - a.info.signalStrength;
        }
        // both inactive: keep original order or sort by name for consistency
        return a.market.name.localeCompare(b.market.name);
    });
    
    // Render each market
    marketItems.forEach(({ market, arr, info }) => {
        let m = market;
        let counts = info.counts;
        let total = arr.length;
        let perc = info.perc.map(p => p.toFixed(1));
        let evenP = info.evenP;
        let oddP = info.oddP;
        let evenPDisplay = evenP.toFixed(1);
        let oddPDisplay = oddP.toFixed(1);
        
        let signalType = info.signalType;
        let isSignal = info.isActive;
        
        // Play audio only if new signal (but original plays each render if active, keep same)
        if(isSignal) audio.play();
        
        // Compute display strength/confidence
        const { strength, strengthRaw, confidencePercent } = computeStrengthAndConfidence(evenP, oddP, perc, signalType);
        let barWidth = Math.min(100, parseFloat(strengthRaw));
        let barFillStyle = `width: ${barWidth}%;`;
        
        // color coding for digits
        let sortedDigits = [...counts].map((v,i)=>({v,i})).sort((a,b)=>b.v-a.v);
        let most = sortedDigits[0].i;
        let second = sortedDigits[1].i;
        let least = sortedDigits[9].i;
        let secondLeast = sortedDigits[8].i;
        
        let last = arr[arr.length-1];
        let rep = repeat(arr);
        
        function box(i){
            let cls="";
            if(i===most) cls="most";
            else if(i===second) cls="second";
            else if(i===least) cls="least";
            else if(i===secondLeast) cls="secondLeast";
            
            let pointer = (i===last) ? `<div class="pointer ${i%2==0?'even':'odd'}">●</div>` : "";
            let flash = (lastDigitMap[m.sym]===i) ? "flash" : "";
            let repeatFx = (i===last && rep>=2) ? "repeat" : "";
            let counter = (i===last && rep>=2) ? `<div class="repeat-count">x${rep}</div>` : "";
            
            return `<div class="box ${cls} ${flash} ${repeatFx}">
${pointer}${counter}
<div class="digit">${i}</div>
<div class="percent">${perc[i]}%</div>
</div>`;
        }
        
        let ticks = arr.slice(-50).map(d => `<span class="${d%2==0?'e':'o'}">${d%2==0?'E':'O'}</span>`).join("");
        
        let div = document.createElement("div");
        div.className = "market " + (isSignal ? "signal" : "");
        div.innerHTML = `
<b>${m.name}</b>
<div class="price">${priceMap[m.sym]}</div>
<div class="win">🎲 EVEN ${evenPDisplay}% | ODD ${oddPDisplay}%</div>

<div class="metrics">
    <div class="metric-item">
        <span class="metric-label">💪 STRENGTH</span>
        <span class="strength-value">${strength}%</span>
        <div class="strength-bar-bg"><div class="strength-bar-fill" style="${barFillStyle}"></div></div>
    </div>
    <div class="metric-item">
        <span class="metric-label">🎯 CONFIDENCE</span>
        <span class="confidence-value">${confidencePercent}</span>
        ${isSignal ? `<span class="confidence-badge">🔥 ACTIVE</span>` : `<span class="confidence-badge" style="background:#334155;">⚡ IDLE</span>`}
    </div>
</div>

${isSignal?`<div class="signal-text ${signalType==='BUY EVEN'?'buy-even':'buy-odd'}">🚀 ${signalType} (strength ${strength}% | conf ${confidencePercent})</div>`:""}
<div class="grid">${[0,2,4,6,8].map(box).join("")}</div>
<div class="grid">${[1,3,5,7,9].map(box).join("")}</div>
<div class="tick">${ticks}</div>
`;
        wrap.appendChild(div);
    });
}
</script>
</body>
</html>

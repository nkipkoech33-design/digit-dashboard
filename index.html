<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digit Analyzer PRO — Lightning Fast + Martingale Bot</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
  </script>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #1e293b;
      --text: white;
      --text-secondary: #94a3b8;
      --accent: #facc15;
      --good: #4ade80;
      --bad: #f87171;
      --highlight: #38bdf8;
      --bar-bg: #334155;
    }
    body.light {
      --bg: #f8fafc;
      --surface: #e2e8f0;
      --border: #cbd5e1;
      --text: #0f172a;
      --text-secondary: #475569;
      --accent: #eab308;
      --good: #16a34a;
      --bad: #dc2626;
      --highlight: #0284c7;
      --bar-bg: #cbd5e1;
    }

    body { background: var(--bg); color: var(--text); font-family: Arial, sans-serif; margin: 0; }
    .wrapper { display: flex; }
    .left { width: 70%; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
    .right { width: 30%; border-left: 1px solid var(--border); padding: 10px; background: var(--bg); overflow-y: auto; max-height: 100vh; }

    .market { border: 1px solid var(--border); padding: 6px; border-radius: 6px; background: var(--bg); transition: 0.1s; }
    .signal { animation: blink 0.6s infinite; border: 2px solid var(--accent); }
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

    .price { text-align: center; font-size: 22px; color: var(--highlight); font-weight: bold; }
    .win { text-align: center; font-size: 12px; }
    .metrics { display: flex; justify-content: space-between; align-items: center; gap: 12px; background: rgba(15,23,42,0.7); padding: 6px 10px; border-radius: 12px; margin: 8px 0 6px 0; font-size: 12px; flex-wrap: wrap; }
    .metric-item { display: flex; align-items: center; gap: 6px; background: var(--surface); padding: 3px 10px; border-radius: 20px; }
    .metric-label { font-weight: bold; }
    .strength-value { color: var(--accent); font-weight: bold; }
    .confidence-value { color: var(--good); font-weight: bold; }
    .strength-bar-bg { width: 70px; background: var(--bar-bg); border-radius: 20px; height: 6px; overflow: hidden; }
    .strength-bar-fill { background: linear-gradient(90deg, var(--accent), #f97316); height: 6px; width: 0%; border-radius: 20px; }
    .confidence-badge { padding: 2px 8px; border-radius: 16px; font-weight: bold; }

    .grid { display: grid; grid-template-columns: repeat(5, 2.5cm); gap: 10px; justify-content: center; margin-top: 8px; }
    .box { width: 2.5cm; height: 2.5cm; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); }
    .most { background: green; } .second { background: blue; } .secondLeast { background: orange; } .least { background: red; }
    .digit { font-size: 48px; font-weight: bold; } .percent { font-size: 13px; }

    .pointer { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 42px; font-weight: bold; animation: pulse 0.6s infinite; }
    .pointer.even { color: lime; } .pointer.odd { color: red; }
    @keyframes pulse { 0% { transform: translate(-50%,-50%) scale(1); } 50% { transform: translate(-50%,-50%) scale(1.25); } 100% { transform: translate(-50%,-50%) scale(1); } }
    .flash { animation: flash 0.25s; } @keyframes flash { 0% { box-shadow: 0 0 25px white; } 100% { box-shadow: none; } }
    .repeat { box-shadow: 0 0 20px yellow; }
    .repeat-count { position: absolute; top: 4px; right: 6px; color: yellow; font-weight: bold; }

    .tick { display: grid; grid-template-columns: repeat(50, 1fr); font-size: 10px; margin-top: 8px; text-align: center; }
    .e { color: lime; } .o { color: red; }
    .signal-text { text-align: center; font-weight: bold; margin-top: 4px; }
    .buy-even { color: lime; } .buy-odd { color: red; }

    .stats-panel { background: var(--surface); border-radius: 12px; padding: 12px; margin-bottom: 15px; border: 1px solid var(--border); }
    .stats-title { font-size: 16px; font-weight: bold; border-bottom: 1px solid var(--bar-bg); padding-bottom: 6px; margin-bottom: 10px; color: var(--text-secondary); }
    .stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
    .stat-label { color: var(--text-secondary); }
    .stat-value { font-weight: bold; color: var(--accent); }
    .signal-log { font-size: 11px; max-height: 150px; overflow-y: auto; }
    .log-entry { padding: 4px; border-bottom: 1px solid var(--border); font-family: monospace; cursor: pointer; transition: 0.2s; }
    .log-entry:hover { background: var(--surface); }
    .log-win { color: var(--good); } .log-loss { color: var(--bad); } .log-pending { color: var(--accent); }

    .market.ranked-first { border-left: 4px solid var(--accent); }
    .trend-change { background: rgba(239,68,68,0.2); padding: 2px 6px; border-radius: 12px; font-size: 11px; color: var(--bad); margin-left: 8px; animation: fadeOut 3s forwards; }
    @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; } }
    .stop-signal { background: #7f1d1d; color: white; padding: 2px 8px; border-radius: 16px; font-weight: bold; font-size: 11px; }
    .exit-suggestion { font-size: 11px; background: var(--surface); padding: 3px 8px; border-radius: 16px; margin-left: 8px; }
    .small-badge { font-size: 10px; padding: 2px 6px; border-radius: 12px; background: var(--surface); }
    .regime-calm { background: #15803d; } .regime-choppy { background: #b45309; } .regime-trending { background: #1d4ed8; }
    .consensus-alert { background: var(--accent); color: #0f172a; padding: 8px; border-radius: 8px; font-weight: bold; margin-bottom: 10px; }
    .reversal-warning { background: #7f1d1d; color: white; padding: 2px 6px; border-radius: 12px; font-size: 10px; margin-left: 5px; }
    .ml-prob { font-size: 12px; background: var(--surface); padding: 2px 8px; border-radius: 16px; }
    .momentum-badge { font-size: 11px; padding: 2px 8px; border-radius: 12px; margin-left: 5px; background: var(--surface); }
    .momentum-up { color: var(--good); } .momentum-down { color: var(--bad); } .momentum-neutral { color: var(--text-secondary); }
    .sparkline-canvas { width: 100%; height: 40px; margin: 5px 0; }

    #topbar { position: fixed; top: 0; left: 0; right: 0; background: var(--surface); padding: 6px 10px; display: flex; justify-content: flex-end; z-index: 20; border-bottom: 1px solid var(--border); }
    body { padding-top: 40px; }

    .pin-star { cursor: pointer; color: var(--text-secondary); margin-left: 6px; }
    .pin-star.pinned { color: var(--accent); }
    .divergence-badge { background: #7f1d1d; color: white; padding: 2px 6px; border-radius: 12px; font-size: 10px; margin-left: 5px; }
    .ml-accuracy-badge { font-size: 10px; padding: 2px 6px; border-radius: 12px; background: var(--surface); }

    .market-list-item { display: flex; align-items: center; gap: 6px; font-size: 13px; padding: 2px 0; cursor: pointer; }
    .market-list-item.blinking { animation: listBlink 0.8s infinite; }
    @keyframes listBlink { 0% { color: var(--text); } 50% { color: var(--accent); } 100% { color: var(--text); } }

    .bot-panel input, .bot-panel select { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; }
    .bot-toggle { padding: 4px 12px; border-radius: 16px; cursor: pointer; font-weight: bold; border: none; }
    .bot-on { background: var(--good); color: black; }
    .bot-off { background: var(--bad); color: white; }

    @media(max-width:1200px) { .left { width: 100%; } .right { display: none; } .grid { grid-template-columns: repeat(5, 2.2cm); } .box { width: 2.2cm; height: 2.2cm; } .digit { font-size: 36px; } }
  </style>
</head>
<body>
<div id="topbar"><button id="themeToggle">🌓 Theme</button></div>
<div class="wrapper">
  <div class="left" id="markets"></div>
  <div class="right" id="statsPanel"></div>
</div>

<script>
  (function(){
    let token = "PUT_TOKEN_HERE";
    const markets = [
      {sym:"R_10",name:"Volatility 10 Index"},{sym:"R_25",name:"Volatility 25 Index"},{sym:"R_50",name:"Volatility 50 Index"},
      {sym:"R_75",name:"Volatility 75 Index"},{sym:"R_100",name:"Volatility 100 Index"},
      {sym:"1HZ10V",name:"Volatility 10 (1s)"},{sym:"1HZ15V",name:"Volatility 15 (1s)"},{sym:"1HZ25V",name:"Volatility 25 (1s)"},
      {sym:"1HZ30V",name:"Volatility 30 (1s)"},{sym:"1HZ50V",name:"Volatility 50 (1s)"},{sym:"1HZ75V",name:"Volatility 75 (1s)"},
      {sym:"1HZ90V",name:"Volatility 90 (1s)"},{sym:"1HZ100V",name:"Volatility 100 (1s)"},
      {sym:"JD10",name:"Jump 10 Index"},{sym:"JD25",name:"Jump 25 Index"},{sym:"JD50",name:"Jump 50 Index"},
      {sym:"JD75",name:"Jump 75 Index"},{sym:"JD100",name:"Jump 100 Index"}
    ];

    // ---- BOT SETTINGS ----
    let botEnabled = false;
    let botSpeed = 1;
    let botMartingaleMult = 1.8;
    let botTakeProfit = 2;
    let botStopLoss = 20;
    let botBaseStake = 1;
    let botPaperMode = true;
    let botBalance = 1000;
    let botTradeLog = [];
    let botState = {};
    let signalStreakMap = {};

    // ---- GLOBAL STATE ----
    let ws = new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");
    let store = {}, storeShort = {}, storeMedium = {}, storeFullHistory = {};
    let priceMap = {}, pipMap = {}, historyLoaded = {}, lastDigitMap = {};
    let audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
    let tradeLog = [];
    let marketStats = {};
    let previousSignalState = {};
    let lastSignalTime = {};
    let optimalParams = { zThreshold: 1.65, maxOpposing: 14, minMargin: 3 };
    const volatilityFactors = {
      'R_10':0.8,'R_25':1.0,'R_50':1.3,'R_75':1.6,'R_100':2.0,'1HZ10V':0.9,'1HZ15V':1.0,'1HZ25V':1.2,'1HZ30V':1.3,'1HZ50V':1.5,'1HZ75V':1.8,'1HZ90V':1.9,'1HZ100V':2.0,'JD10':1.2,'JD25':1.5,'JD50':2.0,'JD75':2.5,'JD100':3.0
    };

    class OnlineLogisticRegression {
      constructor(fc=2,lr=0.01){ this.weights=Array(fc).fill(0).map(()=>Math.random()*0.1); this.bias=0; this.lr=lr; }
      sigmoid(z){return 1/(1+Math.exp(-z));}
      predict(f){let z=this.bias;for(let i=0;i<f.length;i++)z+=this.weights[i]*f[i];return this.sigmoid(z);}
      update(f,label){let p=this.predict(f);let e=label-p;for(let i=0;i<f.length;i++)this.weights[i]+=this.lr*e*f[i];this.bias+=this.lr*e;}
    }
    let mlModel = new OnlineLogisticRegression(3);
    let lastMLPredictions = {}, mlAccuracyHistory = {};
    let pinnedSymbols = new Set();

    let phaseOneLoaded = {};
    let phaseTwoLoaded = {};
    let marketContainers = {}; // DOM cache

    // ---- CORE FUNCTIONS (unchanged) ----
    function getMLFeatures(s,eP,oP){let a=store[s];if(!a||a.length<10)return[0,0,0];let d=(eP-oP)/100,str=0,lst=a[a.length-1];for(let i=a.length-1;i>=0;i--){if(a[i]===lst)str++;else break;}return[d,Math.min(str,10)/10,volatilityFactors[s]/3];}
    function nowStr(){return new Date().toLocaleTimeString();}
    function classifyRegime(s){let a=store[s];if(!a||a.length<50)return{type:'Unknown',color:'#64748b'};let r=a.slice(-50).map(d=>d%2===0?0:1);let m=r.reduce((a,b)=>a+b,0)/r.length;let std=Math.sqrt(r.reduce((a,b)=>a+Math.pow(b-m,2),0)/r.length);if(std<0.35)return{type:'Calm',color:'#15803d'};if(std>0.48)return{type:'Trending',color:'#1d4ed8'};return{type:'Choppy',color:'#b45309'};}
    function detectReversalPattern(s,cnt,total,ep,op){let a=store[s];if(!a||a.length<30)return null;let r=a.slice(-30);let ec=r.filter(d=>d%2===0).length;let bNow=ep>op?'EVEN':'ODD';if(bNow!==(ec>15?'EVEN':'ODD'))return'⚠️ Bias shift imminent';let eph=[];for(let i=0;i<=a.length-10;i+=5)eph.push(a.slice(i,i+10).filter(d=>d%2===0).length/10*100);if(eph.length>=3){let l3=eph.slice(-3);if(l3[0]>l3[1]&&l3[2]>l3[1]&&Math.abs(l3[0]-l3[2])<2)return'📉 Double top in even%';if(l3[0]<l3[1]&&l3[2]<l3[1]&&Math.abs(l3[0]-l3[2])<2)return'📈 Double bottom in even%';}return null;}
    function computeBiasMomentum(s){let a=store[s];if(!a||a.length<50)return{value:0,label:'neutral'};let f1=a.slice(-50,-25),f2=a.slice(-25);let e1=f1.filter(d=>d%2===0).length/25*100,e2=f2.filter(d=>d%2===0).length/25*100;let mom=e2-e1;return{value:mom,label:mom>5?'up':(mom<-5?'down':'neutral')};}
    function detectDivergence(sy,sig,mom){if(!sig)return null;if(sig==="BUY EVEN"&&mom.label==="down")return"⚠️ Divergence: momentum falling";if(sig==="BUY ODD"&&mom.label==="up")return"⚠️ Divergence: momentum rising";if(sig==="BUY EVEN"&&mom.value<-3)return"⚠️ Divergence: weak momentum";if(sig==="BUY ODD"&&mom.value>3)return"⚠️ Divergence: weak momentum";return null;}

    let chartInstances = {};
    function drawSparkline(sym) {
      let canvas = document.getElementById(`sparkline-${sym}`);
      if(!canvas) return;
      let a = store[sym]; if(!a||a.length<10) return;
      let ctx = canvas.getContext('2d');
      let w = canvas.width = canvas.offsetWidth||300, h = canvas.height = 40;
      ctx.clearRect(0,0,w,h);
      let rec = a.slice(-50); if(rec.length<2) return;
      let pts = [];
      for(let i=0;i<rec.length;i++){
        let sl = rec.slice(0,i+1);
        let ep = sl.filter(d=>d%2===0).length/sl.length*100;
        pts.push({x:(i/(rec.length-1))*w, y:h-(ep/100)*h});
      }
      let grad = ctx.createLinearGradient(0,0,0,h);
      grad.addColorStop(0,'rgba(74,222,128,0.3)');
      grad.addColorStop(1,'rgba(248,113,113,0.3)');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.moveTo(pts[0].x, h);
      for(let p of pts) ctx.lineTo(p.x, p.y);
      ctx.lineTo(pts[pts.length-1].x, h); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
      for(let p of pts) ctx.lineTo(p.x, p.y); ctx.stroke();
      ctx.strokeStyle = '#64748b'; ctx.lineWidth = 0.5; ctx.setLineDash([2,2]);
      ctx.beginPath(); ctx.moveTo(0, h/2); ctx.lineTo(w, h/2); ctx.stroke();
      ctx.setLineDash([]);
    }

    const heatmapCounters = {};
    const heatmapPending = {};
    function updateHeatmap(sym) {
      let canvas = document.getElementById(`heatmap-${sym}`);
      if(!canvas) return;
      let a = store[sym]; if(!a||a.length<50) return;
      if(!heatmapCounters[sym]) heatmapCounters[sym]=0;
      heatmapCounters[sym]++;
      if(heatmapCounters[sym] % 10 !== 0) return; // throttle to every 10 ticks
      let recent = a.slice(-50);
      let matrix = Array(10).fill().map(()=>Array(50).fill(0));
      for(let i=0;i<recent.length;i++) matrix[recent[i]][i]=1;
      let existing = chartInstances[sym];
      if(existing){
        existing.data.datasets[0].data = matrix.flatMap((row,d)=>row.map((v,t)=>({x:t,y:d,v:v})));
        existing.update();
      } else {
        let chart = new Chart(canvas, {
          type:'matrix',
          data:{ labels:Array(50).fill(''),
            datasets:[{ data:matrix.flatMap((row,d)=>row.map((v,t)=>({x:t,y:d,v:v}))),
              backgroundColor(ctx){ let val=ctx.raw.v; if(val===0)return'#1e293b'; return`rgba(56,189,248,${0.3+val*0.7})`; },
              borderWidth:0,
              width:({chart})=>(chart.chartArea||{}).width/50,
              height:({chart})=>(chart.chartArea||{}).height/10 }] },
          options:{ responsive:true, maintainAspectRatio:false,
            plugins:{ legend:{display:false}, tooltip:{enabled:false} },
            scales:{ x:{display:false, offset:true}, y:{display:true, reverse:true, ticks:{stepSize:1, color:'#94a3b8'}} } }
        });
        chartInstances[sym]=chart;
      }
    }

    function detectConsensus(){
      if(!areSignalsReady())return{active:false};
      const signals=[];
      markets.forEach(m=>{let a=store[m.sym];if(!a||a.length<1000)return;let sig=getAdvancedSignal(m.sym);if(sig){let h=computeMarketHealth(m.sym,getCounts(m.sym),a.length,sig,getEvenP(m.sym),getOddP(m.sym));if(h>=50)signals.push({sym:m.sym,bias:sig,health:h});}});
      if(signals.length>=2){let bc={'BUY EVEN':0,'BUY ODD':0};signals.forEach(s=>bc[s.bias]++);let cb=bc['BUY EVEN']>bc['BUY ODD']?'EVEN':'ODD';if(Math.max(bc['BUY EVEN'],bc['BUY ODD'])>=2)return{active:true,bias:cb,symbols:signals.filter(s=>s.bias.includes(cb)).map(s=>s.sym)};}return{active:false};
    }
    function getCounts(sym){let a=store[sym];if(!a)return Array(10).fill(0);let c=Array(10).fill(0);a.forEach(d=>c[d]++);return c;}
    function getEvenP(sym){let c=getCounts(sym);let t=c.reduce((a,b)=>a+b,0);let e=c[0]+c[2]+c[4]+c[6]+c[8];return(e/t)*100;}
    function getOddP(sym){return 100-getEvenP(sym);}
    function recomputeOptimalThresholds(){const completed=tradeLog.filter(t=>t.outcome!=='pending');if(completed.length<20)return;let best={winRate:0,z:1.96,opp:14,margin:3};for(let z of[1.65,1.96,2.33,2.58])for(let o of[10,12,14,16])for(let m of[3,5,7,9]){const sub=completed.filter(t=>{let s=parseFloat(t.strength)||0,c=parseFloat(t.confidence)||0;return s>=40+(z-1.65)*30&&c>=30+(o-10)*10;});if(sub.length<5)continue;const w=sub.filter(t=>t.outcome==='win').length;const r=(w/sub.length)*100;if(r>best.winRate)best={winRate:r,z,opp:o,margin:m};}if(best.winRate>0)optimalParams={zThreshold:best.z,maxOpposing:best.opp,minMargin:best.margin};}
    function isStatisticallySignificant(e,o,t){return Math.abs(e/t-0.5)/Math.sqrt(0.25/t)>optimalParams.zThreshold;}
    function checkMultiTimeframeAlignment(sym){let S=storeShort[sym],M=storeMedium[sym],L=store[sym];if(!S||S.length<50||!M||M.length<200||!L||L.length<800)return false;const bias=a=>{let e=a.filter(d=>d%2===0).length;return e>a.length/2?"EVEN":(a.length-e>a.length/2?"ODD":null);};let bs=bias(S),bm=bias(M),bl=bias(L);let votes=[bs,bm,bl].filter(b=>b!==null);return votes.filter(v=>v==="EVEN").length>=2?"EVEN":(votes.filter(v=>v==="ODD").length>=2?"ODD":null);}
    function getAdvancedSignal(sym){
      let a=store[sym]; if(!a||a.length<1000)return null;
      let tf=checkMultiTimeframeAlignment(sym); if(!tf)return null;
      let cnt=getCounts(sym),t=a.length, es=cnt[0]+cnt[2]+cnt[4]+cnt[6]+cnt[8], os=t-es;
      if(!isStatisticallySignificant(es,os,t))return null;
      let ep=(es/t)*100, op=(os/t)*100;
      if (tf === "EVEN" && ep <= op) return null;
      if (tf === "ODD"  && op <= ep) return null;
      let oppDigits = (tf==="EVEN") ? [1,3,5,7,9] : [0,2,4,6,8];
      let allOppBelow10 = oppDigits.every(d => (cnt[d]/t)*100 < 10);
      if(!allOppBelow10) return null;
      if(Math.abs(ep-op)<optimalParams.minMargin)return null;
      return tf==="EVEN"?"BUY EVEN":"BUY ODD";
    }
    function areSignalsReady(){ return Object.values(phaseTwoLoaded).filter(Boolean).length === markets.length; }

    function computeSignalStrength(ep,op,perc,sig,sym){if(!sig)return 0;let diff=Math.abs(ep-op);let vf=volatilityFactors[sym]||1;if(sig==="BUY EVEN"){let odd=[1,3,5,7,9];let mo=Math.max(...odd.map(d=>parseFloat(perc[d])));return Math.min(100,(diff*0.5+Math.max(0,optimalParams.maxOpposing-mo)*5)/vf);}else{let even=[0,2,4,6,8];let mo=Math.max(...even.map(d=>parseFloat(perc[d])));return Math.min(100,(diff*0.5+Math.max(0,optimalParams.maxOpposing-mo)*5)/vf);}}
    function computeConfidence(ep,op,perc,sig){if(!sig)return"—";let opp=sig==="BUY EVEN"?[1,3,5,7,9]:[0,2,4,6,8];let maxOpp=Math.max(...opp.map(d=>parseFloat(perc[d])));let margin=optimalParams.maxOpposing-maxOpp;return`${Math.min(100,Math.max(0,(margin/optimalParams.maxOpposing)*100)).toFixed(0)}%`;}
    function computeMarketHealth(sym,cnt,t,sig,ep,op){if(!store[sym]||store[sym].length<1000)return 0;let e=cnt[0]+cnt[2]+cnt[4]+cnt[6]+cnt[8];let z=Math.abs(e/t-0.5)/Math.sqrt(0.25/t);let sigSc=Math.min(100,(z/3)*100);let tfSc=checkMultiTimeframeAlignment(sym)?100:0;let opp=sig==="BUY EVEN"?[1,3,5,7,9]:[0,2,4,6,8];let maxOpp=Math.max(...opp.map(d=>(cnt[d]/t)*100));let oppSc=Math.max(0,100-(maxOpp/optimalParams.maxOpposing)*100);let marginSc=Math.min(100,(Math.abs(ep-op)/15)*100);return Math.round(sigSc*0.3+tfSc*0.3+oppSc*0.2+marginSc*0.2);}
    function getExitSuggestion(sym,sig,cnt,t){if(!sig)return"";let opp=sig==="BUY EVEN"?[1,3,5,7,9]:[0,2,4,6,8];let maxOpp=Math.max(...opp.map(d=>(cnt[d]/t)*100));let thr=optimalParams.maxOpposing*0.9;if(maxOpp>=thr)return`⚠️ Exit soon: opposing ${maxOpp.toFixed(1)}%`;return"🎯 Hold until opposing > "+thr.toFixed(1)+"%";}

    // ---- BOT LOGIC ----
    function handleBotTrade(sym, signalType) {
      if (!botEnabled || !phaseTwoLoaded[sym]) return;
      if (!signalStreakMap[sym]) signalStreakMap[sym] = { lastSignalType: null, count: 0 };
      let streak = signalStreakMap[sym];
      if (streak.lastSignalType !== signalType) { streak.lastSignalType = signalType; streak.count = 1; }
      else { streak.count++; }
      if (streak.count < botSpeed) return;

      if (!botState[sym]) botState[sym] = { currentStake: botBaseStake, totalProfit: 0, totalLoss: 0, active: true };
      let state = botState[sym];
      if (!state.active) return;

      let direction = signalType === "BUY EVEN" ? "DIGITEVEN" : "DIGITODD";
      let stake = state.currentStake;
      let actualWin = (direction === "DIGITEVEN" && lastDigitMap[sym] % 2 === 0) || (direction === "DIGITODD" && lastDigitMap[sym] % 2 !== 0);
      let outcome = actualWin ? "win" : "loss";

      if (botPaperMode) {
        if (actualWin) {
          botBalance += stake * 0.96;
          state.totalProfit += stake * 0.96;
        } else {
          botBalance -= stake;
          state.totalLoss += stake;
        }
      } else {
        ws.send(JSON.stringify({ buy: 1, price: stake, parameters: { contract_type: direction, symbol: sym, duration: 1, duration_unit: "t", basis: "stake", amount: stake, currency: "USD" } }));
      }

      let entry = { time: nowStr(), market: sym, direction, stake, outcome, balance: botBalance.toFixed(2) };
      botTradeLog.unshift(entry);
      if (botTradeLog.length > 50) botTradeLog.pop();

      if (outcome === "win") {
        if (state.totalProfit >= botTakeProfit) { state.totalProfit = 0; state.totalLoss = 0; state.currentStake = botBaseStake; }
        else { state.currentStake = botBaseStake; }
      } else {
        if (state.totalLoss >= botStopLoss) { state.active = false; }
        else { state.currentStake = +(state.currentStake * botMartingaleMult).toFixed(2); }
      }
      updateBotPanel();
    }

    // ---- PER-TICK UPDATE (fast) ----
    function updateMarketPanel(sym) {
      let data = computeMarketDataOnly(sym);
      if (!data) return;
      let container = marketContainers[sym];
      if (!container) return;

      // Update price
      container.querySelector('.price').textContent = data.price;
      // Update even/odd win text
      container.querySelector('.win').innerHTML = `🎲 EVEN ${data.evenP.toFixed(1)}% | ODD ${data.oddP.toFixed(1)}%`;

      // Update tick grid
      let tickDiv = container.querySelector('.tick');
      if (tickDiv) {
        tickDiv.innerHTML = data.arr.slice(-50).map(d => `<span class="${d%2==0?'e':'o'}">${d%2==0?'E':'O'}</span>`).join('');
      }

      // Update strength/confidence/health/etc. if needed (reuse class toggles)
      // We'll update the whole inner block for the metric parts for simplicity, but using innerHTML for the whole container is heavy.
      // Instead, we can update specific spans. Let's do quick textContent updates for simplicity.
      // For speed, we update critical elements only; the rest (heatmap, sparkline) are updated separately.
      // We'll still call drawSparkline and updateHeatmap (throttled).
    }

    function computeMarketDataOnly(sym) {
      let a = store[sym];
      if (!phaseOneLoaded[sym]) return null;
      let t = a.length; if (t < 10) return null;
      let cnt = getCounts(sym);
      let es = cnt[0]+cnt[2]+cnt[4]+cnt[6]+cnt[8], os = t-es;
      let ep = (es/t)*100, op = (os/t)*100;
      return { sym, price: priceMap[sym] || "—", evenP: ep, oddP: op, arr: a };
    }

    // Full data for a market (used on signal detection)
    function computeFullMarketData(sym) {
      let a = store[sym];
      if (!phaseOneLoaded[sym]) return null;
      let t = a.length; if (t < 10) return null;
      let cnt = getCounts(sym);
      let perc = cnt.map(c => (c/t*100).toFixed(1));
      let es = cnt[0]+cnt[2]+cnt[4]+cnt[6]+cnt[8], os = t-es;
      let ep = (es/t)*100, op = (os/t)*100;
      let sig = null, isSig = false, strength = 0, confidence = "—", health = 0;
      if (phaseTwoLoaded[sym]) {
        sig = getAdvancedSignal(sym);
        isSig = sig !== null;
        if (isSig) {
          strength = computeSignalStrength(ep,op,perc,sig,sym);
          confidence = computeConfidence(ep,op,perc,sig);
          if (!window._lastSignalTick || window._lastSignalTick !== lastDigitMap[sym]) {
            window._lastSignalTick = lastDigitMap[sym];
            recordSignal(sym, sig, strength.toFixed(1), confidence);
          }
        }
        health = computeMarketHealth(sym,cnt,t,sig,ep,op);
      }
      let exitMsg = isSig ? getExitSuggestion(sym,sig,cnt,t) : "";
      let regime = classifyRegime(sym);
      let reversal = isSig ? detectReversalPattern(sym,cnt,t,ep,op) : null;
      let features = getMLFeatures(sym,ep,op);
      let mlProb = mlModel.predict(features);
      let momentum = computeBiasMomentum(sym);
      let divergence = isSig ? detectDivergence(sym,sig,momentum) : null;
      let mlAcc = computeMLAccuracy(sym);
      return { sym, name: markets.find(m=>m.sym===sym).name, price: priceMap[sym]||"—", evenP:ep, oddP:op,
        signalType:sig, isSignal:isSig, strength, confidence, health, exitMsg,
        regime, reversal, mlProb, momentum, divergence, mlAccuracy:mlAcc,
        perc, cnt, arr:a, lastDigit:lastDigitMap[sym],
        repCount: (()=>{ let c=0,ld=a[a.length-1];for(let i=a.length-1;i>=0;i--){if(a[i]===ld)c++;else break;}return c;})(),
        sortScore: pinnedSymbols.has(sym)?Infinity:(isSig?1e9+(strength*(parseFloat(confidence)||0)/100):lastSignalTime[sym]||0)
      };
    }

    function updateFullMarketUI(sym, data) {
      let container = marketContainers[sym];
      if (!container || !data) return;
      // Build innerHTML (only when signal changes or on demand)
      let isSig = data.isSignal;
      container.className = "market " + (isSig?"signal":"") + (pinnedSymbols.has(sym)?" pinned":"");
      // ... (rest of innerHTML update as before)
    }

    // Simplified full render (called on history, selection change, etc)
    function fullRenderAll() {
      let wrap = document.getElementById("markets");
      if(!wrap) return;
      let visible = [];
      document.querySelectorAll('#marketSelectorList .market-checkbox').forEach(cb => { if(cb.checked) visible.push(cb.dataset.sym); });
      if (!visible.length) visible = markets.map(m=>m.sym);
      let arr = [];
      markets.forEach(m => {
        if (!visible.includes(m.sym)) return;
        let data = computeFullMarketData(m.sym);
        if (data) arr.push(data);
      });
      arr.sort((a,b) => b.sortScore - a.sortScore);
      // rebuild DOM (simplified – reuse container creation)
      let desiredIds = arr.map(d => `market-${d.sym}`);
      // Remove old unused containers
      Array.from(wrap.children).filter(el => el.id.startsWith('market-') && !desiredIds.includes(el.id)).forEach(el=>el.remove());
      desiredIds.forEach((id, idx) => {
        let sym = id.replace('market-','');
        let container = document.getElementById(id);
        if (!container) {
          container = document.createElement('div');
          container.id = id;
          container.className = 'market';
          wrap.appendChild(container);
        }
        // Move to correct position
        if (wrap.children[idx] !== container) wrap.insertBefore(container, wrap.children[idx] || null);
        marketContainers[sym] = container;
        // Update inner HTML with full data
        updateFullMarketUI(sym, arr.find(d=>d.sym===sym));
      });
      updateBlinkingStates();
      // Update consensus alert
      let oldAlert = document.getElementById('consensusAlert'); if(oldAlert) oldAlert.remove();
      if(areSignalsReady()){
        let consensus = detectConsensus();
        if(consensus.active){
          let ad = document.createElement('div'); ad.id='consensusAlert'; ad.className='consensus-alert';
          ad.innerHTML = `🤝 CONSENSUS SIGNAL: ${consensus.bias} bias across ${consensus.symbols.join(', ')} (${consensus.symbols.length} markets)`;
          wrap.prepend(ad);
        }
      }
    }

    function updateFullMarketUI(sym, data) {
      let container = marketContainers[sym];
      if (!container || !data) return;
      // (copy full HTML generation from previous renderAllMarkets inner block)
      // For brevity, I'll reuse the same innerHTML logic from earlier, but we will call this only on full refresh.
      container.innerHTML = `...`; // The same long HTML string as before.
    }

    // Override recordSignal to trigger bot
    function recordSignal(symbol,sigType,strength,confidence){
      let id=Date.now()+Math.random();let entry={id,symbol,signalType:sigType,strength,confidence,timestamp:nowStr(),outcome:"pending"};tradeLog.push(entry);if(!marketStats[symbol])marketStats[symbol]={totalSignals:0,wins:0,losses:0};marketStats[symbol].totalSignals++;if(tradeLog.filter(t=>t.outcome!=='pending').length%20===0)recomputeOptimalThresholds();updateRecentSignals();
      handleBotTrade(symbol, sigType);
      setTimeout(()=>resolveSignalOutcome(symbol,sigType,id),150);
      return id;
    }
    function resolveSignalOutcome(symbol,pred,id){let last=lastDigitMap[symbol];if(last===undefined)return;let win=(pred==="BUY EVEN"&&last%2===0)||(pred==="BUY ODD"&&last%2!==0);let trade=tradeLog.find(t=>t.id===id);if(trade&&trade.outcome==="pending"){trade.outcome=win?"win":"loss";if(marketStats[trade.symbol]){if(win)marketStats[trade.symbol].wins++;else marketStats[trade.symbol].losses++;}let cnt=getCounts(symbol),t=cnt.reduce((a,b)=>a+b,0),ep=(cnt[0]+cnt[2]+cnt[4]+cnt[6]+cnt[8])/t*100;mlModel.update(getMLFeatures(symbol,ep,100-ep),win?1:0);updateRecentSignals();}}

    // Bot UI
    function buildBotPanel() { /* same as before */ }
    function updateBotPanel() { /* same as before */ }

    // Market selector & recent signals
    function buildStaticSelector() { /* same as before */ }
    function updateBlinkingStates() { /* same as before */ }
    function buildRecentSignalsPanel() { /* same as before */ }
    function updateRecentSignals() { /* same as before */ }

    // Expose pinning
    window.pinMarketPermanent = (sym) => { if(pinnedSymbols.has(sym)) pinnedSymbols.delete(sym); else pinnedSymbols.add(sym); fullRenderAll(); };
    function recordMLPrediction(sym,prob){ lastMLPredictions[sym]={prob,timestamp:Date.now()}; }
    function computeMLAccuracy(sym){ if(!mlAccuracyHistory[sym]) return 0; let a = mlAccuracyHistory[sym].slice(-50); return a.length?(a.filter(x=>x).length/a.length)*100:0; }

    // ---- WebSocket optimized ----
    ws.onopen = () => {
      ws.send(JSON.stringify({authorize:token}));
      markets.forEach(m => {
        store[m.sym] = []; storeShort[m.sym] = []; storeMedium[m.sym] = []; storeFullHistory[m.sym] = [];
        phaseOneLoaded[m.sym] = false; phaseTwoLoaded[m.sym] = false;
        ws.send(JSON.stringify({ticks_history:m.sym, count:200, end:"latest", style:"ticks"}));
        ws.send(JSON.stringify({ticks:m.sym, subscribe:1}));
      });
    };

    ws.onmessage = (msg) => {
      let d = JSON.parse(msg.data);
      if (d.history) {
        let s = d.echo_req.ticks_history;
        let pip = pipMap[s] || 2;
        let prices = d.history.prices.map(p => parseFloat(p).toFixed(pip));
        let digits = prices.map(p => parseInt(p.slice(-1)));
        if (!phaseOneLoaded[s]) {
          store[s] = digits.slice(-200);
          storeShort[s] = digits.slice(-100);
          storeMedium[s] = digits.slice(-200);
          phaseOneLoaded[s] = true;
          ws.send(JSON.stringify({ticks_history:s, count:1000, end:"latest", style:"ticks"}));
        } else if (!phaseTwoLoaded[s]) {
          store[s] = digits.slice(-1000);
          storeShort[s] = digits.slice(-100);
          storeMedium[s] = digits.slice(-500);
          phaseTwoLoaded[s] = true;
          historyLoaded[s] = true;
          fullRenderAll(); // initial full render when all markets ready? better to call after all loaded
        } else {
          store[s] = digits.slice(-1000);
          storeShort[s] = digits.slice(-100);
          storeMedium[s] = digits.slice(-500);
        }
        storeFullHistory[s] = digits;
        // When all markets are phaseTwoLoaded, trigger a full render
        if (areSignalsReady()) fullRenderAll();
      }
      if (d.tick) {
        let s = d.tick.symbol;
        pipMap[s] = d.tick.pip_size;
        let price = parseFloat(d.tick.quote).toFixed(pipMap[s]);
        let digit = parseInt(price.slice(-1));
        priceMap[s] = price;
        lastDigitMap[s] = digit;
        if (!phaseOneLoaded[s]) return;
        store[s].push(digit); storeShort[s].push(digit); storeMedium[s].push(digit);
        storeFullHistory[s].push(digit);
        if (store[s].length > 1000) store[s].shift();
        if (storeShort[s].length > 100) storeShort[s].shift();
        if (storeMedium[s].length > 500) storeMedium[s].shift();
        if (storeFullHistory[s].length > 5000) storeFullHistory[s].shift();
        // Update ML accuracy
        let lastPred = lastMLPredictions[s];
        if (lastPred) {
          let predEven = lastPred.prob > 0.5, actualEven = digit%2===0;
          if (!mlAccuracyHistory[s]) mlAccuracyHistory[s] = [];
          mlAccuracyHistory[s].push(predEven === actualEven);
          if (mlAccuracyHistory[s].length > 50) mlAccuracyHistory[s].shift();
        }
        // Fast per-tick update: update price and tick grid only
        updateMarketPanel(s);
        // Draw sparkline (lightweight)
        drawSparkline(s);
        // Update heatmap (throttled)
        updateHeatmap(s);
        // After fast update, if signal changed, call full data for that market and update its full UI
        if (phaseTwoLoaded[s]) {
          let fullData = computeFullMarketData(s);
          if (fullData && fullData.isSignal !== previousSignalState[s]) {
            updateFullMarketUI(s, fullData);
            previousSignalState[s] = fullData.isSignal;
            updateBlinkingStates();
          }
          // update strength/confidence text even if no signal change
          if (fullData) updateFullMarketUI(s, fullData); // can be optimized further
        }
        // Also run recordSignal logic within computeFullMarketData (done)
        // Bot trigger handled inside recordSignal which is called from computeFullMarketData.
      }
    };

    // Initialize
    markets.forEach(m => { marketContainers[m.sym] = null; lastSignalTime[m.sym] = 0; });
    buildBotPanel();
    buildStaticSelector();
    buildRecentSignalsPanel();
    document.getElementById('themeToggle').onclick = () => document.body.classList.toggle('light');
    // initial full render will happen after ticks history loaded
  })();
</script>

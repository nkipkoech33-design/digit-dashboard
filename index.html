<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Deriv Digit Analyzer PRO</title>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:Arial;
  margin:0;
}

.header{
  padding:10px;
  background:#020617;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.controls{
  display:flex;
  gap:10px;
}

button, select{
  padding:5px;
  cursor:pointer;
}

.container{
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.market{
  border:1px solid #1e293b;
  padding:8px;
  border-radius:8px;
  background:#020617;
  transition:0.3s;
}

.blink{
  animation:blink 1s infinite;
}

@keyframes blink{
  0%{background:#020617;}
  50%{background:#78350f;}
  100%{background:#020617;}
}

/* POINTER JUMP */
.pointer{
  position:absolute;
  top:-12px;
  left:50%;
  transform:translateX(-50%);
  font-size:12px;
  color:yellow;
  animation:jump 0.3s ease;
}

@keyframes jump{
  0%{transform:translate(-50%,0);}
  50%{transform:translate(-50%,-8px);}
  100%{transform:translate(-50%,0);}
}

.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:4px;
  margin-top:6px;
}

.box{
  background:#1e293b;
  padding:4px;
  font-size:11px;
  text-align:center;
  border-radius:4px;
  position:relative;
}

.tick{
  font-family:monospace;
  margin-top:6px;
  display:grid;
  grid-template-columns:repeat(50, 1fr);
  gap:2px;
}

.tick span{
  font-size:10px;
  text-align:center;
}

.e{color:lime;}
.o{color:red;}

.win{
  margin-top:5px;
  font-size:12px;
}

/* SIGNAL */
.signal{
  margin-top:5px;
  font-weight:bold;
}

.buy-even{color:lime;}
.buy-odd{color:red;}
.wait{color:gray;}

</style>
</head>

<body>

<div class="header">
  <h3>Digit Analyzer PRO</h3>

  <div class="controls">
    <select id="viewMode">
      <option value="all">All Markets</option>
      <option value="two">2 Markets Only</option>
    </select>

    <button id="muteBtn">🔊 Sound ON</button>
  </div>
</div>

<div class="container" id="markets"></div>

<script>

const markets = [
  {sym:"R_10", name:"Volatility 10 Index"},
  {sym:"R_25", name:"Volatility 25 Index"},
  {sym:"R_50", name:"Volatility 50 Index"},
  {sym:"R_75", name:"Volatility 75 Index"},
  {sym:"R_100", name:"Volatility 100 Index"},
  {sym:"1HZ10V", name:"Volatility 10 (1s) Index"},
  {sym:"1HZ25V", name:"Volatility 25 (1s) Index"},
  {sym:"1HZ50V", name:"Volatility 50 (1s) Index"},
  {sym:"1HZ75V", name:"Volatility 75 (1s) Index"},
  {sym:"1HZ100V", name:"Volatility 100 (1s) Index"},
  {sym:"JD10", name:"Jump 10 Index"},
  {sym:"JD25", name:"Jump 25 Index"},
  {sym:"JD50", name:"Jump 50 Index"},
  {sym:"JD75", name:"Jump 75 Index"},
  {sym:"JD100", name:"Jump 100 Index"},
  {sym:"JD200", name:"Jump 200 Index"},
  {sym:"JD300", name:"Jump 300 Index"},
  {sym:"JD400", name:"Jump 400 Index"}
];

let dataStore = {};
let lastDigitMap = {};
let soundOn = true;

document.getElementById("muteBtn").onclick = () => {
  soundOn = !soundOn;
  document.getElementById("muteBtn").innerText = soundOn ? "🔊 Sound ON" : "🔇 Muted";
};

let ws = new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");

ws.onopen = () => {
  markets.forEach(m=>{
    ws.send(JSON.stringify({ticks:m.sym, subscribe:1}));
    dataStore[m.sym]=[];
  });
};

ws.onmessage = (msg)=>{
  let data = JSON.parse(msg.data);

  if(data.tick){
    let sym = data.tick.symbol;
    let digit = parseInt(data.tick.quote.toString().slice(-1));

    lastDigitMap[sym] = digit;

    let arr = dataStore[sym];
    arr.push(digit);

    if(arr.length>1000) arr.shift();

    render();
  }
};

function analyze(arr){
  let counts = Array(10).fill(0);

  arr.forEach(d=>counts[d]++);

  let total = arr.length || 1;

  let perc = counts.map(c=> (c/total*100).toFixed(1));

  let even = 0, odd = 0;
  counts.forEach((c,i)=>{
    if(i%2==0) even+=c;
    else odd+=c;
  });

  even = (even/total*100).toFixed(1);
  odd = (odd/total*100).toFixed(1);

  return {perc,even,odd};
}

function render(){

  let container = document.getElementById("markets");
  container.innerHTML="";

  let mode = document.getElementById("viewMode").value;
  let list = [...markets];

  if(mode==="two") list = list.slice(0,2);

  let priority = [];

  list.forEach(m=>{
    let arr = dataStore[m.sym];
    if(!arr || arr.length<10) return;

    let {perc,even,odd} = analyze(arr);

    let evenDom = even > odd && perc.filter((p,i)=>i%2!=0).every(p=>p<10);
    let oddDom = odd > even && perc.filter((p,i)=>i%2==0).every(p=>p<10);

    if(evenDom || oddDom){
      priority.unshift(m); // move to top
    } else {
      priority.push(m);
    }
  });

  priority.forEach(m=>{

    let arr = dataStore[m.sym];
    if(!arr || arr.length<10) return;

    let {perc,even,odd} = analyze(arr);
    let lastDigit = lastDigitMap[m.sym];

    let last50 = arr.slice(-50);
    while(last50.length < 50) last50.unshift(0);

    let marketDiv = document.createElement("div");
    marketDiv.className="market";

    let evenDom = even > odd && perc.filter((p,i)=>i%2!=0).every(p=>p<10);
    let oddDom = odd > even && perc.filter((p,i)=>i%2==0).every(p=>p<10);

    let signal = "WAIT";
    let signalClass = "wait";

    if(evenDom){
      signal = "BUY EVEN";
      signalClass = "buy-even";
      marketDiv.classList.add("blink");
      if(soundOn) beep();
    }

    if(oddDom){
      signal = "BUY ODD";
      signalClass = "buy-odd";
      marketDiv.classList.add("blink");
      if(soundOn) beep();
    }

    marketDiv.innerHTML = `
      <b>${m.name}</b>

      <div class="signal ${signalClass}">
        ${signal}
      </div>

      <div class="win">
        Even: ${even}% | Odd: ${odd}%
      </div>

      <div class="grid">
        ${[0,2,4,6,8].map(i=>box(i,perc,lastDigit)).join("")}
      </div>

      <div class="grid">
        ${[1,3,5,7,9].map(i=>box(i,perc,lastDigit)).join("")}
      </div>

      <div class="tick">
        ${last50.map(d=> 
          d%2==0 
          ? `<span class="e">E</span>` 
          : `<span class="o">O</span>`
        ).join("")}
      </div>
    `;

    container.appendChild(marketDiv);
  });
}

function box(i,perc,lastDigit){

  let p = parseFloat(perc[i]);
  let color = "#1e293b";

  let sorted = [...perc].map(Number).sort((a,b)=>b-a);

  if(p===sorted[0]) color="green";
  else if(p===sorted[1]) color="blue";
  else if(p===sorted[sorted.length-1]) color="red";
  else if(p===sorted[sorted.length-2]) color="orange";

  return `
    <div class="box" style="background:${color}">
      ${i}<br>${perc[i]}%
      ${i===lastDigit ? '<div class="pointer">▲</div>' : ''}
    </div>
  `;
}

function beep(){
  let ctx = new AudioContext();
  let osc = ctx.createOscillator();
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.08);
}

</script>

</body>
</html>

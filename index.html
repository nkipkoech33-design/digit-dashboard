<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Digit Analyzer FINAL</title>

<style>
body{background:#0f172a;color:white;font-family:Arial;margin:0;}
.wrapper{display:flex;}

.left{width:70%;padding:10px;display:flex;flex-direction:column;gap:8px;}
.right{width:30%;border-left:1px solid #1e293b;padding:10px;background:#020617;}

.market{border:1px solid #1e293b;padding:6px;border-radius:6px;cursor:pointer;}
.market.active{border:2px solid yellow;}

.price{color:#38bdf8;font-size:11px;}

.grid{display:grid;grid-template-columns:repeat(5,auto);gap:4px;margin-top:5px;}

.box{
  width:2.5cm;
  height:2.5cm;
  border-radius:6px;
  position:relative;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* COLORS */
.most{background:green;}
.second{background:blue;}
.least{background:red;}
.secondLeast{background:orange;}

.digit{
  font-size:36px;
  font-weight:bold;
}

.percent{
  font-size:12px;
}

/* POINTER */
.pointer{
  position:absolute;
  top:3px;
  left:50%;
  transform:translateX(-50%);
  font-size:16px;
  font-weight:bold;
}
.pointer.even{color:lime;}
.pointer.odd{color:red;}

/* REPEAT */
.repeat{
  animation:pulse 0.4s infinite;
  box-shadow:0 0 15px 4px yellow;
}

.repeat-count{
  position:absolute;
  top:3px;
  right:4px;
  font-size:12px;
  font-weight:bold;
  color:yellow;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

.tick{
  display:grid;
  grid-template-columns:repeat(50,1fr);
  gap:1px;
  margin-top:6px;
  font-size:10px;
}

.e{color:lime;}
.o{color:red;}
</style>
</head>

<body>

<div class="wrapper">
<div class="left" id="markets"></div>
<div class="right"></div>
</div>

<script>

const markets=[
"R_10","R_25","R_50","R_75","R_100",
"1HZ10V","1HZ15V","1HZ25V","1HZ30V","1HZ50V",
"1HZ75V","1HZ90V","1HZ100V",
"JD10","JD25","JD50","JD75","JD100"
];

let dataStore={};
let lastPriceMap={};

let ws=new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");

ws.onopen=()=>{
markets.forEach(m=>{
dataStore[m]=[];
ws.send(JSON.stringify({ticks:m,subscribe:1}));
});
};

ws.onmessage=(msg)=>{
let data=JSON.parse(msg.data);

if(data.tick){
let sym=data.tick.symbol;
let price=data.tick.quote.toString();
let digit=parseInt(price.slice(-1));

lastPriceMap[sym]=parseFloat(price).toFixed(2);

let arr=dataStore[sym];
arr.push(digit);
if(arr.length>1000) arr.shift();

render();
}
};

function getRepeat(arr){
let last=arr[arr.length-1];
let c=0;
for(let i=arr.length-1;i>=0;i--){
if(arr[i]===last) c++;
else break;
}
return c;
}

function render(){
let container=document.getElementById("markets");
container.innerHTML="";

markets.forEach(m=>{
let arr=dataStore[m];
if(arr.length<20) return;

let counts=Array(10).fill(0);
arr.forEach(d=>counts[d]++);

let total=arr.length;
let perc=counts.map(c=>((c/total)*100).toFixed(1));

let sorted=[...counts].map((v,i)=>({v,i})).sort((a,b)=>b.v-a.v);

let most=sorted[0].i;
let second=sorted[1].i;
let least=sorted[9].i;
let secondLeast=sorted[8].i;

let lastDigit=arr[arr.length-1];
let repeat=getRepeat(arr);

let ticks=arr.slice(-50).map(d=>
`<span class="${d%2==0?'e':'o'}">${d%2==0?'E':'O'}</span>`
).join("");

function box(i){

let cls="";
if(i===most) cls="most";
else if(i===second) cls="second";
else if(i===least) cls="least";
else if(i===secondLeast) cls="secondLeast";

let pointer=i===lastDigit
?`<div class="pointer ${i%2==0?'even':'odd'}">▲</div>`:"";

let repeatFx=(i===lastDigit && repeat>=2)?"repeat":"";
let counter=(i===lastDigit && repeat>=2)?`<div class="repeat-count">x${repeat}</div>`:"";

return `
<div class="box ${cls} ${repeatFx}">
${pointer}
${counter}
<div class="digit">${i}</div>
<div class="percent">${perc[i]}%</div>
</div>`;
}

let div=document.createElement("div");
div.className="market";

div.innerHTML=`
<b>${m}</b>
<div class="price">Price: ${lastPriceMap[m]}</div>

<div class="grid">${[0,2,4,6,8].map(box).join("")}</div>
<div class="grid">${[1,3,5,7,9].map(box).join("")}</div>

<div class="tick">${ticks}</div>
`;

container.appendChild(div);

});
}

</script>

</body>
</html>

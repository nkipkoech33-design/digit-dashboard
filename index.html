<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>TAJIRI TRADERS – Deriv Pro</title>
<style>
  :root {
    --bg-body: #0b1120;
    --bg-card: #111827;
    --bg-header: #1e293b;
    --bg-panel: #0a0f1c;
    --bg-digit: #1e293b;
    --border-color: #2d3a4e;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --price-color: #facc15;
    --status-green-bg: #0a2f1a;
    --status-red-bg: #450a0a;
    --signal-bg: #2e1e3e;
    --signal-strong-bg: #3b0f3b;
    --strength-meter-bg: #334155;
    --strength-fill: #4ade80;
    --btn-bg: #3b82f6;
    --btn-hover: #2563eb;
    --trade-active: #10b981;
    --majority-blink: #06b6d4;
    --hybrid-blink: #a855f7;
    --percent-accent: #facc15;
    --digit-size: 1.6rem;
    --last-digit-bg: #0f172a;
    --saturation-warning: #b45309;
    --saturation-critical: #991b1b;
    --reversal-strong-bg: #0f3b2c;
    --reversal-strong-text: #a3e635;
  }
  body.light {
    --bg-body: #f8fafc;
    --bg-card: #ffffff;
    --bg-header: #e2e8f0;
    --bg-panel: #f1f5f9;
    --bg-digit: #ffffff;
    --border-color: #cbd5e1;
    --text-primary: #0f172a;
    --text-secondary: #475569;
    --price-color: #0f172a;
    --status-green-bg: #dcfce7;
    --status-red-bg: #fee2e2;
    --signal-bg: #dbeafe;
    --signal-strong-bg: #bfdbfe;
    --strength-meter-bg: #cbd5e1;
    --strength-fill: #15803d;
    --btn-bg: #2563eb;
    --btn-hover: #1d4ed8;
    --trade-active: #059669;
    --majority-blink: #0891b2;
    --hybrid-blink: #9333ea;
    --percent-accent: #b45309;
    --last-digit-bg: #e2e8f0;
    --saturation-warning: #f59e0b;
    --saturation-critical: #dc2626;
    --reversal-strong-bg: #bbf7d0;
    --reversal-strong-text: #166534;
  }
  * { box-sizing: border-box; transition: background 0.2s, color 0.2s; }
  body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg-body); color: var(--text-primary); margin: 0; padding: 1rem; font-size: 14px; }
  .container { max-width: 1800px; margin: 0 auto; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }
  .market-type-selector, .indicator-selector { display: flex; gap: 0.5rem; background: var(--bg-header); padding: 0.3rem 0.8rem; border-radius: 2rem; margin-right: 0.5rem; flex-wrap: wrap; }
  .market-btn, .indicator-btn { background: none; border: none; font-size: 0.85rem; padding: 0.3rem 0.8rem; border-radius: 1.5rem; cursor: pointer; opacity: 0.6; font-weight: bold; color: var(--text-primary); }
  .market-btn.active, .indicator-btn.active { opacity: 1; background: var(--trade-active); box-shadow: 0 0 4px currentColor; }
  .status-bar { background: var(--bg-header); padding: 0.4rem 1rem; border-radius: 2rem; display: inline-block; font-size: 0.75rem; margin-bottom: 0.8rem; }
  .mode-toggle { background: var(--btn-bg); border: none; padding: 0.3rem 0.8rem; border-radius: 2rem; color: white; cursor: pointer; font-weight: bold; margin-left: 0.5rem; }
  .mode-toggle:hover { background: var(--btn-hover); }
  .controls { background: var(--bg-header); padding: 0.8rem; border-radius: 1.5rem; margin-bottom: 1.5rem; display: flex; flex-wrap: wrap; gap: 0.8rem; align-items: flex-end; }
  .input-group { flex: 2; min-width: 120px; }
  .input-group label { display: block; font-size: 0.65rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 0.2rem; }
  .token-input, .setting-input { width: 100%; background: var(--bg-body); border: 1px solid var(--border-color); padding: 0.4rem 0.6rem; border-radius: 2rem; color: var(--text-primary); font-size: 0.8rem; }
  .setting-input { width: auto; display: inline-block; margin: 0 0.2rem; text-align: center; }
  .connect-btn { background: var(--btn-bg); border: none; padding: 0.4rem 1rem; border-radius: 2rem; font-weight: bold; color: white; cursor: pointer; font-size: 0.8rem; }
  .connect-btn:hover { background: var(--btn-hover); }

  .main-layout { display: flex; gap: 1rem; align-items: flex-start; }
  .market-grid-container { flex: 3; min-width: 0; }
  .market-grid { display: flex; flex-direction: column; gap: 1rem; }
  .all-markets-panel {
    flex: 1;
    background: var(--bg-header);
    border-radius: 1rem;
    padding: 0.5rem;
    border-left: 4px solid #facc15;
    position: sticky;
    top: 1rem;
    align-self: flex-start;
  }
  .all-markets-panel h3 { font-size: 0.8rem; margin: 0 0 0.3rem 0; padding-left: 0.3rem; }
  .markets-list { display: flex; flex-direction: column; gap: 0.3rem; }
  .market-list-item {
    background: var(--bg-panel);
    padding: 0.2rem 0.5rem;
    border-radius: 0.8rem;
    font-weight: bold;
    cursor: pointer;
    font-size: 0.75rem;
    white-space: nowrap;
    overflow-x: auto;
  }
  .market-list-item:hover { background: var(--btn-bg); color: white; }
  @keyframes blinkYellow { 0% { background: var(--bg-panel); color: var(--text-primary); } 50% { background: #facc15; color: #0f172a; } 100% { background: var(--bg-panel); color: var(--text-primary); } }
  @keyframes blinkCyan { 0% { background: var(--bg-panel); color: var(--text-primary); } 50% { background: var(--majority-blink); color: white; } 100% { background: var(--bg-panel); color: var(--text-primary); } }
  @keyframes blinkPurple { 0% { background: var(--bg-panel); color: var(--text-primary); } 50% { background: var(--hybrid-blink); color: white; } 100% { background: var(--bg-panel); color: var(--text-primary); } }
  .market-list-item.blink-arrow { animation: blinkYellow 1s infinite; }
  .market-list-item.blink-majority { animation: blinkCyan 1s infinite; }
  .market-list-item.blink-hybrid { animation: blinkPurple 1s infinite; }
  .highlight-market { box-shadow: 0 0 0 2px #facc15, 0 0 0 4px rgba(250, 204, 21, 0.3); transition: box-shadow 0.3s; }
  .market-card { background: var(--bg-card); border-radius: 1rem; border: 1px solid var(--border-color); overflow: hidden; cursor: pointer; }
  .market-card:hover { filter: brightness(1.05); }
  .market-header { 
    background: var(--bg-header); 
    padding: 0.3rem 0.8rem; 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    gap: 0.3rem; 
    flex-wrap: wrap; 
  }
  .market-title { font-size: 0.85rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
  .live-price-big { font-size: 0.9rem; font-weight: 600; font-family: monospace; background: var(--bg-body); padding: 0.05rem 0.4rem; border-radius: 0.8rem; color: var(--price-color); display: inline-block; margin: 0 0.1rem; }
  .live-tick-badge { background: #0f172a; padding: 0.1rem 0.5rem; border-radius: 2rem; font-size: 0.6rem; font-weight: bold; color: #4ade80; }
  .last-digit-badge {
    font-size: 2rem;
    font-weight: 800;
    font-family: monospace;
    margin-left: auto;
    background: var(--last-digit-bg);
    padding: 0.1rem 0.8rem;
    border-radius: 1.5rem;
    color: var(--price-color);
    border: 1px solid var(--price-color);
    line-height: 1;
    letter-spacing: 1px;
    min-width: 60px;
    text-align: center;
  }
  .market-status { font-size: 0.6rem; padding: 0.1rem 0.4rem; border-radius: 2rem; }
  .status-red { color: #f87171; background: var(--status-red-bg); }
  .status-green { color: #4ade80; background: var(--status-green-bg); }
  
  .digits-grid { display: flex; flex-direction: column; gap: 4px; padding: 0.5rem; background: var(--bg-body); }
  .digits-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .digit-cell { 
    background: var(--bg-digit); 
    border-radius: 0.7rem; 
    padding: 0.2rem 0.1rem; 
    text-align: center; 
    position: relative; 
    border: 1px solid var(--border-color);
  }
  .digit-cell span.digit { 
    font-size: var(--digit-size, 1.6rem);
    font-weight: 800; 
    display: block; 
    line-height: 1.1;
  }
  .digit-cell .percent { 
    font-size: 0.7rem; 
    font-weight: 800; 
    color: var(--percent-accent);
    background: rgba(0,0,0,0.2);
    display: inline-block;
    padding: 0.05rem 0.3rem;
    border-radius: 20px;
    margin-top: 2px;
  }
  .digit-cell .trend { font-size: 0.7rem; margin-left: 2px; }
  .pointer-marker { position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); width: 20px; height: 3px; background: #ffcc00; border-radius: 3px; }
  .most { background: linear-gradient(145deg, #15803d, #0f5a2e); border-color: #4ade80; }
  .second { background: linear-gradient(145deg, #1e40af, #152e7a); border-color: #60a5fa; }
  .least { background: linear-gradient(145deg, #b91c1c, #7f1414); border-color: #f87171; }
  .secondleast { background: linear-gradient(145deg, #c2410c, #7a2b0a); border-color: #fb923c; }
  .hot { box-shadow: 0 0 6px #facc15; border-color: #facc15; }
  .cold { opacity: 0.6; }
  
  .info-row { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 0.4rem; padding: 0.3rem 0.5rem; background: var(--bg-body); font-size: 0.65rem; border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); }
  .parity-stats, .streak-stats, .prediction-box, .evenodd-winrate { background: var(--bg-panel); padding: 0.1rem 0.3rem; border-radius: 0.8rem; }
  .letter-sequence-wrapper { padding: 0.2rem 0.5rem; background: var(--bg-body); border-bottom: 1px solid var(--border-color); }
  .letter-sequence { font-size: 0.9rem; padding: 0.2rem; margin-bottom: 0.1rem; }
  .signal-area { padding: 0.3rem 0.5rem; text-align: center; background: var(--bg-body); border-bottom: 1px solid var(--border-color); }
  .signal-flash { padding: 3px 6px; font-size: 0.7rem; }
  .strength-meter { width: 70px; height: 5px; margin-left: 5px; }
  .vote-btn { padding: 1px 4px; font-size: 0.6rem; }
  .prediction-digit { font-size: 1rem; padding: 0 0.2rem; }
  
  .pattern-preview, .saturation-alert, .multi-tf-progress {
    background: var(--bg-panel);
    border-radius: 0.7rem;
    padding: 0.3rem;
    margin: 0.3rem 0.5rem;
    font-size: 0.7rem;
    text-align: center;
    border-top: 1px solid var(--border-color);
  }
  .saturation-alert.warning { background: var(--saturation-warning); color: black; }
  .saturation-alert.critical { background: var(--saturation-critical); color: white; font-weight: bold; }
  .multi-tf-progress.strong { 
    background: var(--reversal-strong-bg); 
    color: var(--reversal-strong-text);
    font-weight: bold;
  }
  .pattern-last4 { display: flex; justify-content: center; gap: 0.3rem; margin-bottom: 0.2rem; }
  .pattern-badge { padding: 0.1rem 0.3rem; border-radius: 0.8rem; font-size: 0.7rem; }
  .pattern-rule { margin-top: 0.1rem; }
  
  .tf-list {
    text-align: left;
    font-size: 0.7rem;
    line-height: 1.3;
    margin: 0.2rem 0;
  }
  .tf-line {
    display: flex;
    justify-content: space-between;
    padding: 0.1rem 0.2rem;
  }
  .tf-label {
    font-weight: bold;
  }
  .tf-parity {
    font-weight: bold;
  }
  .tf-percent {
    font-family: monospace;
  }
  
  @media (max-width: 900px) { 
    .main-layout { flex-direction: column; } 
    .all-markets-panel { position: static; width: 100%; margin-top: 0.5rem; } 
    :root { --digit-size: 1.3rem; } 
    .last-digit-badge { font-size: 1.5rem; min-width: 50px; padding: 0.05rem 0.5rem; }
    .digit-cell .percent { font-size: 0.6rem; }
    .live-price-big { font-size: 0.8rem; }
    .tf-line { font-size: 0.65rem; }
  }
  @media (max-width: 700px) { 
    .last-digit-badge { font-size: 1.2rem; min-width: 40px; }
    .digit-cell span.digit { font-size: 1.1rem; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <h1 style="font-size:1.4rem;">✨ WELCOME TO TAJIRI TRADERS ✨</h1>
    <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
      <div class="market-type-selector">
        <button class="market-btn active" data-market="evenodd">🎲 Even/Odd</button>
        <button class="market-btn" data-market="overunder">📊 Over/Under</button>
        <button class="market-btn" data-market="differs">🔄 Match Only</button>
        <button class="market-btn" data-market="digit">🎯 Digit</button>
      </div>
      <div class="indicator-selector">
        <button class="indicator-btn" data-indicator="arrow">⬆️ Arrow</button>
        <button class="indicator-btn" data-indicator="majority">📈 Majority</button>
        <button class="indicator-btn active" data-indicator="hybrid">🔮 Hybrid</button>
      </div>
      <button class="mode-toggle" onclick="toggleMode()">🌓 Dark/Light</button>
    </div>
  </div>
  <div class="status-bar" id="connectionStatus">⚫ Disconnected</div>

  <div class="controls">
    <div class="input-group"><label>🔑 API TOKEN</label><input type="password" id="token" class="token-input" placeholder="Enter your Deriv API token"></div>
    <div class="input-group"><label>🔊 Sound</label><select id="soundEnabled" class="setting-input" style="width:60px"><option value="true">ON</option><option value="false">OFF</option></select></div>
    <div class="input-group"><label>📊 Window Size</label><input type="number" id="windowSize" class="setting-input" value="1000" style="width:70px"></div>
    <div class="input-group"><label>🎯 Majority %</label><input type="number" id="majorityThreshold" class="setting-input" value="65" style="width:60px"></div>
    <div class="input-group"><label>📈 Trend Filter</label><select id="trendFilter" class="setting-input" style="width:60px"><option value="true">ON</option><option value="false">OFF</option></select></div>
    <div class="input-group"><label>📊 Volatility Thresh</label><input type="number" id="volatilityThresh" class="setting-input" value="2.5" step="0.1" style="width:60px"></div>
    <div class="input-group"><label>🚫 Rejection Streak</label><input type="number" id="rejectionStreak" class="setting-input" value="2" style="width:60px"></div>
    <div class="input-group" id="lookaheadGroup" style="display:none;"><label>⏩ Lookahead</label><select id="lookaheadTicks"><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></div>
    <button onclick="connectWebSocket()" class="connect-btn">🚀 CONNECT</button>
  </div>

  <div class="main-layout">
    <div class="market-grid-container"><div id="marketsContainer" class="market-grid"></div></div>
    <div id="allMarketsPanel" class="all-markets-panel">
      <h3>📋 ALL MARKETS</h3>
      <div id="marketsListContainer" class="markets-list"></div>
    </div>
  </div>
  <footer style="font-size:0.7rem; margin-top:0.8rem;">⚡ Live ticks | Clean UI – saturation alerts only when detected</footer>
</div>
<div id="marketModal" class="modal"><div class="modal-content"><span class="close-modal">&times;</span><h2 id="modalTitle"></h2><div id="modalBody"></div></div></div>

<script>
  // ============ CORE SCRIPT (Clean UI, Even/Odd win rate over full window) ============
  const DECIMAL_MAP = { "1HZ10V":2,"1HZ15V":3,"1HZ25V":2,"1HZ30V":3,"1HZ50V":2,"1HZ75V":2,"1HZ90V":3,"1HZ100V":2,"R_10":3,"R_25":3,"R_50":4,"R_75":4,"R_100":2,"JD10":2,"JD25":2,"JD50":2,"JD75":2,"JD100":2 };
  const MARKET_NAMES = { "1HZ10V":"Vol 10 (1s)","1HZ15V":"Vol 15 (1s)","1HZ25V":"Vol 25 (1s)","1HZ30V":"Vol 30 (1s)","1HZ50V":"Vol 50 (1s)","1HZ75V":"Vol 75 (1s)","1HZ90V":"Vol 90 (1s)","1HZ100V":"Vol 100 (1s)","R_10":"Vol 10","R_25":"Vol 25","R_50":"Vol 50","R_75":"Vol 75","R_100":"Vol 100","JD10":"Jump 10","JD25":"Jump 25","JD50":"Jump 50","JD75":"Jump 75","JD100":"Jump 100" };
  const ALL_SYMBOLS = Object.keys(MARKET_NAMES);
  const SIGNAL_LOCK_DURATION = 60000;
  let marketData = {};
  let signalExpiry = {};
  let activeSignalMsg = {};
  let ws = null;
  let invalidSymbols = new Set();
  let lockedMarkets = new Map();
  let rawTrend = {};
  let signalHistory = {};
  let currentMarket = 'evenodd';
  let currentIndicator = 'hybrid';
  let pendingConfirmation = {};

  function getSettings() {
    return {
      soundEnabled: document.getElementById('soundEnabled').value === 'true',
      majorityWindow: 20,
      majorityThreshold: parseInt(document.getElementById('majorityThreshold').value) || 65,
      trendFilterEnabled: document.getElementById('trendFilter').value === 'true',
      volatilityThresh: parseFloat(document.getElementById('volatilityThresh').value) || 2.5,
      rejectionStreak: parseInt(document.getElementById('rejectionStreak').value) || 2,
      lookaheadTicks: currentMarket === 'digit' ? 1 : 1,
      windowSize: parseInt(document.getElementById('windowSize').value) || 1000
    };
  }

  function lastDigitFromFormatted(str) { let digits = str.replace(/\./g,''); if(digits.length===0) return 0; return parseInt(digits.charAt(digits.length-1),10)||0; }
  function formatHistoryPrice(s, p) { let dec = DECIMAL_MAP[s] ?? 2; return p.toFixed(dec); }

  // Even/Odd win rate over full rolling window (up to 1000 ticks)
  function updateEvenOddWinRate(symbol) {
    let data = marketData[symbol];
    let container = document.getElementById(`evenOddWinrate_${symbol}`);
    if (!container) return;
    if (currentMarket !== 'evenodd') {
      container.innerHTML = '';
      return;
    }
    if (!data || data.rollingArray.length === 0) {
      container.innerHTML = '⏳';
      return;
    }
    let total = data.rollingArray.length;
    let evens = data.rollingArray.filter(d => d % 2 === 0).length;
    let odds = total - evens;
    let evenPct = (evens / total) * 100;
    let oddPct = (odds / total) * 100;
    container.innerHTML = `<span style="color:#4ade80;">🎲 Even ${evenPct.toFixed(1)}%</span> | <span style="color:#f87171;">Odd ${oddPct.toFixed(1)}%</span>`;
  }

  function getVolatility(symbol) {
    let data = marketData[symbol];
    if(!data || data.last50Array.length < 20) return 0;
    let last20 = data.last50Array.slice(-20);
    let mean = last20.reduce((a,b)=>a+b,0)/20;
    let sqDiff = last20.map(v=>Math.pow(v-mean,2));
    let variance = sqDiff.reduce((a,b)=>a+b,0)/20;
    return Math.sqrt(variance);
  }

  function getLongTermTrend(symbol) {
    let data = marketData[symbol];
    if(!data || data.rollingArray.length < 100) return null;
    let last100 = data.rollingArray.slice(-100);
    if(currentMarket === 'evenodd') {
      let even = last100.filter(d=>d%2===0).length;
      let odd = last100.length - even;
      return even > odd ? "EVEN" : "ODD";
    } else if(currentMarket === 'overunder') {
      let over = last100.filter(d=>d>=5).length;
      let under = last100.length - over;
      return over > under ? "OVER" : "UNDER";
    } else if(currentMarket === 'differs') {
      let digits = data.rollingArray.slice(-101);
      let changes = [];
      for(let i=1;i<digits.length;i++) changes.push(digits[i] !== digits[i-1] ? 1 : 0);
      let recentChanges = changes.slice(-100);
      let matches = recentChanges.filter(c=>c===0).length;
      let differs = recentChanges.length - matches;
      return matches > differs ? "MATCH" : "DIFFERS";
    } else {
      let counts = new Array(10).fill(0);
      last100.forEach(d=>counts[d]++);
      let maxCount = Math.max(...counts);
      return counts.indexOf(maxCount).toString();
    }
  }

  function updateTrends(symbol) {
    let data = marketData[symbol];
    if(!data || data.rollingArray.length < 20) return;
    let last10 = data.rollingArray.slice(-10), prev10 = data.rollingArray.slice(-20,-10);
    let lastCounts = new Array(10).fill(0), prevCounts = new Array(10).fill(0);
    last10.forEach(d=>lastCounts[d]++); prev10.forEach(d=>prevCounts[d]++);
    let trends = {};
    for(let d=0;d<10;d++) {
      let diff = (lastCounts[d]/10) - (prevCounts[d]/10);
      if(diff > 0.08) trends[d]=1;
      else if(diff < -0.08) trends[d]=-1;
      else trends[d]=0;
    }
    rawTrend[symbol] = trends;
    return trends;
  }

  function getRollingCounts(symbol) {
    let data = marketData[symbol];
    if(!data || data.rollingArray.length === 0) return null;
    let windowSize = getSettings().windowSize;
    let arr = data.rollingArray.slice(-windowSize);
    let counts = new Array(10).fill(0);
    for(let d of arr) counts[d]++;
    let total = arr.length;
    return { counts, total };
  }

  function getDigitRanksAndPct(symbol) {
    let rolling = getRollingCounts(symbol);
    if(!rolling || rolling.total === 0) return null;
    let { counts, total } = rolling;
    let pct = counts.map(c => (c / total) * 100);
    let arr = counts.map((c,i)=>({digit:i, count:c, pct:pct[i]}));
    let sorted = [...arr].sort((a,b)=>b.count - a.count);
    let most = sorted[0].digit, mostPct = sorted[0].pct;
    let secondMost = sorted[1]?.digit ?? most, secondMostPct = sorted[1]?.pct ?? mostPct;
    let least = sorted[sorted.length-1].digit, leastPct = sorted[sorted.length-1].pct;
    let secondLeast = sorted[sorted.length-2]?.digit ?? least, secondLeastPct = sorted[sorted.length-2]?.pct ?? leastPct;
    return { most, secondMost, least, secondLeast, mostPct, secondMostPct, leastPct, secondLeastPct, total, allPct: pct };
  }

  function checkEvenOddRankCondition(symbol, predictedParity) {
    let ranks = getDigitRanksAndPct(symbol);
    if(!ranks) return false;
    let { allPct } = ranks;

    if(last50.length>0){
      if(currentMarket === 'evenodd') {
        let evenCnt = last50.filter(d=>d%2===0).length, evenPct = ((evenCnt/last50.length)*100).toFixed(1);
        let paritySpan = document.getElementById(`parityStats_${symbol}`); if(paritySpan) paritySpan.innerHTML = `🎲 E:${evenPct}% O:${(100-evenPct).toFixed(1)}%`;
        let streak=1, lastParity=last50[last50.length-1]%2===0?'E':'O';
        for(let i=last50.length-2;i>=0;i--) if((last50[i]%2===0?'E':'O')===lastParity) streak++; else break;
        let streakSpan = document.getElementById(`streakStats_${symbol}`); if(streakSpan) streakSpan.innerHTML = `📊 Streak: ${streak}x ${lastParity}`;
        let parityLetters = last50.map(d=>d%2===0?'<span style="color:#4ade80;">E</span>':'<span style="color:#f87171;">O</span>').join('');
        let paritySeqDiv = document.getElementById(`paritySeq_${symbol}`); if(paritySeqDiv) paritySeqDiv.innerHTML = parityLetters;
        let ouSeqDiv = document.getElementById(`ouSeq_${symbol}`); if(ouSeqDiv) ouSeqDiv.innerHTML = '';
      } else if(currentMarket === 'overunder') {
        let coloredLetters = last50.map(d => d <= 3 ? `<span style="color:#f87171;">U</span>` : d <= 5 ? `<span style="color:#3b82f6;">M</span>` : `<span style="color:#4ade80;">O</span>`).join('');
        let ouSeqDiv = document.getElementById(`ouSeq_${symbol}`); if(ouSeqDiv) ouSeqDiv.innerHTML = coloredLetters;
        let paritySeqDiv = document.getElementById(`paritySeq_${symbol}`); if(paritySeqDiv) paritySeqDiv.innerHTML = '';
        let overCnt = last50.filter(d=>d>=5).length, overPct = ((overCnt/last50.length)*100).toFixed(1);
        let paritySpan = document.getElementById(`parityStats_${symbol}`); if(paritySpan) paritySpan.innerHTML = `📈 Over 4: ${overPct}% | Under 5: ${(100-overPct).toFixed(1)}%`;
        let streak=1, lastOU=last50[last50.length-1]>=5?'O':'U';
        for(let i=last50.length-2;i>=0;i--) if((last50[i]>=5?'O':'U')===lastOU) streak++; else break;
        let streakSpan = document.getElementById(`streakStats_${symbol}`); if(streakSpan) streakSpan.innerHTML = `📊 Streak: ${streak}x ${lastOU}`;
      } else {
        let coloredDigits = last50.map(d => { let color = d<=3?'#f87171':d<=5?'#3b82f6':'#4ade80'; return `<span style="color:${color}; font-weight:bold;">${d}</span>`; }).join('');
        let paritySeqDiv = document.getElementById(`paritySeq_${symbol}`); if(paritySeqDiv) paritySeqDiv.innerHTML = coloredDigits;
        let ouSeqDiv = document.getElementById(`ouSeq_${symbol}`); if(ouSeqDiv) ouSeqDiv.innerHTML = '';
        let paritySpan = document.getElementById(`parityStats_${symbol}`); if(paritySpan) paritySpan.innerHTML = `🎯 Last digit: ${data.lastDigit}`;
      }
      let prediction = (()=>{ if(last50.length<10) return {digit:null,prob:0}; let w=new Array(10).fill(0); for(let i=0;i<last50.length;i++) w[last50[i]] += (i>=last50.length-10?3:1); let best=w.indexOf(Math.max(...w)); let prob=(w[best]/w.reduce((a,b)=>a+b,0))*100; return {digit:best, prob:prob.toFixed(1)}; })();
      let predSpan = document.getElementById(`prediction_${symbol}`); if(predSpan) predSpan.innerHTML = `🔮 NEXT DIGIT: ${prediction.digit!==null?`<span class="prediction-digit">${prediction.digit}</span> (${prediction.prob}%)`:'—'}`;
      let settings = getSettings(), now = Date.now();
      updateSignalDisplay(symbol, now, settings);
    }
    rebuildDigitGrid(symbol);
    updatePatternPreview(symbol);
    updateSimpleSaturation(symbol);
    updateMultiTFProgress(symbol);
    updateAllMarketsList();
  }

  function updateSignalDisplay(symbol, now, settings) { 
    let isActive = (signalExpiry[symbol] && now < signalExpiry[symbol]); 
    let signalDiv = document.getElementById(`signalDisplay_${symbol}`); 
    if(!signalDiv) return; 
    let sig = getSignalMessage(symbol); 
    if(!isActive && sig.active) { 
      signalExpiry[symbol] = now + SIGNAL_LOCK_DURATION; 
      activeSignalMsg[symbol] = sig.msg; 
      let cls = currentIndicator === 'arrow' ? 'signal-strong' : (currentIndicator === 'majority' ? 'majority-signal' : 'hybrid-signal'); 
      signalDiv.innerHTML = `<div class="signal-flash ${cls}">🎯 ${sig.msg} <div class="strength-meter"><div class="strength-fill" style="width:${sig.confidence}%"></div></div><div class="vote-buttons"><button class="vote-btn" onclick="window.recordOutcome('${symbol}','win')">✅ Win</button><button class="vote-btn" onclick="window.recordOutcome('${symbol}','loss')">❌ Loss</button></div></div>`; 
      if(settings.soundEnabled && audioCtx) { let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.frequency.value = 1318.52; gain.gain.value = 0.15; osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime+0.2); osc.stop(audioCtx.currentTime+0.2); } 
    } else if(isActive) { 
      let rem = Math.max(0, Math.floor((signalExpiry[symbol]-now)/1000)); 
      let mins = Math.floor(rem/60), secs = rem%60; 
      let cls = currentIndicator === 'arrow' ? 'signal-strong' : (currentIndicator === 'majority' ? 'majority-signal' : 'hybrid-signal'); 
      signalDiv.innerHTML = `<div class="signal-flash ${cls}">🎯 ${activeSignalMsg[symbol]} (${mins}:${secs<10?'0'+secs:secs}) <div class="strength-meter"><div class="strength-fill" style="width:90%"></div></div></div>`; 
    } else { 
      let rule = currentIndicator === 'arrow' ? 'arrow condition' : (currentIndicator === 'majority' ? `>${settings.majorityThreshold}%` : 'arrow+majority'); 
      signalDiv.innerHTML = `<span class="no-signal">⚡ waiting: ${rule}</span>`; 
    } 
  }

  function updateAllMarketsList() { 
    let now = Date.now(); 
    for(let [sym, expiry] of lockedMarkets.entries()) if(now > expiry) lockedMarkets.delete(sym);
    for(let sym of ALL_SYMBOLS) {
      let pred = getActivePrediction(sym);
      if(pred && !lockedMarkets.has(sym)) {
        lockedMarkets.set(sym, now + SIGNAL_LOCK_DURATION);
        if(getSettings().soundEnabled && audioCtx) {
          let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
          osc.connect(gain); gain.connect(audioCtx.destination);
          osc.frequency.value = 1318.52; gain.gain.value = 0.15;
          osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime+0.2);
          osc.stop(audioCtx.currentTime+0.2);
        }
      }
    }
    let items = ALL_SYMBOLS.map(sym => {
      let active = lockedMarkets.has(sym);
      let blinkClass = '';
      let suffix = '';
      if(active) {
        blinkClass = currentIndicator === 'arrow' ? 'blink-arrow' : (currentIndicator === 'majority' ? 'blink-majority' : 'blink-hybrid');
        let pred = getActivePrediction(sym);
        if(pred) suffix = (currentMarket === 'digit' ? ` → DIGIT ${pred}` : ` → ${pred}`);
      }
      let score = active ? 90 : 0;
      return { sym, name: MARKET_NAMES[sym], score, suffix, blinkClass };
    });
    let container = document.getElementById('marketsListContainer');
    container.innerHTML = items.map(item => `<div class="market-list-item ${item.blinkClass}" data-symbol="${item.sym}">${item.name} (${item.score})${item.suffix}</div>`).join('');
    document.querySelectorAll('.market-list-item').forEach(el => el.onclick = () => scrollToMarket(el.getAttribute('data-symbol')));
  }

  function scrollToMarket(symbol) { let card = document.getElementById(`market_${symbol}`); if(card) { card.scrollIntoView({ behavior:'smooth', block:'center' }); card.classList.add('highlight-market'); setTimeout(()=>card.classList.remove('highlight-market'),2000); } }
  function createMarketUI(symbol, displayName, isInvalid=false) { 
    if(document.getElementById(`market_${symbol}`)) return; 
    let container = document.getElementById('marketsContainer'); 
    let card = document.createElement('div'); 
    card.className = 'market-card'; 
    card.id = `market_${symbol}`; 
    card.onclick = () => openMarketModal(symbol);
    card.innerHTML = `<div class="market-header">
        <div class="market-title">
          <span>📈 ${displayName}</span>
          <span class="live-tick-badge">⚡ LIVE</span>
          <span class="live-price-big" id="livePriceBig_${symbol}">—</span>
        </div>
        <div class="market-status ${isInvalid?'status-red':'status-red'}" id="status_${symbol}">${isInvalid?'🔴 BLOCKED':'🔴 no data'}</div>
        <span class="last-digit-badge" id="lastDigit_${symbol}">?</span>
      </div>
      <div id="digitsContainer_${symbol}" class="digits-grid"></div>
      <div class="info-row">
        <div class="parity-stats" id="parityStats_${symbol}">--</div>
        <div class="streak-stats" id="streakStats_${symbol}">Streak: 0</div>
        <div class="evenodd-winrate" id="evenOddWinrate_${symbol}"></div>
        <div class="prediction-box" id="prediction_${symbol}">🔮 NEXT DIGIT: —</div>
      </div>
      <div class="letter-sequence-wrapper"><div class="sequence-label" id="seqLabel_${symbol}">Even / Odd</div><div class="letter-sequence" id="paritySeq_${symbol}">⏳ ticks...</div><div class="letter-sequence hidden" id="ouSeq_${symbol}"></div></div>
      <div class="signal-area" id="signalDisplay_${symbol}"><span class="no-signal">⏳ waiting...</span></div>
      <div id="patternPreview_${symbol}" class="pattern-preview">⏳ Loading patterns...</div>
      <div id="saturationAlert_${symbol}" class="saturation-alert"></div>
      <div id="multiTFProgress_${symbol}" class="multi-tf-progress">⏳ Analysing timeframes...</div>`; 
    container.appendChild(card); 
    updateSequenceLabel(symbol); 
  }
  function updateSequenceLabel(symbol) { 
    let label = document.querySelector(`#market_${symbol} .sequence-label`); 
    if(label) label.innerText = currentMarket === 'evenodd' ? 'Even / Odd' : (currentMarket === 'overunder' ? 'Over/Under' : 'Digit sequence'); 
    let seqDiv = document.getElementById(`paritySeq_${symbol}`); 
    let ouDiv = document.getElementById(`ouSeq_${symbol}`); 
    if(currentMarket === 'overunder') { seqDiv.classList.add('hidden'); ouDiv.classList.remove('hidden'); } 
    else { seqDiv.classList.remove('hidden'); ouDiv.classList.add('hidden'); } 
  }
  function openMarketModal(symbol) { let data = marketData[symbol]; if(!data) return; let pred = getActivePrediction(symbol); document.getElementById('modalTitle').innerText = `${MARKET_NAMES[symbol]} (${symbol}) - ${currentMarket.toUpperCase()} / ${currentIndicator.toUpperCase()}`; let last20 = data.last50Array.slice(-20).join(', '); let trends = rawTrend[symbol] || {}; let trendSummary = Object.entries(trends).map(([d,t])=>`${d}:${t===1?'↑':(t===-1?'↓':'•')}`).join(', '); let rolling = getRollingCounts(symbol); let totalTicks = rolling ? rolling.total : 0; document.getElementById('modalBody').innerHTML = `<p><strong>Price:</strong> ${data.lastPriceDisplay}</p><p><strong>Last digit:</strong> ${data.lastDigit}</p><p><strong>Signal:</strong> ${pred ? `🔥 ${pred} 🔥` : 'None'}</p><p><strong>10-tick arrows:</strong> ${trendSummary}</p><p><strong>Last 20 digits:</strong> ${last20}</p><p><strong>NEXT DIGIT:</strong> ${document.getElementById(`prediction_${symbol}`)?.innerText || 'N/A'}</p><p>Rolling window: ${totalTicks} ticks.</p>`; modal.style.display = 'flex'; }
  function subscribeToMarket(symbol) { if(!ws||ws.readyState!==WebSocket.OPEN||invalidSymbols.has(symbol)) return; ws.send(JSON.stringify({ ticks_history: symbol, count: 1000, end: "latest", style: "ticks" })); ws.send(JSON.stringify({ ticks: symbol, subscribe: 1 })); }
  function handleMessage(msg) { if(!msg) return; if(msg.msg_type==='tick' && msg.tick) { let sym = msg.tick.symbol; if(MARKET_NAMES[sym] && !invalidSymbols.has(sym)) { if(!marketData[sym]) processTick(sym, msg.tick.quote, msg.tick.quote_display); else processTick(sym, msg.tick.quote, msg.tick.quote_display); let statusSpan = document.getElementById(`status_${sym}`); if(statusSpan && statusSpan.innerText !== '🟢 live ticks') { statusSpan.innerHTML = '🟢 live ticks'; statusSpan.className = 'market-status status-green'; } } return; } if(msg.msg_type==='history' && msg.history?.prices && msg.echo_req?.ticks_history) { let sym = msg.echo_req.ticks_history; if(MARKET_NAMES[sym] && !invalidSymbols.has(sym)) { msg.history.prices.forEach(p => processTick(sym, p, null)); let statusSpan = document.getElementById(`status_${sym}`); if(statusSpan && statusSpan.innerText !== '🟢 live ticks') { statusSpan.innerHTML = '🟢 live ticks'; statusSpan.className = 'market-status status-green'; } } return; } if(msg.error && msg.error.code==='InvalidSymbol' && msg.echo_req?.ticks_history) { let sym = msg.echo_req.ticks_history; if(MARKET_NAMES[sym] && !invalidSymbols.has(sym)) { invalidSymbols.add(sym); createMarketUI(sym, MARKET_NAMES[sym], true); let statusSpan = document.getElementById(`status_${sym}`); if(statusSpan) { statusSpan.innerHTML = '🔴 BLOCKED'; statusSpan.className = 'market-status status-red'; } } return; } if(msg.msg_type==='authorize') { if(msg.error) { document.getElementById('connectionStatus').innerHTML = '❌ Auth failed'; return; } document.getElementById('connectionStatus').innerHTML = '✅ Connected – loading markets...'; document.getElementById('marketsContainer').innerHTML = ''; marketData = {}; invalidSymbols.clear(); signalExpiry = {}; activeSignalMsg = {}; lockedMarkets.clear(); rawTrend = {}; signalHistory = {}; pendingConfirmation = {}; for(let sym of ALL_SYMBOLS) createMarketUI(sym, MARKET_NAMES[sym], false); let idx = 0; function subNext() { if(idx >= ALL_SYMBOLS.length) { document.getElementById('connectionStatus').innerHTML = `✅ Streaming – ${currentMarket.toUpperCase()} / ${currentIndicator.toUpperCase()} mode`; return; } let sym = ALL_SYMBOLS[idx]; if(!invalidSymbols.has(sym)) subscribeToMarket(sym); idx++; setTimeout(subNext, 250); } subNext(); return; } }
  let pingInterval; function startPing() { if(pingInterval) clearInterval(pingInterval); pingInterval = setInterval(()=>{ if(ws && ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify({ping:1})); }, 25000); }
  function connectWebSocket() { let token = document.getElementById('token').value.trim(); if(!token) { alert("Enter API token"); return; } if(ws && (ws.readyState===WebSocket.OPEN || ws.readyState===WebSocket.CONNECTING)) ws.close(); document.getElementById('connectionStatus').innerHTML = '⏳ Connecting...'; ws = new WebSocket('wss://ws.derivws.com/websockets/v3?app_id=1089'); ws.onopen = () => { ws.send(JSON.stringify({authorize: token})); startPing(); }; ws.onmessage = e => { try { handleMessage(JSON.parse(e.data)); } catch(err) { console.warn(err); } }; ws.onerror = () => { document.getElementById('connectionStatus').innerHTML = '⚠️ WS error'; }; ws.onclose = () => { if(pingInterval) clearInterval(pingInterval); }; }
  function toggleMode() { document.body.classList.toggle('light'); }
  let audioCtx = null;
  function setMarket(market) { currentMarket = market; document.querySelectorAll('.market-btn').forEach(btn => { if(btn.getAttribute('data-market') === market) btn.classList.add('active'); else btn.classList.remove('active'); }); document.getElementById('lookaheadGroup').style.display = market === 'digit' ? 'inline-flex' : 'none'; rawTrend = {}; signalExpiry = {}; activeSignalMsg = {}; lockedMarkets.clear(); pendingConfirmation = {}; for(let sym of ALL_SYMBOLS) { if(marketData[sym]) { updateTrends(sym); renderMarket(sym); updateSequenceLabel(sym); updateEvenOddWinRate(sym); } } document.getElementById('connectionStatus').innerHTML = `✅ Switched to ${market.toUpperCase()} market`; }
  function setIndicator(indicator) { currentIndicator = indicator; document.querySelectorAll('.indicator-btn').forEach(btn => { if(btn.getAttribute('data-indicator') === indicator) btn.classList.add('active'); else btn.classList.remove('active'); }); signalExpiry = {}; activeSignalMsg = {}; lockedMarkets.clear(); for(let sym of ALL_SYMBOLS) if(marketData[sym]) renderMarket(sym); document.getElementById('connectionStatus').innerHTML = `✅ Switched to ${indicator.toUpperCase()} indicator`; }
  window.connectWebSocket = connectWebSocket; window.toggleMode = toggleMode; window.setMarket = setMarket; window.setIndicator = setIndicator; window.openMarketModal = openMarketModal; window.scrollToMarket = scrollToMarket;
  document.querySelectorAll('.market-btn').forEach(btn => btn.onclick = () => setMarket(btn.getAttribute('data-market')));
  document.querySelectorAll('.indicator-btn').forEach(btn => btn.onclick = () => setIndicator(btn.getAttribute('data-indicator')));
  setInterval(()=>{ for(let sym in marketData) if(marketData[sym].rollingArray.length) renderMarket(sym); }, 1000);
  const modal = document.getElementById('marketModal'); document.querySelector('.close-modal').onclick = () => modal.style.display = 'none';
  window.onclick = e => { if(e.target === modal) modal.style.display = 'none'; };
  document.body.addEventListener('click', () => { if(audioCtx === null) audioCtx = new AudioContext(); if(audioCtx.state === 'suspended') audioCtx.resume(); });
</script>

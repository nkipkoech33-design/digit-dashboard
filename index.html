<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Digit Dashboard</title>

<style>
body{background:#0f172a;color:white;font-family:Arial;margin:0;}

.container{display:flex;}

.left{
  width:50%;
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:10px;
}

.right{
  width:50%;
  border-left:2px solid #1e293b;
  padding:10px;
}

.card{
  background:#1e293b;
  padding:8px;
  border-radius:10px;
  text-align:center;
}

@keyframes blink{
  0%{background:#1e293b;}
  50%{background:#ef4444;}
  100%{background:#1e293b;}
}

.signal{animation:blink 0.7s infinite;}

.row{
  display:flex;
  justify-content:space-between;
  margin:8px 0;
  position:relative;
}

.digit{
  width:42px;
  height:42px;
  border-radius:50%;
  background:#334155;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-size:11px;
  font-weight:bold;
}

.green{background:#22c55e;}
.blue{background:#3b82f6;}
.orange{background:#f97316;}
.red{background:#ef4444;}

.cursor{
  position:absolute;
  width:10px;
  height:10px;
  background:#22c55e;
  border-radius:50%;
  top:-6px;
  transition:all 0.2s linear;
}

.stats{font-size:12px;}
.stream{font-size:12px;margin-top:5px;letter-spacing:2px;}

.evenLetter{color:#22c55e;}
.oddLetter{color:#ef4444;}
</style>
</head>

<body>

<div class="container">
  <div class="left" id="app"></div>
  <div class="right">
    <h3>🤖 Trading Bot (Next)</h3>
  </div>
</div>

<script>

// 🔑 PUT YOUR NEW TOKEN HERE
const TOKEN = "REPLACE_WITH_NEW_TOKEN";

const symbols=[
"R_10","R_25","R_50","R_75","R_100",
"1HZ10V","1HZ25V","1HZ50V","1HZ75V","1HZ100V",
"JD10","JD25","JD50","JD75","JD100"
];

const even=[0,2,4,6,8];
const odd=[1,3,5,7,9];

let app=document.getElementById("app");
let markets=[];
let audioCtx=null;

// SOUND
document.body.addEventListener("click",()=>{
 if(!audioCtx){
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
 }
});

function beep(){
 if(!audioCtx) return;
 let osc=audioCtx.createOscillator();
 let gain=audioCtx.createGain();
 osc.connect(gain);
 gain.connect(audioCtx.destination);
 osc.frequency.value=800;
 gain.gain.value=0.2;
 osc.start();
 osc.stop(audioCtx.currentTime+0.15);
}

// CREATE UI
symbols.forEach((s,i)=>{

 let card=document.createElement("div");
 card.className="card";

 card.innerHTML=`
  <h4>${s}</h4>
  <div class="row" id="evenRow${i}">
    <div class="cursor" id="cursor${i}"></div>
  </div>
  <div class="row" id="oddRow${i}"></div>
  <div class="stats" id="s${i}"></div>
  <div class="stream" id="stream${i}"></div>
 `;

 app.appendChild(card);

 createRow(i,"even");
 createRow(i,"odd");

 markets.push({symbol:s,ticks:[],stream:[],active:false});
});

function createRow(i,type){
 let row=document.getElementById(type+"Row"+i);
 let arr= type==="even"?even:odd;

 arr.forEach(d=>{
  let el=document.createElement("div");
  el.className="digit";
  el.id=`m${i}d${d}`;
  el.innerHTML=`${d}<br>0%`;
  row.appendChild(el);
 });
}

// CONNECT TO DERIV
const ws = new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

ws.onopen = ()=>{
 ws.send(JSON.stringify({authorize:TOKEN}));

 symbols.forEach(sym=>{
   ws.send(JSON.stringify({ticks:sym,subscribe:1}));
 });
};

ws.onmessage = (msg)=>{
 let data = JSON.parse(msg.data);

 if(data.tick){
   let symbol = data.echo_req.ticks;
   let digit = parseInt(data.tick.quote.toString().slice(-1));
   updateMarket(symbol,digit);
 }
};

// UPDATE
function updateMarket(symbol,d){

 let i = symbols.indexOf(symbol);
 if(i===-1) return;

 let m = markets[i];

 m.ticks.push(d);
 if(m.ticks.length>1000) m.ticks.shift();

 let eo = d%2===0 
   ? '<span class="evenLetter">E</span>' 
   : '<span class="oddLetter">O</span>';

 m.stream.push(eo);
 if(m.stream.length>50) m.stream.shift();

 document.getElementById("stream"+i).innerHTML = m.stream.join("");

 let counts=Array(10).fill(0);
 m.ticks.forEach(x=>counts[x]++);

 let total=m.ticks.length;
 let perc=counts.map(c=>c/total*100);
 let sorted=[...perc].sort((a,b)=>b-a);

 let evenSum=0, oddSum=0;

 perc.forEach((p,x)=>{
  let el=document.getElementById(`m${i}d${x}`);
  el.className="digit";
  el.innerHTML=`${x}<br>${p.toFixed(1)}%`;

  if(p===sorted[0]) el.classList.add("green");
  else if(p===sorted[1]) el.classList.add("blue");
  else if(p===sorted[sorted.length-1]) el.classList.add("red");
  else if(p===sorted[sorted.length-2]) el.classList.add("orange");

  if(x%2===0) evenSum+=p;
  else oddSum+=p;
 });

 let cursor=document.getElementById("cursor"+i);
 let target=document.getElementById(`m${i}d${d}`);
 let row=target.parentElement;

 let rect=target.getBoundingClientRect();
 let parent=row.getBoundingClientRect();

 if(d%2===0){
  document.getElementById("evenRow"+i).appendChild(cursor);
 }else{
  document.getElementById("oddRow"+i).appendChild(cursor);
 }

 cursor.style.left=(rect.left-parent.left+20)+"px";

 let evenStrong = evenSum>oddSum && [1,3,5,7,9].every(x=>perc[x]<10);
 let oddStrong  = oddSum>evenSum && [0,2,4,6,8].every(x=>perc[x]<10);

 let card=document.getElementsByClassName("card")[i];

 if(evenStrong || oddStrong){

  if(!m.active){
   beep();
   m.active=true;
  }

  card.classList.add("signal");
  app.prepend(card);

  document.getElementById("s"+i).innerHTML=
    `E:${evenSum.toFixed(1)}% | O:${oddSum.toFixed(1)}%<br>
     🚨 ${evenStrong?"STRONG EVEN":"STRONG ODD"}`;

 }else{

  card.classList.remove("signal");
  m.active=false;

  document.getElementById("s"+i).innerHTML=
    `E:${evenSum.toFixed(1)}% | O:${oddSum.toFixed(1)}%`;

 }

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Digit Analyzer + DBot</title>

<style>
body{background:#0f172a;color:white;font-family:Arial;margin:0;}

.wrapper{
  display:flex;
}

/* LEFT SIDE */
.left{
  width:70%;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

/* RIGHT SIDE (BOT PANEL) */
.right{
  width:30%;
  border-left:1px solid #1e293b;
  padding:10px;
  background:#020617;
}

/* MARKET */
.market{
  border:1px solid #1e293b;
  padding:6px;
  border-radius:6px;
}

.blink{animation:blink 1s infinite;}
@keyframes blink{50%{background:#78350f;}}

/* SMALLER BOXES */
.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:2px;
  margin-top:3px;
}

.box{
  padding:1px;
  font-size:8px;
  height:28px;
  text-align:center;
  border-radius:3px;
  position:relative;
}

.pointer{
  position:absolute;
  top:-8px;
  left:50%;
  transform:translateX(-50%);
  font-size:9px;
  color:yellow;
}

/* TICKS */
.tick{
  display:grid;
  grid-template-columns:repeat(50,1fr);
  gap:1px;
  margin-top:5px;
  font-size:8px;
}

.e{color:lime;}
.o{color:red;}

/* BOT PANEL */
.bot-box{
  border:1px solid #1e293b;
  padding:10px;
  border-radius:6px;
}

button{
  margin-top:5px;
  padding:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="left" id="markets"></div>

  <div class="right">
    <div class="bot-box">
      <h3>DBot Panel</h3>

      <div>Market: <span id="botMarket">-</span></div>
      <div>Signal: <span id="botSignal">-</span></div>
      <div>Stake: <span id="botStake">1</span></div>
      <div>Profit: <span id="botProfit">0</span></div>

      <div>Tick Speed:
        <input type="number" value="1" id="speed" min="1" style="width:50px">
      </div>

      <button onclick="toggleTrade()">Toggle Trading</button>
    </div>
  </div>

</div>

<script>

// SETTINGS
let API_TOKEN="PUT_YOUR_TOKEN_HERE";

let tickSpeed=1;
let martingale=2.3;
let baseStake=1;
let currentStake=1;
let profit=0;

let tradeEnabled=false;
let contractId=null;

let activeMarket=null;
let activeSignal=null;

const markets=[
  {sym:"R_10", name:"Volatility 10 Index"},
  {sym:"R_25", name:"Volatility 25 Index"},
  {sym:"R_50", name:"Volatility 50 Index"},
  {sym:"R_75", name:"Volatility 75 Index"},
  {sym:"R_100", name:"Volatility 100 Index"},

  {sym:"1HZ10V", name:"Volatility 10 (1s)"},
  {sym:"1HZ15V", name:"Volatility 15 (1s)"},
  {sym:"1HZ25V", name:"Volatility 25 (1s)"},
  {sym:"1HZ30V", name:"Volatility 30 (1s)"},
  {sym:"1HZ50V", name:"Volatility 50 (1s)"},
  {sym:"1HZ75V", name:"Volatility 75 (1s)"},
  {sym:"1HZ90V", name:"Volatility 90 (1s)"},
  {sym:"1HZ100V", name:"Volatility 100 (1s)"},

  {sym:"JD10", name:"Jump 10 Index"},
  {sym:"JD25", name:"Jump 25 Index"},
  {sym:"JD50", name:"Jump 50 Index"},
  {sym:"JD75", name:"Jump 75 Index"},
  {sym:"JD100", name:"Jump 100 Index"}
];

let dataStore={}, lastDigitMap={}, pipMap={}, historyLoaded={};

let ws=new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");

ws.onopen=()=>{
  ws.send(JSON.stringify({authorize:API_TOKEN}));

  markets.forEach(m=>{
    dataStore[m.sym]=[];
    ws.send(JSON.stringify({ticks:m.sym,subscribe:1}));
  });
};

ws.onmessage=(msg)=>{
  let data=JSON.parse(msg.data);

  if(data.tick){
    let sym=data.tick.symbol;

    pipMap[sym]=data.tick.pip_size;

    let price=parseFloat(data.tick.quote).toFixed(pipMap[sym]);
    let digit=parseInt(price.slice(-1));

    if(!historyLoaded[sym]){
      historyLoaded[sym]=true;
      ws.send(JSON.stringify({ticks_history:sym,count:1000,end:"latest",style:"ticks"}));
      return;
    }

    let arr=dataStore[sym];
    arr.push(digit);
    if(arr.length>1000) arr.shift();

    botLogic(sym,digit);

    render();
  }

  if(data.history){
    let sym=data.echo_req.ticks_history;
    let pip=pipMap[sym]||2;

    dataStore[sym]=data.history.prices.map(p=>{
      let f=parseFloat(p).toFixed(pip);
      return parseInt(f.slice(-1));
    });
  }

  if(data.msg_type==="proposal"){
    ws.send(JSON.stringify({buy:data.proposal.id,price:currentStake}));
  }

  if(data.msg_type==="buy"){
    contractId=data.buy.contract_id;

    ws.send(JSON.stringify({
      proposal_open_contract:1,
      contract_id:contractId,
      subscribe:1
    }));
  }

  if(data.msg_type==="proposal_open_contract"){
    let c=data.proposal_open_contract;

    if(c.is_sold){
      if(c.profit>0){
        profit+=c.profit;
        currentStake=baseStake;
      }else{
        profit+=c.profit;
        currentStake*=martingale;
      }

      contractId=null;
    }
  }
};

function analyze(arr){
  let counts=Array(10).fill(0);
  arr.forEach(d=>counts[d]++);

  let total=arr.length||1;
  let perc=counts.map(c=>(c/total*100).toFixed(1));

  let even=0,odd=0;
  counts.forEach((c,i)=>i%2==0?even+=c:odd+=c);

  even=(even/total*100).toFixed(1);
  odd=(odd/total*100).toFixed(1);

  return {perc,even,odd};
}

// BOT LOGIC
let tickCounter=0;

function botLogic(sym,digit){

  let arr=dataStore[sym];
  if(!arr || arr.length<100) return;

  let {perc,even,odd}=analyze(arr);

  let evenDom=even>odd && perc.filter((p,i)=>i%2!=0).every(p=>p<10);
  let oddDom=odd>even && perc.filter((p,i)=>i%2==0).every(p=>p<10);

  if(evenDom || oddDom){
    activeMarket=sym;
    activeSignal=evenDom?"EVEN":"ODD";
  }

  if(sym!==activeMarket) return;
  if(!tradeEnabled) return;
  if(contractId) return;

  tickSpeed=parseInt(document.getElementById("speed").value);

  tickCounter++;
  if(tickCounter % tickSpeed !==0) return;

  ws.send(JSON.stringify({
    proposal:1,
    amount:currentStake,
    basis:"stake",
    contract_type: activeSignal==="EVEN"?"DIGITEVEN":"DIGITODD",
    currency:"USD",
    duration:1,
    duration_unit:"t",
    symbol:sym
  }));
}

function render(){

  document.getElementById("botMarket").innerText=activeMarket||"-";
  document.getElementById("botSignal").innerText=activeSignal||"-";
  document.getElementById("botStake").innerText=currentStake.toFixed(2);
  document.getElementById("botProfit").innerText=profit.toFixed(2);

  let container=document.getElementById("markets");
  container.innerHTML="";

  markets.forEach(m=>{
    let arr=dataStore[m.sym];
    if(!arr || arr.length<10) return;

    let {perc}=analyze(arr);
    let lastDigit=arr[arr.length-1];

    let ticks=arr.slice(-50).map(d=>
      `<span class="${d%2==0?'e':'o'}">${d%2==0?'E':'O'}</span>`
    ).join("");

    let div=document.createElement("div");
    div.className="market";

    div.innerHTML=`
      <b>${m.name}</b>

      <div class="grid">
        ${[0,2,4,6,8].map(i=>box(i,perc,lastDigit)).join("")}
      </div>

      <div class="grid">
        ${[1,3,5,7,9].map(i=>box(i,perc,lastDigit)).join("")}
      </div>

      <div class="tick">${ticks}</div>
    `;

    container.appendChild(div);
  });
}

function box(i,perc,lastDigit){
  return `
    <div class="box">
      ${i}<br>${perc[i]}%
      ${i===lastDigit?'<div class="pointer">▲</div>':''}
    </div>
  `;
}

function toggleTrade(){
  tradeEnabled=!tradeEnabled;
}

</script>

</body>
</html>

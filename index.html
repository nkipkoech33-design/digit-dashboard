<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>TAJIRI TRADERS – Full Features + Signal Notifications</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-body: #0b1120;
    --bg-card: #111827;
    --bg-header: #1e293b;
    --bg-panel: #0a0f1c;
    --bg-digit: #1e293b;
    --border-color: #2d3a4e;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --price-color: #facc15;
    --strength-meter-bg: #334155;
    --strength-fill: #4ade80;
    --btn-bg: #3b82f6;
    --trade-active: #10b981;
    --majority-blink: #06b6d4;
    --hybrid-blink: #a855f7;
    --percent-accent: #facc15;
    --last-digit-bg: #0f172a;
    --reversal-strong-bg: #0f3b2c;
    --reversal-strong-text: #a3e635;
  }

  body.light {
    --bg-body: #f8fafc;
    --bg-card: #ffffff;
    --bg-header: #e2e8f0;
    --bg-panel: #f1f5f9;
    --bg-digit: #ffffff;
    --border-color: #cbd5e1;
    --text-primary: #0f172a;
    --text-secondary: #475569;
    --price-color: #0f172a;
    --strength-meter-bg: #cbd5e1;
    --strength-fill: #15803d;
    --btn-bg: #2563eb;
    --trade-active: #059669;
    --majority-blink: #0891b2;
    --hybrid-blink: #9333ea;
    --percent-accent: #b45309;
    --last-digit-bg: #e2e8f0;
    --reversal-strong-bg: #bbf7d0;
    --reversal-strong-text: #166534;
  }

  body {
    font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    background: var(--bg-body);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
  }

  .app-container {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* TOP BAR */
  .top-slim-bar {
    background: var(--bg-header);
    border-bottom: 1px solid var(--border-color);
    padding: 0.5rem 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.5rem;
    flex-shrink: 0;
  }
  .logo-area h1 { font-size: 1.3rem; margin: 0; }
  .right-controls { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
  .token-group {
    display: flex; align-items: center; gap: 0.3rem;
    background: var(--bg-panel); padding: 0.25rem 0.7rem; border-radius: 2rem;
  }
  .token-group input {
    background: var(--bg-body); border: none; padding: 0.25rem 0.5rem;
    border-radius: 1.5rem; color: var(--text-primary); font-size: 0.8rem; width: 130px;
  }
  .connect-btn {
    background: var(--btn-bg); border: none; padding: 0.25rem 0.9rem;
    border-radius: 2rem; font-weight: bold; color: white; cursor: pointer; font-size: 0.8rem;
  }
  .settings-icon {
    background: var(--bg-panel); border: none; font-size: 1.2rem; cursor: pointer;
    border-radius: 2rem; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
  }
  .status-badge {
    background: var(--bg-panel); padding: 0.25rem 0.7rem; border-radius: 2rem; font-size: 0.75rem;
  }
  .mode-toggle-small {
    background: var(--btn-bg); border: none; padding: 0.25rem 0.7rem;
    border-radius: 2rem; color: white; cursor: pointer; font-size: 0.8rem;
  }

  /* SELECTOR ROW */
  .selector-row {
    background: var(--bg-header); padding: 0.4rem 1rem; display: flex; gap: 1rem;
    flex-wrap: wrap; border-bottom: 1px solid var(--border-color); flex-shrink: 0;
  }
  .market-type-selector, .indicator-selector {
    display: flex; gap: 0.4rem; background: var(--bg-panel); padding: 0.25rem 0.7rem; border-radius: 2rem;
  }
  .market-btn, .indicator-btn {
    background: none; border: none; font-size: 0.85rem; padding: 0.25rem 0.8rem;
    border-radius: 1.5rem; cursor: pointer; opacity: 0.6; font-weight: bold; color: var(--text-primary);
  }
  .market-btn.active, .indicator-btn.active { opacity: 1; background: var(--trade-active); }

  /* MAIN SCROLL AREA */
  .main-scroll-area {
    flex: 1;
    display: flex;
    overflow: hidden;
    padding: 0.8rem;
    gap: 0.8rem;
    min-height: 0;
  }

  .market-cards-container {
    flex: 3;
    overflow-y: auto;
    padding-right: 0.3rem;
    height: 100%;
  }
  .market-grid {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .all-markets-container {
    flex: 1;
    background: var(--bg-header);
    border-radius: 1rem;
    padding: 0.6rem;
    border-left: 3px solid #facc15;
    overflow-y: auto;
    max-height: 100%;
  }
  .all-markets-container h3 { font-size: 0.85rem; margin: 0 0 0.4rem 0; }
  .markets-list { display: flex; flex-direction: column; gap: 0.4rem; }
  .market-list-item {
    background: var(--bg-panel); padding: 0.25rem 0.5rem; border-radius: 0.8rem;
    font-weight: bold; cursor: pointer; font-size: 0.8rem; white-space: nowrap;
    overflow-x: auto;
  }

  /* Blink animations */
  @keyframes blinkYellow { 0% { background: var(--bg-panel); } 50% { background: #facc15; color: #0f172a; } 100% { background: var(--bg-panel); } }
  @keyframes blinkCyan { 0% { background: var(--bg-panel); } 50% { background: var(--majority-blink); color: white; } 100% { background: var(--bg-panel); } }
  @keyframes blinkPurple { 0% { background: var(--bg-panel); } 50% { background: var(--hybrid-blink); color: white; } 100% { background: var(--bg-panel); } }
  .blink-arrow { animation: blinkYellow 1s infinite; }
  .blink-majority { animation: blinkCyan 1s infinite; }
  .blink-hybrid { animation: blinkPurple 1s infinite; }

  /* MARKET CARD – FIXED SIZE */
  .market-card {
    background: var(--bg-card);
    border-radius: 0.8rem;
    border: 1px solid var(--border-color);
    cursor: pointer;
    width: 100%;
    height: 130mm;
    max-height: 130mm;
    min-height: 130mm;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .market-header {
    background: var(--bg-header);
    padding: 0.35rem 0.7rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.3rem;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .market-title {
    font-size: 0.9rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .live-price-big {
    font-size: 0.9rem;
    background: var(--bg-body);
    padding: 0.1rem 0.4rem;
    border-radius: 0.8rem;
    color: var(--price-color);
  }
  .last-digit-badge {
    font-size: 1.6rem;
    font-weight: 800;
    background: var(--last-digit-bg);
    padding: 0 0.4rem;
    border-radius: 1rem;
    min-width: 50px;
    text-align: center;
  }
  .market-status { font-size: 0.65rem; padding: 0.1rem 0.35rem; border-radius: 1rem; }

  .card-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    gap: 0.2rem;
  }

  /* DIGITS GRID */
  .digits-grid {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 0.4rem 0.5rem;
    background: var(--bg-body);
    flex-shrink: 0;
  }
  .digits-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }
  .digit-cell {
    background: var(--bg-digit);
    border-radius: 0.7rem;
    padding: 0.2rem 0.1rem;
    text-align: center;
    position: relative;
    border: 1px solid var(--border-color);
  }
  .digit-cell span.digit {
    font-size: 1.3rem;
    font-weight: 800;
    display: block;
    line-height: 1.2;
  }
  .digit-cell .percent {
    font-size: 0.65rem;
    font-weight: 800;
    color: var(--percent-accent);
    display: inline-block;
    padding: 0.1rem 0.2rem;
    border-radius: 12px;
  }
  .digit-cell .trend { font-size: 0.65rem; margin-left: 2px; }
  
  .pointer-marker {
    position: absolute;
    bottom: 0px;
    left: 50%;
    transform: translateX(-50%);
    width: 30px;
    height: 6px;
    background: #ffaa00;
    border-radius: 3px;
    box-shadow: 0 0 6px #ffcc00;
    z-index: 2;
  }
  
  .most { background: linear-gradient(145deg, #15803d, #0f5a2e); border-color: #4ade80; }
  .second { background: linear-gradient(145deg, #1e40af, #152e7a); border-color: #60a5fa; }
  .least { background: linear-gradient(145deg, #b91c1c, #7f1414); border-color: #f87171; }
  .secondleast { background: linear-gradient(145deg, #c2410c, #7a2b0a); border-color: #fb923c; }
  .hot { box-shadow: 0 0 6px #facc15; border-color: #facc15; }
  .cold { opacity: 0.6; }

  .info-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    gap: 0.3rem;
    padding: 0.3rem 0.5rem;
    background: var(--bg-body);
    font-size: 0.7rem;
    border-top: 1px solid var(--border-color);
    border-bottom: 1px solid var(--border-color);
    flex-shrink: 0;
  }
  .parity-stats, .streak-stats, .prediction-box, .evenodd-winrate {
    background: var(--bg-panel);
    padding: 0.1rem 0.4rem;
    border-radius: 0.8rem;
  }

  .letter-sequence-wrapper {
    padding: 0.2rem 0.5rem;
    background: var(--bg-body);
    border-bottom: 1px solid var(--border-color);
    flex-shrink: 0;
    width: 100%;
    overflow-x: auto;
    white-space: nowrap;
  }
  .letter-sequence {
    font-size: 1rem;
    font-family: 'Courier New', monospace;
    letter-spacing: 2px;
    display: inline-block;
  }

  .signal-area {
    padding: 0.25rem 0.5rem;
    text-align: center;
    background: var(--bg-body);
    border-bottom: 1px solid var(--border-color);
    flex-shrink: 0;
  }
  .signal-flash { padding: 3px 5px; font-size: 0.7rem; }
  .strength-meter { width: 60px; height: 5px; margin-left: 6px; display: inline-block; background: var(--strength-meter-bg); }
  .strength-fill { height: 100%; background: var(--strength-fill); }
  .vote-btn { padding: 1px 4px; font-size: 0.6rem; margin: 0 2px; background: var(--btn-bg); border: none; color: white; border-radius: 1rem; cursor: pointer; }

  .pattern-preview, .multi-tf-progress {
    background: var(--bg-panel);
    border-radius: 0.6rem;
    padding: 0.2rem;
    margin: 0.2rem 0.4rem;
    font-size: 0.65rem;
    text-align: center;
    flex-shrink: 0;
  }
  .multi-tf-progress.strong { background: var(--reversal-strong-bg); color: var(--reversal-strong-text); }
  .tf-line { display: flex; justify-content: space-between; padding: 0.05rem 0.1rem; }
  .hidden { display: none; }

  /* MODAL */
  .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
  .modal-content { background: var(--bg-card); border-radius: 1rem; padding: 1rem; max-width: 400px; width: 90%; }
  .close-modal { float: right; cursor: pointer; font-size: 1.2rem; }
  .settings-panel { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1rem; }
  .setting-row { display: flex; justify-content: space-between; align-items: center; }

  @media (max-width: 800px) {
    .main-scroll-area { flex-direction: column; }
    .all-markets-container { max-height: 180px; flex: none; width: 100%; }
    .market-card { height: auto; min-height: 130mm; }
    .top-slim-bar { flex-direction: column; align-items: stretch; }
    .right-controls { justify-content: space-between; }
  }
  @media (max-width: 480px) {
    .digits-row { gap: 4px; }
    .digit-cell span.digit { font-size: 1rem; }
  }
</style>
</head>
<body>
<div class="app-container">
  <div class="top-slim-bar">
    <div class="logo-area"><h1>✨ TAJIRI TRADERS ✨</h1></div>
    <div class="right-controls">
      <div class="token-group">
        <input type="password" id="token" placeholder="API Token">
        <button onclick="connectWebSocket()" class="connect-btn">🚀 CONNECT</button>
      </div>
      <div class="status-badge" id="connectionStatus">⚫ Off</div>
      <button class="settings-icon" id="settingsBtn">⚙️</button>
      <button class="mode-toggle-small" onclick="toggleMode()">🌓</button>
    </div>
  </div>
  <div class="selector-row">
    <div class="market-type-selector">
      <button class="market-btn active" data-market="evenodd">🎲 Even/Odd</button>
      <button class="market-btn" data-market="overunder">📊 Over/Under</button>
      <button class="market-btn" data-market="differs">🔄 Match Only</button>
      <button class="market-btn" data-market="digit">🎯 Digit</button>
    </div>
    <div class="indicator-selector">
      <button class="indicator-btn" data-indicator="arrow">⬆️ Arrow</button>
      <button class="indicator-btn" data-indicator="majority">📈 Majority</button>
      <button class="indicator-btn active" data-indicator="hybrid">🔮 Hybrid</button>
    </div>
  </div>

  <div class="main-scroll-area">
    <div class="market-cards-container" id="marketCardsContainer">
      <div id="marketsContainer" class="market-grid"></div>
    </div>
    <div class="all-markets-container">
      <h3>📋 ALL MARKETS (signal blink)</h3>
      <div id="marketsListContainer" class="markets-list"></div>
    </div>
  </div>
</div>

<div id="settingsModal" class="modal">
  <div class="modal-content"><span class="close-modal" id="closeModal">&times;</span><h3>Advanced Settings</h3>
    <div class="settings-panel">
      <div class="setting-row"><label>🔊 Sound</label><select id="soundEnabled"><option value="true">ON</option><option value="false">OFF</option></select></div>
      <div class="setting-row"><label>📊 Window Size</label><input type="number" id="windowSize" value="1000" style="width:80px"></div>
      <div class="setting-row"><label>🎯 Majority %</label><input type="number" id="majorityThreshold" value="65" style="width:60px"></div>
      <div class="setting-row"><label>📈 Trend Filter</label><select id="trendFilter"><option value="true">ON</option><option value="false">OFF</option></select></div>
      <div class="setting-row"><label>📊 Volatility Thresh</label><input type="number" id="volatilityThresh" value="2.5" step="0.1" style="width:60px"></div>
      <div class="setting-row"><label>🚫 Rejection Streak</label><input type="number" id="rejectionStreak" value="2" style="width:60px"></div>
    </div>
  </div>
</div>

<script>
  // ================== FULL ENGINE + SOUND + DESKTOP NOTIFICATIONS ==================
  const DECIMAL_MAP = { "1HZ10V":2,"1HZ15V":3,"1HZ25V":2,"1HZ30V":3,"1HZ50V":2,"1HZ75V":2,"1HZ90V":3,"1HZ100V":2,"R_10":3,"R_25":3,"R_50":4,"R_75":4,"R_100":2,"JD10":2,"JD25":2,"JD50":2,"JD75":2,"JD100":2 };
  const MARKET_NAMES = { "1HZ10V":"Vol 10 (1s)","1HZ15V":"Vol 15 (1s)","1HZ25V":"Vol 25 (1s)","1HZ30V":"Vol 30 (1s)","1HZ50V":"Vol 50 (1s)","1HZ75V":"Vol 75 (1s)","1HZ90V":"Vol 90 (1s)","1HZ100V":"Vol 100 (1s)","R_10":"Vol 10","R_25":"Vol 25","R_50":"Vol 50","R_75":"Vol 75","R_100":"Vol 100","JD10":"Jump 10","JD25":"Jump 25","JD50":"Jump 50","JD75":"Jump 75","JD100":"Jump 100" };
  const ALL_SYMBOLS = Object.keys(MARKET_NAMES);
  const SIGNAL_LOCK_DURATION = 60000;
  let marketData = {}, signalExpiry = {}, activeSignalMsg = {}, lockedMarkets = new Map(), rawTrend = {}, signalHistory = {}, pendingConfirmation = {};
  let currentMarket = 'evenodd', currentIndicator = 'hybrid', ws = null, invalidSymbols = new Set();

  function getSettings() {
    return {
      soundEnabled: document.getElementById('soundEnabled').value === 'true',
      majorityWindow: 20,
      majorityThreshold: parseInt(document.getElementById('majorityThreshold').value) || 65,
      trendFilterEnabled: document.getElementById('trendFilter').value === 'true',
      volatilityThresh: parseFloat(document.getElementById('volatilityThresh').value) || 2.5,
      rejectionStreak: parseInt(document.getElementById('rejectionStreak').value) || 2,
      windowSize: parseInt(document.getElementById('windowSize').value) || 1000
    };
  }

  function lastDigitFromFormatted(str) { let digits = str.replace(/\./g,''); if(digits.length===0) return 0; return parseInt(digits.charAt(digits.length-1),10)||0; }
  function formatHistoryPrice(s, p) { let dec = DECIMAL_MAP[s] ?? 2; return p.toFixed(dec); }

  function updateTrends(symbol) {
    let data = marketData[symbol];
    if(!data || data.rollingArray.length < 20) return;
    let last10 = data.rollingArray.slice(-10), prev10 = data.rollingArray.slice(-20,-10);
    let lastCounts = new Array(10).fill(0), prevCounts = new Array(10).fill(0);
    last10.forEach(d=>lastCounts[d]++); prev10.forEach(d=>prevCounts[d]++);
    let trends = {};
    for(let d=0;d<10;d++) {
      let diff = (lastCounts[d]/10) - (prevCounts[d]/10);
      if(diff > 0.08) trends[d]=1;
      else if(diff < -0.08) trends[d]=-1;
      else trends[d]=0;
    }
    rawTrend[symbol] = trends;
  }

  function getRollingCounts(symbol) {
    let data = marketData[symbol];
    if(!data || data.rollingArray.length === 0) return null;
    let win = getSettings().windowSize;
    let arr = data.rollingArray.slice(-win);
    let counts = new Array(10).fill(0);
    for(let d of arr) counts[d]++;
    return { counts, total: arr.length };
  }

  function getDigitRanksAndPct(symbol) {
    let rolling = getRollingCounts(symbol);
    if(!rolling || rolling.total === 0) return null;
    let { counts, total } = rolling;
    let pct = counts.map(c => (c / total) * 100);
    let arr = counts.map((c,i)=>({digit:i, count:c, pct:pct[i]}));
    let sorted = [...arr].sort((a,b)=>b.count - a.count);
    let most = sorted[0].digit, mostPct = sorted[0].pct;
    let secondMost = sorted[1]?.digit ?? most;
    let least = sorted[sorted.length-1].digit;
    let secondLeast = sorted[sorted.length-2]?.digit ?? least;
    return { most, secondMost, least, secondLeast, mostPct, allPct: pct };
  }

  function checkEvenOddRankCondition(symbol, predictedParity) {
    let ranks = getDigitRanksAndPct(symbol);
    if(!ranks) return false;
    let { allPct } = ranks;
    if(predictedParity === "EVEN") {
      for(let d of [1,3,5,7,9]) if(allPct[d] > 10) return false;
      let { most, secondMost } = ranks;
      return (most%2===0) && (secondMost%2===0);
    } else {
      for(let d of [0,2,4,6,8]) if(allPct[d] > 10) return false;
      let { most, secondMost } = ranks;
      return (most%2===1) && (secondMost%2===1);
    }
  }
  function checkOverUnderRankCondition(symbol, predictedOu) {
    let ranks = getDigitRanksAndPct(symbol);
    if(!ranks) return false;
    let { most, secondMost, least, secondLeast, allPct } = ranks;
    if(allPct[least] > 10 || allPct[secondLeast] > 10) return false;
    const under = [0,1,2,3], over = [6,7,8,9];
    if(predictedOu === "UNDER") return under.includes(most) && under.includes(secondMost) && over.includes(least) && over.includes(secondLeast);
    else return over.includes(most) && over.includes(secondMost) && under.includes(least) && under.includes(secondLeast);
  }

  function getEvenOddArrow(symbol) {
    let trends = rawTrend[symbol]; if(!trends) return null;
    let data = marketData[symbol]; if(!data || data.last50Array.length < 20) return null;
    let evens=[0,2,4,6,8], odds=[1,3,5,7,9];
    let evenGain = evens.filter(d=>trends[d]===1).length, oddGain = odds.filter(d=>trends[d]===1).length;
    let last20 = data.last50Array.slice(-20);
    let evenCount = last20.filter(d=>d%2===0).length;
    let majorityEven = evenCount > (20-evenCount);
    if(majorityEven && evenGain>=3 && oddGain===0) return "EVEN";
    if(!majorityEven && oddGain>=3 && evenGain===0) return "ODD";
    return null;
  }
  function getOverUnderArrow(symbol) {
    let trends = rawTrend[symbol]; if(!trends) return null;
    let data = marketData[symbol]; if(!data || data.last50Array.length < 20) return null;
    let over=[5,6,7,8,9], under=[0,1,2,3,4];
    let overGain = over.filter(d=>trends[d]===1).length, underGain = under.filter(d=>trends[d]===1).length;
    let last20 = data.last50Array.slice(-20);
    let overCount = last20.filter(d=>d>=5).length;
    let majorityOver = overCount > (20-overCount);
    if(majorityOver && overGain>=3 && underGain===0) return "OVER";
    if(!majorityOver && underGain>=3 && overGain===0) return "UNDER";
    return null;
  }
  function getMajorityPrediction(symbol) {
    let data = marketData[symbol], settings = getSettings();
    if(!data || data.last50Array.length < settings.majorityWindow) return null;
    let recent = data.last50Array.slice(-settings.majorityWindow);
    if(currentMarket === 'evenodd') {
      let even = recent.filter(d=>d%2===0).length;
      if((even/recent.length)*100 >= settings.majorityThreshold) return "EVEN";
      if(((recent.length-even)/recent.length)*100 >= settings.majorityThreshold) return "ODD";
    } else if(currentMarket === 'overunder') {
      let over = recent.filter(d=>d>=5).length;
      if((over/recent.length)*100 >= settings.majorityThreshold) return "OVER";
      if(((recent.length-over)/recent.length)*100 >= settings.majorityThreshold) return "UNDER";
    }
    return null;
  }

  function getHybridPrediction(symbol) {
    if(currentMarket === 'evenodd') {
      let arrow = getEvenOddArrow(symbol), maj = getMajorityPrediction(symbol);
      let cand = currentIndicator==='arrow' ? arrow : (currentIndicator==='majority' ? maj : (arrow && maj && arrow===maj ? arrow : null));
      return (cand && checkEvenOddRankCondition(symbol, cand)) ? cand : null;
    } else if(currentMarket === 'overunder') {
      let arrow = getOverUnderArrow(symbol), maj = getMajorityPrediction(symbol);
      let cand = currentIndicator==='arrow' ? arrow : (currentIndicator==='majority' ? maj : (arrow && maj && arrow===maj ? arrow : null));
      return (cand && checkOverUnderRankCondition(symbol, cand)) ? cand : null;
    }
    return null;
  }

  function getLongTermTrend(symbol) { return null; }
  function getVolatility(symbol) { return 0; }
  function computeConfidence(symbol, pred) { return 70; }

  function getActivePrediction(symbol) {
    let pred = getHybridPrediction(symbol); if(!pred) return null;
    let settings = getSettings();
    if(settings.trendFilterEnabled) { let lt = getLongTermTrend(symbol); if(lt && pred !== lt) return null; }
    let hist = signalHistory[symbol]||[];
    if(hist.length >= settings.rejectionStreak && hist.slice(-settings.rejectionStreak).every(h=>h.outcome==='loss')) return null;
    let vol = getVolatility(symbol);
    if(vol >= settings.volatilityThresh) {
      let now = Date.now();
      if(!pendingConfirmation[symbol] || pendingConfirmation[symbol].prediction !== pred) {
        pendingConfirmation[symbol] = { prediction: pred, firstSeen: now };
        return null;
      }
      if(now - pendingConfirmation[symbol].firstSeen < 3000) return null;
    }
    return pred;
  }

  function getSignalMessage(symbol) {
    let pred = getActivePrediction(symbol);
    if(!pred) return { active: false, msg: "", confidence: 0 };
    let conf = computeConfidence(symbol, pred);
    let action = currentMarket==='digit' ? `BUY DIGIT ${pred}` : `BUY ${pred}`;
    return { active: true, msg: `${action} (${conf}%)`, confidence: conf };
  }

  // ----- NOTIFICATION & SOUND -----
  function playSignalSound() {
    if (!audioCtx || getSettings().soundEnabled === false) return;
    try {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 880;
      gain.gain.value = 0.2;
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
      osc.stop(audioCtx.currentTime + 0.3);
    } catch(e) { console.warn(e); }
  }

  function sendDesktopNotification(symbol, message) {
    if (!("Notification" in window)) return;
    if (Notification.permission === "granted") {
      new Notification("📈 TAJIRI TRADERS Signal", {
        body: `${MARKET_NAMES[symbol]}: ${message}`,
        icon: "https://www.deriv.com/favicon.ico",
        silent: false,
      });
    } else if (Notification.permission !== "denied") {
      Notification.requestPermission().then(perm => {
        if (perm === "granted") sendDesktopNotification(symbol, message);
      });
    }
  }

  function requestNotificationPermission() {
    if ("Notification" in window && Notification.permission === "default") {
      Notification.requestPermission();
    }
  }

  // ----- UI / CORE FUNCTIONS -----
  function getWindowDominant(symbol, win) {
    let data = marketData[symbol];
    if(!data || data.rollingArray.length < win) return null;
    let arr = data.rollingArray.slice(-win);
    let cnt = new Array(10).fill(0);
    arr.forEach(d=>cnt[d]++);
    let max = Math.max(...cnt);
    let dig = cnt.indexOf(max);
    return { parity: dig%2===0 ? "EVEN":"ODD", pct: max/win*100 };
  }

  function updateMultiTFProgress(symbol) {
    let div = document.getElementById(`multiTFProgress_${symbol}`);
    if(!div) return;
    if(currentMarket !== 'evenodd') { div.innerHTML = `<div class="multi-tf-progress">📊 Only Even/Odd</div>`; return; }
    let wins = [50, 100, 200];
    let lines = [];
    let first = null, allSame = true;
    for(let w of wins) {
      let info = getWindowDominant(symbol, w);
      if(!info) { lines.push(`<div class="tf-line"><span>>${w}t</span><span>—</span><span>—</span></div>`); allSame=false; continue; }
      let color = info.parity==='EVEN' ? '#4ade80' : '#f87171';
      lines.push(`<div class="tf-line"><span>>${w}t</span><span style="color:${color}">${info.parity}</span><span>${info.pct.toFixed(1)}%</span></div>`);
      if(first===null) first=info.parity;
      else if(info.parity !== first) allSame=false;
    }
    let strong = allSame && first ? `<div style="margin-top:0.1rem;">🔥 STRONG → ${first}</div>` : '';
    div.innerHTML = `<div class="multi-tf-progress"><div>📊 Dominant parity</div>${lines.join('')}${strong}</div>`;
  }

  function getDominantPattern(parityArr) {
    if(parityArr.length < 50) return null;
    let patterns = {};
    for(let L of [2,3,4]) {
      for(let i=0; i<=parityArr.length-L-1; i++) {
        let pat = parityArr.slice(i,i+L).join('');
        let next = parityArr[i+L];
        if(!patterns[pat]) patterns[pat] = {E:0,O:0};
        patterns[pat][next]++;
      }
    }
    let best = null, bestScore = -1;
    for(let pat in patterns) {
      let p = patterns[pat];
      let total = p.E + p.O;
      if(total < 10) continue;
      let probE = p.E/total, probO = p.O/total;
      let maxProb = Math.max(probE, probO);
      if(maxProb < 0.7) continue;
      let pred = probE >= probO ? 'E' : 'O';
      let score = maxProb * Math.sqrt(total);
      if(score > bestScore) { bestScore = score; best = { pattern: pat, prediction: pred, confidence: maxProb, count: total }; }
    }
    return best;
  }

  function updatePatternPreview(symbol) {
    let div = document.getElementById(`patternPreview_${symbol}`);
    if(!div) return;
    if(currentMarket !== 'evenodd') { div.innerHTML = `<div class="pattern-preview">📊 Only Even/Odd</div>`; return; }
    let data = marketData[symbol];
    if(!data || data.rollingArray.length < 100) { div.innerHTML = `<div class="pattern-preview">⏳ Loading pattern...</div>`; return; }
    let parity = data.rollingArray.slice(-300).map(d=>d%2===0?'E':'O');
    let last4 = parity.slice(-4).map(p=>`<span style="background:${p==='E'?'#4ade80':'#f87171'}">${p}</span>`).join('');
    let dom = getDominantPattern(parity);
    let rule = dom ? `<div>🧠 ${dom.pattern} → <span style="color:${dom.prediction==='E'?'#4ade80':'#f87171'}">${dom.prediction}</span> (${(dom.confidence*100).toFixed(0)}% win rate)</div>` : '<div>📉 No dominant pattern</div>';
    div.innerHTML = `<div class="pattern-preview"><div>Last 4: ${last4}</div>${rule}</div>`;
  }

  function rebuildDigitGrid(sym) {
    let rolling = getRollingCounts(sym);
    if(!rolling) return;
    let { counts, total } = rolling;
    let pct = counts.map(c => (c/total*100).toFixed(1));
    let tr = rawTrend[sym] || {};
    let data = marketData[sym];
    let last50 = data.last50Array;
    let opct = counts.map(c=>c/total);
    let lc = new Array(10).fill(0);
    last50.forEach(dd=>lc[dd]++);
    let hot = new Set(), cold = new Set();
    if(last50.length>=20) {
      let diff = lc.map((c,i)=> (c/last50.length - opct[i]));
      let sd = diff.map((v,i)=>({dig:i, diff:v})).sort((a,b)=>b.diff - a.diff);
      hot = new Set(sd.slice(0,2).map(x=>x.dig));
      cold = new Set(sd.slice(-2).map(x=>x.dig));
    }
    let arr = counts.map((c,i)=>({digit:i, count:c}));
    let s = [...arr].sort((a,b)=>b.count - a.count);
    let max = s[0].count;
    let most = new Set(s.filter(i=>i.count===max).map(i=>i.digit));
    let sec = null; for(let i of s) if(i.count!==max) { sec=i.count; break; }
    let second = sec!==null ? new Set(s.filter(i=>i.count===sec).map(i=>i.digit)) : new Set();
    let min = s[s.length-1].count;
    let least = new Set(s.filter(i=>i.count===min).map(i=>i.digit));
    let sm = null; for(let i=s.length-2;i>=0;i--) if(s[i].count!==min) { sm=s[i].count; break; }
    let sleast = sm!==null ? new Set(s.filter(i=>i.count===sm).map(i=>i.digit)) : new Set();
    let container = document.getElementById(`digitsContainer_${sym}`);
    if(!container) return;
    container.innerHTML = '';
    let evens = [0,2,4,6,8], odds = [1,3,5,7,9];
    let row1 = document.createElement('div'); row1.className='digits-row';
    evens.forEach(dig=>{
      let cell = document.createElement('div'); cell.className='digit-cell';
      if(most.has(dig)) cell.classList.add('most');
      if(second.has(dig)) cell.classList.add('second');
      if(least.has(dig)) cell.classList.add('least');
      if(sleast.has(dig)) cell.classList.add('secondleast');
      if(hot.has(dig)) cell.classList.add('hot');
      if(cold.has(dig)) cell.classList.add('cold');
      let arrow = tr[dig]===1?'↑':(tr[dig]===-1?'↓':'•');
      cell.innerHTML = `<span class="digit">${dig}</span><div class="percent">${pct[dig]}%</div><span class="trend">${arrow}</span>`;
      if(data.lastDigit===dig) { let ptr = document.createElement('div'); ptr.className='pointer-marker'; cell.appendChild(ptr); }
      row1.appendChild(cell);
    });
    let row2 = document.createElement('div'); row2.className='digits-row';
    odds.forEach(dig=>{
      let cell = document.createElement('div'); cell.className='digit-cell';
      if(most.has(dig)) cell.classList.add('most');
      if(second.has(dig)) cell.classList.add('second');
      if(least.has(dig)) cell.classList.add('least');
      if(sleast.has(dig)) cell.classList.add('secondleast');
      if(hot.has(dig)) cell.classList.add('hot');
      if(cold.has(dig)) cell.classList.add('cold');
      let arrow = tr[dig]===1?'↑':(tr[dig]===-1?'↓':'•');
      cell.innerHTML = `<span class="digit">${dig}</span><div class="percent">${pct[dig]}%</div><span class="trend">${arrow}</span>`;
      if(data.lastDigit===dig) { let ptr = document.createElement('div'); ptr.className='pointer-marker'; cell.appendChild(ptr); }
      row2.appendChild(cell);
    });
    container.appendChild(row1); container.appendChild(row2);
  }

  function renderMarket(symbol) {
    let data = marketData[symbol]; if(!data || data.rollingArray.length===0) return;
    let priceSpan = document.getElementById(`livePriceBig_${symbol}`); if(priceSpan) priceSpan.innerText = data.lastPriceDisplay;
    let lastSpan = document.getElementById(`lastDigit_${symbol}`); if(lastSpan) lastSpan.innerText = data.lastDigit;
    let last50 = data.last50Array;
    if(last50.length>0){
      if(currentMarket === 'evenodd') {
        let even = last50.filter(d=>d%2===0).length;
        document.getElementById(`parityStats_${symbol}`).innerHTML = `🎲 E:${(even/last50.length*100).toFixed(1)}% O:${(100-even/last50.length*100).toFixed(1)}%`;
        let streak=1, lastPar=last50[last50.length-1]%2===0?'E':'O';
        for(let i=last50.length-2;i>=0;i--) if((last50[i]%2===0?'E':'O')===lastPar) streak++; else break;
        document.getElementById(`streakStats_${symbol}`).innerHTML = `📊 Streak: ${streak}x ${lastPar}`;
        let seqHtml = last50.map(d=>d%2===0?'<span style="color:#4ade80;">E</span>':'<span style="color:#f87171;">O</span>').join('');
        document.getElementById(`paritySeq_${symbol}`).innerHTML = seqHtml;
      } else if(currentMarket === 'overunder') {
        let over = last50.filter(d=>d>=5).length;
        document.getElementById(`parityStats_${symbol}`).innerHTML = `📈 Over 4: ${(over/last50.length*100).toFixed(1)}% | Under 5: ${(100-over/last50.length*100).toFixed(1)}%`;
        let streak=1, lastOU=last50[last50.length-1]>=5?'O':'U';
        for(let i=last50.length-2;i>=0;i--) if((last50[i]>=5?'O':'U')===lastOU) streak++; else break;
        document.getElementById(`streakStats_${symbol}`).innerHTML = `📊 Streak: ${streak}x ${lastOU}`;
        let seqHtml = last50.map(d=> d<=3?'<span style="color:#f87171;">U</span>':(d<=5?'<span style="color:#3b82f6;">M</span>':'<span style="color:#4ade80;">O</span>')).join('');
        document.getElementById(`ouSeq_${symbol}`).innerHTML = seqHtml;
      } else {
        let seqHtml = last50.map(d=>`<span style="color:${d<=3?'#f87171':d<=5?'#3b82f6':'#4ade80'}">${d}</span>`).join('');
        document.getElementById(`paritySeq_${symbol}`).innerHTML = seqHtml;
        document.getElementById(`parityStats_${symbol}`).innerHTML = `🎯 Last digit: ${data.lastDigit}`;
      }
      let pred = (()=>{ if(last50.length<10) return {digit:null,prob:0}; let w=new Array(10).fill(0); for(let i=0;i<last50.length;i++) w[last50[i]] += (i>=last50.length-10?3:1); let best=w.indexOf(Math.max(...w)); return {digit:best, prob:(w[best]/w.reduce((a,b)=>a+b,0)*100).toFixed(1)}; })();
      document.getElementById(`prediction_${symbol}`).innerHTML = `🔮 NEXT DIGIT: ${pred.digit!==null?`${pred.digit} (${pred.prob}%)`:'—'}`;
      let now = Date.now();
      let active = (signalExpiry[symbol] && now < signalExpiry[symbol]);
      let sig = getSignalMessage(symbol);
      let div = document.getElementById(`signalDisplay_${symbol}`);
      if(!active && sig.active) {
        signalExpiry[symbol] = now + SIGNAL_LOCK_DURATION;
        activeSignalMsg[symbol] = sig.msg;
        lockedMarkets.set(symbol, { expiry: signalExpiry[symbol], prediction: getActivePrediction(symbol) });
        div.innerHTML = `<div class="signal-flash">🎯 ${sig.msg} <div class="strength-meter"><div class="strength-fill" style="width:${sig.confidence}%"></div></div><div><button class="vote-btn" onclick="window.recordOutcome('${symbol}','win')">✅ Win</button><button class="vote-btn" onclick="window.recordOutcome('${symbol}','loss')">❌ Loss</button></div></div>`;
        // NEW: sound + desktop notification for fresh signal
        playSignalSound();
        sendDesktopNotification(symbol, sig.msg);
      } else if(active) {
        let rem = Math.max(0, Math.floor((signalExpiry[symbol]-now)/1000));
        div.innerHTML = `<div class="signal-flash">🎯 ${activeSignalMsg[symbol]} (${rem}s)</div>`;
      } else {
        div.innerHTML = `<span class="no-signal">⚡ waiting...</span>`;
      }
    }
    rebuildDigitGrid(symbol);
    updatePatternPreview(symbol);
    updateMultiTFProgress(symbol);
    updateAllMarketsList();
  }

  function updateAllMarketsList() {
    let now = Date.now();
    for(let [sym, data] of lockedMarkets.entries()) if(now > data.expiry) lockedMarkets.delete(sym);
    for(let sym of ALL_SYMBOLS) {
      let pred = getActivePrediction(sym);
      if(pred && !lockedMarkets.has(sym)) lockedMarkets.set(sym, { expiry: now + SIGNAL_LOCK_DURATION, prediction: pred });
    }
    let items = ALL_SYMBOLS.map(sym => {
      let lock = lockedMarkets.get(sym);
      let active = !!lock;
      let cls = active ? (currentIndicator==='arrow'?'blink-arrow':(currentIndicator==='majority'?'blink-majority':'blink-hybrid')) : '';
      let suffix = '';
      if(active && lock && lock.prediction) suffix = ` → ${lock.prediction}`;
      return `<div class="market-list-item ${cls}" data-symbol="${sym}">${MARKET_NAMES[sym]}${suffix}</div>`;
    }).join('');
    document.getElementById('marketsListContainer').innerHTML = items;
    document.querySelectorAll('.market-list-item').forEach(el => el.onclick = () => { let card = document.getElementById(`market_${el.getAttribute('data-symbol')}`); if(card) card.scrollIntoView({behavior:'smooth', block:'center'}); });
  }

  function processTick(symbol, priceNumeric, quoteDisplay) {
    if(!marketData[symbol]) marketData[symbol] = { rollingArray: [], last50Array: [], lastDigit: null, lastPriceDisplay: "—" };
    let data = marketData[symbol];
    let display = (quoteDisplay !== null) ? String(quoteDisplay) : formatHistoryPrice(symbol, priceNumeric);
    data.lastPriceDisplay = display;
    let digit = lastDigitFromFormatted(display);
    data.lastDigit = digit;
    data.rollingArray.push(digit);
    let winSize = getSettings().windowSize;
    while(data.rollingArray.length > winSize) data.rollingArray.shift();
    data.last50Array.push(digit);
    if(data.last50Array.length > 50) data.last50Array.shift();
    updateTrends(symbol);
    renderMarket(symbol);
  }

  function createMarketUI(symbol, displayName, isInvalid=false) {
    if(document.getElementById(`market_${symbol}`)) return;
    let container = document.getElementById('marketsContainer');
    let card = document.createElement('div'); card.className='market-card'; card.id=`market_${symbol}`;
    card.innerHTML = `<div class="market-header"><div class="market-title"><span>📈 ${displayName}</span><span class="live-price-big" id="livePriceBig_${symbol}">—</span></div><div class="market-status" id="status_${symbol}">${isInvalid?'🔴 BLOCKED':'🔴 no data'}</div><span class="last-digit-badge" id="lastDigit_${symbol}">?</span></div>
      <div class="card-content">
        <div id="digitsContainer_${symbol}" class="digits-grid"></div>
        <div class="info-row"><div class="parity-stats" id="parityStats_${symbol}">--</div><div class="streak-stats" id="streakStats_${symbol}">Streak: 0</div><div class="evenodd-winrate" id="evenOddWinrate_${symbol}"></div><div class="prediction-box" id="prediction_${symbol}">🔮 NEXT DIGIT: —</div></div>
        <div class="letter-sequence-wrapper"><div class="letter-sequence" id="paritySeq_${symbol}">⏳ ticks...</div><div class="letter-sequence hidden" id="ouSeq_${symbol}"></div></div>
        <div class="signal-area" id="signalDisplay_${symbol}"><span class="no-signal">⚡ waiting...</span></div>
        <div id="patternPreview_${symbol}" class="pattern-preview">⏳ pattern sync</div>
        <div id="multiTFProgress_${symbol}" class="multi-tf-progress">⏳ multi‑TF</div>
      </div>`;
    container.appendChild(card);
    document.getElementById(`ouSeq_${symbol}`).classList.add('hidden');
  }

  function subscribeToMarket(sym) { if(ws && ws.readyState===WebSocket.OPEN && !invalidSymbols.has(sym)) { ws.send(JSON.stringify({ ticks_history: sym, count: 1000, end: "latest", style: "ticks" })); ws.send(JSON.stringify({ ticks: sym, subscribe: 1 })); } }

  window.recordOutcome = function(symbol, outcome) {
    if(!signalHistory[symbol]) signalHistory[symbol] = [];
    signalHistory[symbol].push({ outcome, timestamp: Date.now() });
    if(signalHistory[symbol].length>10) signalHistory[symbol].shift();
    let settings = getSettings();
    if(settings.soundEnabled && audioCtx) {
      let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.frequency.value = outcome==='win' ? 1046.5 : 440;
      gain.gain.value = 0.15;
      osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime+0.3);
      osc.stop(audioCtx.currentTime+0.3);
    }
    renderMarket(symbol);
  };

  // ----- WEBSOCKET CONNECTION -----
  function connectWebSocket() {
    let token = document.getElementById('token').value.trim();
    if(!token) { alert("Enter API token"); return; }
    if(ws && (ws.readyState===WebSocket.OPEN || ws.readyState===WebSocket.CONNECTING)) ws.close();
    document.getElementById('connectionStatus').innerHTML = '⏳ Connecting...';
    ws = new WebSocket('wss://ws.derivws.com/websockets/v3?app_id=1089');
    ws.onopen = () => { ws.send(JSON.stringify({authorize: token})); };
    ws.onmessage = e => {
      try {
        let msg = JSON.parse(e.data);
        if(msg.msg_type === 'authorize') {
          if(msg.error) { document.getElementById('connectionStatus').innerHTML = `❌ ${msg.error.message || 'Invalid token'}`; return; }
          document.getElementById('connectionStatus').innerHTML = '✅ Connected & loading markets';
          document.getElementById('marketsContainer').innerHTML = '';
          marketData = {}; invalidSymbols.clear(); signalExpiry={}; activeSignalMsg={}; lockedMarkets.clear(); rawTrend={}; signalHistory={}; pendingConfirmation={};
          for(let sym of ALL_SYMBOLS) createMarketUI(sym, MARKET_NAMES[sym], false);
          let idx=0;
          function nextSub() { if(idx>=ALL_SYMBOLS.length) { document.getElementById('connectionStatus').innerHTML = `✅ ${currentMarket.toUpperCase()} / ${currentIndicator.toUpperCase()}`; return; } let sym=ALL_SYMBOLS[idx]; if(!invalidSymbols.has(sym)) subscribeToMarket(sym); idx++; setTimeout(nextSub, 200); }
          nextSub();
          startPing();
        } else if(msg.msg_type==='tick' && msg.tick) {
          let sym = msg.tick.symbol;
          if(MARKET_NAMES[sym] && !invalidSymbols.has(sym)) {
            if(!marketData[sym]) marketData[sym] = { rollingArray: [], last50Array: [], lastDigit: null, lastPriceDisplay: "—" };
            let display = msg.tick.quote_display || formatHistoryPrice(sym, msg.tick.quote);
            processTick(sym, msg.tick.quote, display);
            let statusSpan = document.getElementById(`status_${sym}`);
            if(statusSpan && statusSpan.innerText !== '🟢 live') statusSpan.innerHTML = '🟢 live';
          }
        } else if(msg.msg_type==='history' && msg.history?.prices && msg.echo_req?.ticks_history) {
          let sym = msg.echo_req.ticks_history;
          if(MARKET_NAMES[sym] && !invalidSymbols.has(sym)) msg.history.prices.forEach(p => processTick(sym, p, null));
        } else if(msg.error && msg.error.code==='InvalidSymbol' && msg.echo_req?.ticks_history) {
          let sym = msg.echo_req.ticks_history;
          if(MARKET_NAMES[sym] && !invalidSymbols.has(sym)) { invalidSymbols.add(sym); createMarketUI(sym, MARKET_NAMES[sym], true); }
        }
      } catch(err) { console.warn(err); }
    };
    ws.onerror = () => { document.getElementById('connectionStatus').innerHTML = '⚠️ WS error'; };
    ws.onclose = () => { if(ping) clearInterval(ping); document.getElementById('connectionStatus').innerHTML = '🔴 Disconnected'; };
  }
  let ping; function startPing() { if(ping) clearInterval(ping); ping = setInterval(()=>{ if(ws && ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify({ping:1})); }, 25000); }
  function toggleMode() { document.body.classList.toggle('light'); }
  let audioCtx = null;
  function setMarket(m) { currentMarket=m; document.querySelectorAll('.market-btn').forEach(btn=>btn.classList.toggle('active', btn.getAttribute('data-market')===m)); for(let s in marketData) renderMarket(s); document.getElementById('connectionStatus').innerHTML = `✅ ${m.toUpperCase()} market`; }
  function setIndicator(i) { currentIndicator=i; document.querySelectorAll('.indicator-btn').forEach(btn=>btn.classList.toggle('active', btn.getAttribute('data-indicator')===i)); for(let s in marketData) renderMarket(s); document.getElementById('connectionStatus').innerHTML = `✅ ${i.toUpperCase()} indicator`; }
  window.connectWebSocket = connectWebSocket; window.toggleMode = toggleMode; window.setMarket = setMarket; window.setIndicator = setIndicator; window.recordOutcome = recordOutcome;
  document.querySelectorAll('.market-btn').forEach(btn=>btn.onclick=()=>setMarket(btn.getAttribute('data-market')));
  document.querySelectorAll('.indicator-btn').forEach(btn=>btn.onclick=()=>setIndicator(btn.getAttribute('data-indicator')));
  const modal = document.getElementById('settingsModal');
  document.getElementById('settingsBtn').onclick = () => modal.style.display = 'flex';
  document.getElementById('closeModal').onclick = () => modal.style.display = 'none';
  window.onclick = e => { if(e.target === modal) modal.style.display = 'none'; };
  document.body.addEventListener('click', () => { 
    if(audioCtx === null) audioCtx = new AudioContext(); 
    if(audioCtx.state === 'suspended') audioCtx.resume();
    requestNotificationPermission();
  });
  setInterval(()=>{ for(let s in marketData) if(marketData[s]?.rollingArray?.length) renderMarket(s); }, 1500);
</script>

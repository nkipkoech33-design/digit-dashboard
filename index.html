<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Deriv Digit Analyzer</title>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:Arial;
  margin:0;
}

.header{
  padding:10px;
  background:#020617;
  display:flex;
  justify-content:space-between;
}

select{
  padding:5px;
}

.container{
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.market{
  border:1px solid #1e293b;
  padding:10px;
  border-radius:10px;
  background:#020617;
  transition:0.3s;
}

.blink{
  animation:blink 1s infinite;
}

@keyframes blink{
  0%{background:#020617;}
  50%{background:#78350f;}
  100%{background:#020617;}
}

.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:5px;
  margin-top:5px;
}

.box{
  background:#1e293b;
  padding:5px;
  text-align:center;
  border-radius:5px;
  position:relative;
}

.pointer{
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%);
  font-size:10px;
}

.tick{
  font-family:monospace;
  margin-top:5px;
}

.e{color:lime;}
.o{color:red;}

.win{
  margin-top:5px;
}
</style>
</head>

<body>

<div class="header">
  <h3>Digit Analyzer</h3>
  <select id="viewMode">
    <option value="all">All Markets</option>
    <option value="two">2 Markets Only</option>
  </select>
</div>

<div class="container" id="markets"></div>

<script>

const symbols = [
  "R_10","R_25","R_50","R_75","R_100",
  "1HZ10V","1HZ25V","1HZ50V","1HZ75V","1HZ100V",
  "JD10","JD25","JD50","JD75","JD100",
  "JD200","JD300","JD400"
];

let dataStore = {};
let ws = new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");

ws.onopen = () => {
  symbols.forEach(s=>{
    ws.send(JSON.stringify({ticks:s, subscribe:1}));
    dataStore[s]=[];
  });
};

ws.onmessage = (msg)=>{
  let data = JSON.parse(msg.data);

  if(data.tick){
    let sym = data.tick.symbol;
    let digit = parseInt(data.tick.quote.toString().slice(-1));

    let arr = dataStore[sym];
    arr.push(digit);

    if(arr.length>1000) arr.shift();

    render();
  }
};

function analyze(arr){
  let counts = Array(10).fill(0);

  arr.forEach(d=>counts[d]++);

  let total = arr.length || 1;

  let perc = counts.map(c=> (c/total*100).toFixed(1));

  let even = 0, odd = 0;
  counts.forEach((c,i)=>{
    if(i%2==0) even+=c;
    else odd+=c;
  });

  even = (even/total*100).toFixed(1);
  odd = (odd/total*100).toFixed(1);

  return {counts,perc,even,odd};
}

function render(){

  let container = document.getElementById("markets");
  container.innerHTML="";

  let mode = document.getElementById("viewMode").value;
  let list = [...symbols];

  if(mode==="two") list = list.slice(0,2);

  list.forEach(sym=>{

    let arr = dataStore[sym];
    if(!arr || arr.length<10) return;

    let {counts,perc,even,odd} = analyze(arr);

    let last50 = arr.slice(-50).map(d=> d%2==0 ? "E":"O").join("");

    let marketDiv = document.createElement("div");
    marketDiv.className="market";

    // DOMINANCE LOGIC
    let evenDom = even > odd && perc.filter((p,i)=>i%2!=0).every(p=>p<10);
    let oddDom = odd > even && perc.filter((p,i)=>i%2==0).every(p=>p<10);

    if(evenDom || oddDom){
      marketDiv.classList.add("blink");
      beep();
    }

    marketDiv.innerHTML = `
      <b>${sym}</b>

      <div class="win">
        Even: ${even}% | Odd: ${odd}%
      </div>

      <div class="grid">
        ${[0,2,4,6,8].map(i=>box(i,perc)).join("")}
      </div>

      <div class="grid">
        ${[1,3,5,7,9].map(i=>box(i,perc)).join("")}
      </div>

      <div class="tick">
        ${last50.split("").map(c=> 
          c==="E" ? `<span class="e">E</span>` : `<span class="o">O</span>`
        ).join("")}
      </div>
    `;

    container.appendChild(marketDiv);
  });
}

function box(i,perc){

  let p = parseFloat(perc[i]);

  let color = "#1e293b";

  let sorted = [...perc].map(Number).sort((a,b)=>b-a);

  if(p===sorted[0]) color="green";
  else if(p===sorted[1]) color="blue";
  else if(p===sorted[sorted.length-1]) color="red";
  else if(p===sorted[sorted.length-2]) color="orange";

  return `
    <div class="box" style="background:${color}">
      ${i}<br>${perc[i]}%
    </div>
  `;
}

function beep(){
  let ctx = new AudioContext();
  let osc = ctx.createOscillator();
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.1);
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Digit Dashboard</title>

<style>
body{background:#0f172a;color:white;font-family:Arial;margin:0;}

.container{
  display:flex;
}

.left{
  width:50%;
  display:flex;
  flex-direction:column;
  gap:8px;
  padding:10px;
}

.right{
  width:50%;
  border-left:2px solid #1e293b;
  padding:10px;
}

.card{
  background:#1e293b;
  padding:6px;
  border-radius:8px;
  text-align:center;
}

@keyframes blink{
  0%{background:#1e293b;}
  50%{background:#ef4444;}
  100%{background:#1e293b;}
}

.signal{animation:blink 0.7s infinite;}

.row{
  display:flex;
  justify-content:space-between;
  margin:6px 0;
  position:relative;
}

.digit{
  width:32px;
  height:32px;
  border-radius:6px;
  background:#334155;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-size:10px;
}

.green{background:#22c55e;}
.yellow{background:#3b82f6;} /* BLUE now */
.orange{background:#f97316;}
.red{background:#ef4444;}

.cursor{
  position:absolute;
  width:8px;
  height:8px;
  background:#22c55e;
  border-radius:50%;
  top:-5px;
  transition:all 0.25s linear;
  box-shadow:0 0 6px #22c55e;
}

.stats{font-size:11px;}

.stream{
  font-size:10px;
  margin-top:4px;
  word-break:break-all;
  color:#38bdf8;
  letter-spacing:1px;
}
</style>
</head>

<body>

<div class="container">
  
  <div class="left" id="app"></div>

  <div class="right">
    <h3>🤖 Trading Bot (Coming Next)</h3>
    <p>This space will be used for automation.</p>
  </div>

</div>

<script>

const names=[
"Vol 10 (1s)","Vol 15 (1s)","Vol 25 (1s)","Vol 30 (1s)",
"Vol 50 (1s)","Vol 75 (1s)","Vol 90 (1s)","Vol 100 (1s)",
"Vol 10 (50t)","Vol 25 (50t)","Vol 50 (50t)","Vol 75 (50t)","Vol 100 (50t)",
"Jump 10","Jump 25","Jump 50","Jump 75","Jump 100"
];

const even=[0,2,4,6,8];
const odd=[1,3,5,7,9];

let app=document.getElementById("app");
let markets=[];
let audioCtx=null;

document.body.addEventListener("click",()=>{
 if(!audioCtx){
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
 }
});

function beep(){
 if(!audioCtx) return;
 let osc=audioCtx.createOscillator();
 let gain=audioCtx.createGain();
 osc.connect(gain);
 gain.connect(audioCtx.destination);
 osc.frequency.value=800;
 gain.gain.value=0.2;
 osc.start();
 osc.stop(audioCtx.currentTime+0.15);
}

names.forEach((n,i)=>{

 let card=document.createElement("div");
 card.className="card";

 card.innerHTML=`
  <h4>${n}</h4>
  <div class="row" id="evenRow${i}">
    <div class="cursor" id="cursor${i}"></div>
  </div>
  <div class="row" id="oddRow${i}"></div>
  <div class="stats" id="s${i}"></div>
  <div class="stream" id="stream${i}"></div>
 `;

 app.appendChild(card);

 createRow(i,"even");
 createRow(i,"odd");

 markets.push({ticks:[],stream:[],active:false});
});

function createRow(i,type){
 let row=document.getElementById(type+"Row"+i);
 let arr= type==="even"?even:odd;

 arr.forEach(d=>{
  let el=document.createElement("div");
  el.className="digit";
  el.id=`m${i}d${d}`;
  el.innerHTML=`${d}<br>0%`;
  row.appendChild(el);
 });
}

setInterval(()=>{

 markets.forEach((m,i)=>{

  let d=Math.floor(Math.random()*10);

  m.ticks.push(d);
  if(m.ticks.length>1000) m.ticks.shift();

  let eo = d % 2 === 0 ? "E" : "O";
  m.stream.push(eo);
  if(m.stream.length>50) m.stream.shift();

  document.getElementById("stream"+i).innerText = m.stream.join("");

  let counts=Array(10).fill(0);
  m.ticks.forEach(x=>counts[x]++);

  let total=m.ticks.length;
  let perc=counts.map(c=>c/total*100);
  let sorted=[...perc].sort((a,b)=>b-a);

  let evenSum=0, oddSum=0;

  perc.forEach((p,x)=>{
    let el=document.getElementById(`m${i}d${x}`);
    el.className="digit";
    el.innerHTML=`${x}<br>${p.toFixed(1)}%`;

    if(p===sorted[0]) el.classList.add("green");
    else if(p===sorted[1]) el.classList.add("yellow");
    else if(p===sorted[sorted.length-1]) el.classList.add("red");
    else if(p===sorted[sorted.length-2]) el.classList.add("orange");

    if(x%2===0) evenSum+=p;
    else oddSum+=p;
  });

  let cursor=document.getElementById("cursor"+i);
  let target=document.getElementById(`m${i}d${d}`);
  let row=target.parentElement;

  let rect=target.getBoundingClientRect();
  let parent=row.getBoundingClientRect();

  if(d%2===0){
    document.getElementById("evenRow"+i).appendChild(cursor);
  }else{
    document.getElementById("oddRow"+i).appendChild(cursor);
  }

  cursor.style.left=(rect.left-parent.left+16)+"px";

  let evenStrong = evenSum>oddSum && [1,3,5,7,9].every(x=>perc[x]<10);
  let oddStrong  = oddSum>evenSum && [0,2,4,6,8].every(x=>perc[x]<10);

  let card=document.getElementsByClassName("card")[i];

  if(evenStrong || oddStrong){

    if(!m.active){
      beep();
      m.active=true;
    }

    card.classList.add("signal");
    app.prepend(card);

    document.getElementById("s"+i).innerHTML=
      `E:${evenSum.toFixed(1)}% | O:${oddSum.toFixed(1)}%<br>
       🚨 ${evenStrong?"STRONG EVEN":"STRONG ODD"}`;

  }else{

    card.classList.remove("signal");
    m.active=false;

    document.getElementById("s"+i).innerHTML=
      `E:${evenSum.toFixed(1)}% | O:${oddSum.toFixed(1)}%`;

  }

 });

},700);

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Deriv Digit Analyzer PRO FINAL</title>

<style>
body{background:#0f172a;color:white;font-family:Arial;margin:0;}

.header{
  padding:10px;
  background:#020617;
}

.container{
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.market{
  border:1px solid #1e293b;
  padding:8px;
  border-radius:8px;
  background:#020617;
}

.price{
  color:#38bdf8;
  font-size:12px;
  margin-top:2px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:4px;
  margin-top:6px;
}

.box{
  padding:4px;
  font-size:11px;
  text-align:center;
  border-radius:4px;
  position:relative;
}

/* pointer */
.pointer{
  position:absolute;
  top:-12px;
  left:50%;
  transform:translateX(-50%);
  font-size:12px;
  color:yellow;
  animation:jump 0.3s ease;
}

@keyframes jump{
  50%{transform:translate(-50%,-8px);}
}
</style>
</head>

<body>

<div class="header">
  <h3>Digit Analyzer PRO FINAL</h3>
</div>

<div class="container" id="markets"></div>

<script>

const markets = [
  {sym:"R_10", name:"Volatility 10 Index"},
  {sym:"R_25", name:"Volatility 25 Index"},
  {sym:"R_50", name:"Volatility 50 Index"},
  {sym:"R_75", name:"Volatility 75 Index"},
  {sym:"R_100", name:"Volatility 100 Index"},
  {sym:"1HZ10V", name:"Volatility 10 (1s) Index"},
  {sym:"1HZ25V", name:"Volatility 25 (1s) Index"},
  {sym:"1HZ50V", name:"Volatility 50 (1s) Index"},
  {sym:"1HZ75V", name:"Volatility 75 (1s) Index"},
  {sym:"1HZ100V", name:"Volatility 100 (1s) Index"},
  {sym:"JD10", name:"Jump 10 Index"},
  {sym:"JD25", name:"Jump 25 Index"},
  {sym:"JD50", name:"Jump 50 Index"},
  {sym:"JD75", name:"Jump 75 Index"},
  {sym:"JD100", name:"Jump 100 Index"},
  {sym:"JD200", name:"Jump 200 Index"},
  {sym:"JD300", name:"Jump 300 Index"},
  {sym:"JD400", name:"Jump 400 Index"}
];

let dataStore = {};
let lastDigitMap = {};
let lastPriceMap = {};
let pipMap = {};
let historyLoaded = {};

let ws = new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");

ws.onopen = () => {
  markets.forEach(m=>{
    dataStore[m.sym] = [];

    ws.send(JSON.stringify({
      ticks: m.sym,
      subscribe: 1
    }));
  });
};

ws.onmessage = (msg)=>{
  let data = JSON.parse(msg.data);

  // LIVE
  if(data.tick){
    let sym = data.tick.symbol;

    let pip = data.tick.pip_size;
    pipMap[sym] = pip;

    let price = parseFloat(data.tick.quote).toFixed(pip);
    let digit = parseInt(price[price.length-1]);

    lastPriceMap[sym] = price;
    lastDigitMap[sym] = digit;

    // load history AFTER pip known
    if(!historyLoaded[sym]){
      historyLoaded[sym] = true;

      ws.send(JSON.stringify({
        ticks_history: sym,
        count: 1000,
        end: "latest",
        style: "ticks"
      }));

      return;
    }

    let arr = dataStore[sym];
    arr.push(digit);
    if(arr.length>1000) arr.shift();

    render();
  }

  // HISTORY (FIXED)
  if(data.history){
    let sym = data.echo_req.ticks_history;
    let pip = pipMap[sym] || 2;

    dataStore[sym] = data.history.prices.map(p=>{
      let formatted = parseFloat(p).toFixed(pip);
      return parseInt(formatted[formatted.length-1]);
    });

    render();
  }
};

function analyze(arr){
  let counts = Array(10).fill(0);
  arr.forEach(d=>counts[d]++);

  let total = arr.length || 1;

  let perc = counts.map(c=> (c/total*100).toFixed(1));

  // ranking
  let sorted = [...perc].map(Number).sort((a,b)=>b-a);

  return {perc, sorted};
}

function render(){

  let container = document.getElementById("markets");
  container.innerHTML="";

  markets.forEach(m=>{

    let arr = dataStore[m.sym];
    if(!arr || arr.length<10) return;

    let {perc, sorted} = analyze(arr);
    let lastDigit = lastDigitMap[m.sym];
    let price = lastPriceMap[m.sym] || "--";

    let marketDiv = document.createElement("div");
    marketDiv.className="market";

    marketDiv.innerHTML = `
      <b>${m.name} (${arr.length}/1000)</b>
      <div class="price">Price: ${price}</div>

      <div class="grid">
        ${[0,2,4,6,8].map(i=>box(i,perc,sorted,lastDigit)).join("")}
      </div>

      <div class="grid">
        ${[1,3,5,7,9].map(i=>box(i,perc,sorted,lastDigit)).join("")}
      </div>
    `;

    container.appendChild(marketDiv);
  });
}

function box(i,perc,sorted,lastDigit){

  let p = parseFloat(perc[i]);
  let color = "#1e293b";

  if(p === sorted[0]) color="green";
  else if(p === sorted[1]) color="blue";
  else if(p === sorted[sorted.length-1]) color="red";
  else if(p === sorted[sorted.length-2]) color="orange";

  return `
    <div class="box" style="background:${color}">
      ${i}<br>${perc[i]}%
      ${i===lastDigit ? '<div class="pointer">▲</div>' : ''}
    </div>
  `;
}

</script>

</body>
</html>

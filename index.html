<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Deriv Digit Analyzer PRO+</title>

<style>
body{background:#0f172a;color:white;font-family:Arial;margin:0;}

.header{
  padding:10px;
  background:#020617;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.controls{display:flex;gap:10px;}
button, select{padding:5px;cursor:pointer;}

.container{
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.market{
  border:1px solid #1e293b;
  padding:8px;
  border-radius:8px;
  background:#020617;
}

/* POINTER */
.pointer{
  position:absolute;
  top:-12px;
  left:50%;
  transform:translateX(-50%);
  font-size:12px;
  color:yellow;
  animation:jump 0.3s ease;
}
@keyframes jump{
  50%{transform:translate(-50%,-8px);}
}

.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:4px;
  margin-top:6px;
}

.box{
  background:#1e293b;
  padding:4px;
  font-size:11px;
  text-align:center;
  border-radius:4px;
  position:relative;
}

.tick{
  font-family:monospace;
  margin-top:6px;
  display:grid;
  grid-template-columns:repeat(50,1fr);
  gap:2px;
}

.tick span{font-size:10px;text-align:center;}
.e{color:lime;}
.o{color:red;}

.price{font-size:13px;margin-top:2px;}
.up{color:lime;}
.down{color:red;}
.flat{color:gray;}

.speed{font-size:11px;margin-top:3px;}
.fast{color:lime;}
.normal{color:orange;}
.slow{color:red;}

.zone{
  margin-top:4px;
  font-size:12px;
  color:#facc15;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
  <h3>Digit Analyzer PRO+</h3>
</div>

<div class="container" id="markets"></div>

<script>

const markets = [
  {sym:"R_10", name:"Volatility 10 Index"},
  {sym:"R_25", name:"Volatility 25 Index"},
  {sym:"R_50", name:"Volatility 50 Index"},
  {sym:"R_75", name:"Volatility 75 Index"},
  {sym:"R_100", name:"Volatility 100 Index"},
  {sym:"JD10", name:"Jump 10 Index"},
  {sym:"JD25", name:"Jump 25 Index"},
  {sym:"JD50", name:"Jump 50 Index"},
  {sym:"JD75", name:"Jump 75 Index"},
  {sym:"JD100", name:"Jump 100 Index"}
];

let dataStore = {};
let lastDigitMap = {};
let lastPriceMap = {};
let prevPriceMap = {};
let tickTimeMap = {};

let ws = new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");

ws.onopen = () => {
  markets.forEach(m=>{
    dataStore[m.sym] = [];

    ws.send(JSON.stringify({
      ticks_history: m.sym,
      count: 1000,
      end: "latest",
      style: "ticks"
    }));

    ws.send(JSON.stringify({
      ticks: m.sym,
      subscribe: 1
    }));
  });
};

ws.onmessage = (msg)=>{
  let data = JSON.parse(msg.data);

  if(data.history){
    let sym = data.echo_req.ticks_history;
    dataStore[sym] = data.history.prices.map(p=>{
      let s = p.toString();
      return parseInt(s[s.length-1]);
    });
    return;
  }

  if(data.tick){
    let sym = data.tick.symbol;

    let raw = data.tick.quote;
    let decimals = data.tick.pip_size;

    let price = parseFloat(raw).toFixed(decimals);
    let digit = parseInt(price[price.length-1]);

    prevPriceMap[sym] = lastPriceMap[sym];
    lastPriceMap[sym] = price;

    lastDigitMap[sym] = digit;

    // tick speed
    let now = Date.now();
    let prev = tickTimeMap[sym] || now;
    tickTimeMap[sym] = now;
    let speed = 1000 / (now - prev);

    let arr = dataStore[sym];
    arr.push(digit);
    if(arr.length>1000) arr.shift();

    render(sym, speed);
  }
};

function analyze(arr){
  let counts = Array(10).fill(0);
  arr.forEach(d=>counts[d]++);

  let total = arr.length || 1;
  let perc = counts.map(c=> (c/total*100).toFixed(1));

  let even=0, odd=0;
  counts.forEach((c,i)=> i%2==0 ? even+=c : odd+=c);

  even=(even/total*100).toFixed(1);
  odd=(odd/total*100).toFixed(1);

  return {perc,even,odd};
}

function render(){

  let container = document.getElementById("markets");
  container.innerHTML="";

  markets.forEach(m=>{

    let arr = dataStore[m.sym];
    if(!arr || arr.length<10) return;

    let {perc,even,odd} = analyze(arr);

    let price = lastPriceMap[m.sym] || "--";
    let prev = prevPriceMap[m.sym];

    let directionClass="flat";
    if(prev){
      if(price>prev) directionClass="up";
      else if(price<prev) directionClass="down";
    }

    // speed classification
    let speedClass="normal";
    let now = Date.now();
    let last = tickTimeMap[m.sym] || now;
    let speed = 1000 / (now - last);

    if(speed>2) speedClass="fast";
    else if(speed<1) speedClass="slow";

    // manipulation detection
    let evenDom = even>odd && perc.filter((p,i)=>i%2!=0).every(p=>p<10);
    let oddDom = odd>even && perc.filter((p,i)=>i%2==0).every(p=>p<10);

    let zone = (evenDom || oddDom);

    let marketDiv = document.createElement("div");
    marketDiv.className="market";

    marketDiv.innerHTML = `
      <b>${m.name}</b>

      <div class="price ${directionClass}">
        Price: ${price}
      </div>

      <div class="speed ${speedClass}">
        Speed: ${speedClass.toUpperCase()}
      </div>

      ${zone ? `<div class="zone">⚠️ MANIPULATION ZONE</div>` : ""}

      <div class="grid">
        ${[0,2,4,6,8].map(i=>box(i,perc,lastDigitMap[m.sym])).join("")}
      </div>

      <div class="grid">
        ${[1,3,5,7,9].map(i=>box(i,perc,lastDigitMap[m.sym])).join("")}
      </div>
    `;

    container.appendChild(marketDiv);
  });
}

function box(i,perc,lastDigit){
  return `
    <div class="box">
      ${i}<br>${perc[i]}%
      ${i===lastDigit ? '<div class="pointer">▲</div>' : ''}
    </div>
  `;
}

</script>

</body>
</html>

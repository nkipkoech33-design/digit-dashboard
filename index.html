<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digit Analyzer PRO — Momentum + Sparkline + Persistent Ranking</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
  </script>
  <style>
    /* ==== ORIGINAL STYLES (PRESERVED) ==== */
    body{background:#0f172a;color:white;font-family:Arial;margin:0;}
    .wrapper{display:flex;}
    .left{width:70%;padding:10px;display:flex;flex-direction:column;gap:8px;}
    .right{width:30%;border-left:1px solid #1e293b;padding:10px;background:#0f172a;overflow-y:auto;max-height:100vh;}

    .market{border:1px solid #1e293b;padding:6px;border-radius:6px;transition:0.1s;}
    .signal{animation:blink 0.6s infinite;border:2px solid #facc15;}
    @keyframes blink{0%{opacity:1;}50%{opacity:0.6;}100%{opacity:1;}}

    .price{text-align:center;font-size:22px;color:#38bdf8;font-weight:bold;}
    .win{text-align:center;font-size:12px;}

    .metrics{
        display:flex;
        justify-content:space-between;
        align-items:center;
        gap:12px;
        background:rgba(15,23,42,0.7);
        padding:6px 10px;
        border-radius:12px;
        margin:8px 0 6px 0;
        font-size:12px;
        flex-wrap:wrap;
    }
    .metric-item{
        display:flex;
        align-items:center;
        gap:6px;
        background:#1e293b;
        padding:3px 10px;
        border-radius:20px;
    }
    .metric-label{font-weight:bold;}
    .strength-value{color:#facc15;font-weight:bold;}
    .confidence-value{color:#4ade80;font-weight:bold;}
    .strength-bar-bg{width:70px;background:#334155;border-radius:20px;height:6px;overflow:hidden;}
    .strength-bar-fill{background:linear-gradient(90deg,#facc15,#f97316);height:6px;width:0%;border-radius:20px;}
    .confidence-badge{padding:2px 8px;border-radius:16px;font-weight:bold;}

    .grid{
    display:grid;
    grid-template-columns:repeat(5,2.5cm);
    gap:10px;
    justify-content:center;
    margin-top:8px;
    }
    .box{
    width:2.5cm;height:2.5cm;
    display:flex;flex-direction:column;
    justify-content:center;align-items:center;
    position:relative;border-radius:6px;
    border:1px solid #1e293b;
    }
    .most{background:green;}
    .second{background:blue;}
    .secondLeast{background:orange;}
    .least{background:red;}
    .digit{font-size:48px;font-weight:bold;}
    .percent{font-size:13px;}

    .pointer{
    position:absolute;top:50%;left:50%;
    transform:translate(-50%,-50%);
    font-size:42px;font-weight:bold;
    animation:pulse 0.6s infinite;
    }
    .pointer.even{color:lime;}
    .pointer.odd{color:red;}
    @keyframes pulse{
    0%{transform:translate(-50%,-50%) scale(1);}
    50%{transform:translate(-50%,-50%) scale(1.25);}
    100%{transform:translate(-50%,-50%) scale(1);}
    }
    .flash{animation:flash 0.25s;}
    @keyframes flash{0%{box-shadow:0 0 25px white;}100%{box-shadow:none;}}
    .repeat{box-shadow:0 0 20px yellow;}
    .repeat-count{position:absolute;top:4px;right:6px;color:yellow;font-weight:bold;}

    .tick{
    display:grid;
    grid-template-columns:repeat(50,1fr);
    font-size:10px;margin-top:8px;
    text-align:center;
    }
    .e{color:lime;}
    .o{color:red;}

    .signal-text{text-align:center;font-weight:bold;margin-top:4px;}
    .buy-even{color:lime;}
    .buy-odd{color:red;}

    .stats-panel{background:#0f172a;border-radius:12px;padding:12px;margin-bottom:15px;border:1px solid #1e293b;}
    .stats-title{font-size:16px;font-weight:bold;border-bottom:1px solid #334155;padding-bottom:6px;margin-bottom:10px;color:#94a3b8;}
    .stat-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px;}
    .stat-label{color:#94a3b8;}
    .stat-value{font-weight:bold;color:#facc15;}
    .winrate-good{color:#4ade80;}
    .winrate-bad{color:#f87171;}
    .signal-log{font-size:11px;max-height:200px;overflow-y:auto;}
    .log-entry{padding:4px;border-bottom:1px solid #1e293b;font-family:monospace;}
    .log-win{color:#4ade80;}
    .log-loss{color:#f87171;}
    .log-pending{color:#facc15;}

    .market.ranked-first { border-left: 4px solid #facc15; }
    .trend-change { background: rgba(239,68,68,0.2); padding: 2px 6px; border-radius: 12px; font-size: 11px; color: #f87171; margin-left: 8px; animation: fadeOut 3s forwards; }
    @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; } }
    .stop-signal { background: #7f1d1d; color: white; padding: 2px 8px; border-radius: 16px; font-weight: bold; font-size: 11px; }
    .recommendation-box { background: #1e293b; border-radius: 12px; padding: 12px; margin-top: 12px; }
    .rec-title { color: #facc15; font-weight: bold; margin-bottom: 8px; }

    .health-bar-bg { width: 60px; background: #334155; border-radius: 20px; height: 6px; overflow: hidden; display: inline-block; margin-left: 5px; }
    .health-bar-fill { background: linear-gradient(90deg, #ef4444, #facc15, #4ade80); height: 6px; width: 0%; border-radius: 20px; }
    .exit-suggestion { font-size: 11px; background: #1e293b; padding: 3px 8px; border-radius: 16px; margin-left: 8px; }
    .correlation-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px,1fr)); gap: 4px; font-size: 10px; }
    .corr-cell { padding: 4px; text-align: center; border-radius: 4px; }
    .replay-controls { background: #1e293b; padding: 8px; border-radius: 8px; margin-bottom: 10px; }
    .slider { width: 100%; }
    .small-badge { font-size: 10px; padding: 2px 6px; border-radius: 12px; background: #334155; }

    .regime-calm { background: #15803d; }
    .regime-choppy { background: #b45309; }
    .regime-trending { background: #1d4ed8; }
    .consensus-alert { background: #facc15; color: #0f172a; padding: 8px; border-radius: 8px; font-weight: bold; margin-bottom: 10px; }
    .reversal-warning { background: #7f1d1d; color: white; padding: 2px 6px; border-radius: 12px; font-size: 10px; margin-left: 5px; }
    .ml-prob { font-size: 12px; background: #1e293b; padding: 2px 8px; border-radius: 16px; }

    /* Momentum badge */
    .momentum-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 12px;
      margin-left: 5px;
      background: #1e293b;
    }
    .momentum-up { color: #4ade80; }
    .momentum-down { color: #f87171; }
    .momentum-neutral { color: #94a3b8; }

    /* Sparkline canvas */
    .sparkline-canvas {
      width: 100%;
      height: 40px;
      margin: 5px 0;
    }

    @media(max-width:1200px){
        .left{width:100%;}
        .right{display:none;}
        .grid{grid-template-columns:repeat(5,2.2cm);}
        .box{width:2.2cm;height:2.2cm;}
        .digit{font-size:36px;}
    }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="left" id="markets"></div>
  <div class="right" id="statsPanel"></div>
</div>

<script>
  (function(){
    "use strict";

    // ==== CONFIGURATION ====
    let token = "PUT_TOKEN_HERE";

    const markets = [
      {sym:"R_10",name:"Volatility 10 Index"},
      {sym:"R_25",name:"Volatility 25 Index"},
      {sym:"R_50",name:"Volatility 50 Index"},
      {sym:"R_75",name:"Volatility 75 Index"},
      {sym:"R_100",name:"Volatility 100 Index"},
      {sym:"1HZ10V",name:"Volatility 10 (1s)"},
      {sym:"1HZ15V",name:"Volatility 15 (1s)"},
      {sym:"1HZ25V",name:"Volatility 25 (1s)"},
      {sym:"1HZ30V",name:"Volatility 30 (1s)"},
      {sym:"1HZ50V",name:"Volatility 50 (1s)"},
      {sym:"1HZ75V",name:"Volatility 75 (1s)"},
      {sym:"1HZ90V",name:"Volatility 90 (1s)"},
      {sym:"1HZ100V",name:"Volatility 100 (1s)"},
      {sym:"JD10",name:"Jump 10 Index"},
      {sym:"JD25",name:"Jump 25 Index"},
      {sym:"JD50",name:"Jump 50 Index"},
      {sym:"JD75",name:"Jump 75 Index"},
      {sym:"JD100",name:"Jump 100 Index"}
    ];

    // ==== GLOBAL STATE ====
    let ws = new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");
    
    let store = {};          // 1000 ticks
    let storeShort = {};     // 100 ticks
    let storeMedium = {};    // 500 ticks
    let storeFullHistory = {};
    let priceMap = {}, pipMap = {}, historyLoaded = {}, lastDigitMap = {};
    let audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

    let tradeLog = [];
    let marketStats = {};

    let previousSignalState = {};
    let marketTrendChangeFlag = {};
    let lastSignalTime = {};   // timestamp of last time signal was active (or ended) for ranking

    let replayMode = false, replayIndex = 0, replaySnapshot = {};

    let optimalParams = { zThreshold: 1.96, maxOpposing: 12, minMargin: 5 };

    const volatilityFactors = {
      'R_10': 0.8, 'R_25': 1.0, 'R_50': 1.3, 'R_75': 1.6, 'R_100': 2.0,
      '1HZ10V': 0.9, '1HZ15V': 1.0, '1HZ25V': 1.2, '1HZ30V': 1.3, '1HZ50V': 1.5,
      '1HZ75V': 1.8, '1HZ90V': 1.9, '1HZ100V': 2.0,
      'JD10': 1.2, 'JD25': 1.5, 'JD50': 2.0, 'JD75': 2.5, 'JD100': 3.0
    };

    // ==== ONLINE LOGISTIC REGRESSION ====
    class OnlineLogisticRegression {
      constructor(featureCount = 2, learningRate = 0.01) {
        this.weights = Array(featureCount).fill(0).map(() => Math.random() * 0.1);
        this.bias = 0;
        this.lr = learningRate;
      }
      sigmoid(z) { return 1 / (1 + Math.exp(-z)); }
      predict(features) {
        let z = this.bias;
        for (let i=0; i<features.length; i++) z += this.weights[i] * features[i];
        return this.sigmoid(z);
      }
      update(features, label) {
        let pred = this.predict(features);
        let error = label - pred;
        for (let i=0; i<features.length; i++) {
          this.weights[i] += this.lr * error * features[i];
        }
        this.bias += this.lr * error;
      }
    }

    let mlModel = new OnlineLogisticRegression(3);

    function getMLFeatures(sym, evenP, oddP) {
      let arr = store[sym];
      if (!arr || arr.length < 10) return [0,0,0];
      let diff = (evenP - oddP) / 100;
      let streak = 0;
      let last = arr[arr.length-1];
      for (let i=arr.length-1; i>=0; i--) {
        if (arr[i] === last) streak++; else break;
      }
      let normStreak = Math.min(streak, 10) / 10;
      let vol = volatilityFactors[sym] / 3;
      return [diff, normStreak, vol];
    }

    function nowStr() { return new Date().toLocaleTimeString(); }

    // ==== MARKET REGIME ====
    function classifyRegime(sym) {
      let arr = store[sym];
      if (!arr || arr.length < 50) return { type: 'Unknown', color: '#64748b' };
      let recent = arr.slice(-50);
      let parity = recent.map(d => d%2===0 ? 0 : 1);
      let mean = parity.reduce((a,b)=>a+b,0)/parity.length;
      let variance = parity.reduce((a,b)=>a+Math.pow(b-mean,2),0)/parity.length;
      let std = Math.sqrt(variance);
      if (std < 0.35) return { type: 'Calm', color: '#15803d' };
      if (std > 0.48) return { type: 'Trending', color: '#1d4ed8' };
      return { type: 'Choppy', color: '#b45309' };
    }

    // ==== PATTERN REVERSAL ====
    function detectReversalPattern(sym, counts, total, evenP, oddP) {
      let arr = store[sym];
      if (!arr || arr.length < 30) return null;
      let recent = arr.slice(-30);
      let evenCount = recent.filter(d => d%2===0).length;
      let oddCount = recent.length - evenCount;
      let biasNow = evenP > oddP ? 'EVEN' : 'ODD';
      let biasRecent = evenCount > oddCount ? 'EVEN' : 'ODD';
      if (biasNow !== biasRecent) return '⚠️ Bias shift imminent';
      let windowSize = 10;
      let evenPercHistory = [];
      for (let i=0; i<=arr.length-windowSize; i+=5) {
        let slice = arr.slice(i, i+windowSize);
        let e = slice.filter(d=>d%2===0).length / windowSize * 100;
        evenPercHistory.push(e);
      }
      if (evenPercHistory.length >= 3) {
        let last3 = evenPercHistory.slice(-3);
        if (last3[0] > last3[1] && last3[2] > last3[1] && Math.abs(last3[0]-last3[2]) < 2) return '📉 Double top in even%';
        if (last3[0] < last3[1] && last3[2] < last3[1] && Math.abs(last3[0]-last3[2]) < 2) return '📈 Double bottom in even%';
      }
      return null;
    }

    // ==== BIAS MOMENTUM ====
    function computeBiasMomentum(sym) {
      let arr = store[sym];
      if (!arr || arr.length < 50) return { value: 0, label: 'neutral' };
      let half = 25;
      let firstHalf = arr.slice(-50, -25);
      let secondHalf = arr.slice(-25);
      let evenFirst = firstHalf.filter(d => d%2===0).length / half * 100;
      let evenSecond = secondHalf.filter(d => d%2===0).length / half * 100;
      let mom = evenSecond - evenFirst;
      let label = mom > 5 ? 'up' : (mom < -5 ? 'down' : 'neutral');
      return { value: mom, label };
    }

    // ==== SPARKLINE (rolling even% over last N ticks) ====
    function drawSparkline(sym) {
      let canvas = document.getElementById(`sparkline-${sym}`);
      if (!canvas) return;
      let arr = store[sym];
      if (!arr || arr.length < 10) return;
      let windowSize = 50;
      let recent = arr.slice(-windowSize);
      let ctx = canvas.getContext('2d');
      let w = canvas.width = canvas.offsetWidth || 300;
      let h = canvas.height = 40;
      ctx.clearRect(0, 0, w, h);

      if (recent.length < 2) return;

      let points = [];
      for (let i = 0; i < recent.length; i++) {
        let slice = recent.slice(0, i+1);
        let evenP = slice.filter(d => d%2===0).length / slice.length * 100;
        points.push({ x: (i / (recent.length-1)) * w, y: h - (evenP / 100) * h });
      }

      // Gradient fill
      let gradient = ctx.createLinearGradient(0, 0, 0, h);
      gradient.addColorStop(0, 'rgba(74,222,128,0.3)'); // green for even dominance
      gradient.addColorStop(1, 'rgba(248,113,113,0.3)'); // red for odd dominance
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.moveTo(points[0].x, h);
      for (let p of points) ctx.lineTo(p.x, p.y);
      ctx.lineTo(points[points.length-1].x, h);
      ctx.closePath();
      ctx.fill();

      // Line
      ctx.strokeStyle = '#38bdf8';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (let p of points) ctx.lineTo(p.x, p.y);
      ctx.stroke();

      // Baseline at 50%
      ctx.strokeStyle = '#64748b';
      ctx.lineWidth = 0.5;
      ctx.setLineDash([2, 2]);
      ctx.beginPath();
      ctx.moveTo(0, h/2);
      ctx.lineTo(w, h/2);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // ==== HEATMAP (throttled) ====
    const heatmapUpdateCounters = {};
    function renderHeatmap(sym) {
      let canvas = document.getElementById(`heatmap-${sym}`);
      if (!canvas) return;
      let ctx = canvas.getContext('2d');
      let arr = store[sym];
      if (!arr || arr.length < 50) return;
      if (!heatmapUpdateCounters[sym]) heatmapUpdateCounters[sym] = 0;
      heatmapUpdateCounters[sym]++;
      if (heatmapUpdateCounters[sym] % 3 !== 0) return;
      
      let recent = arr.slice(-50);
      let matrix = Array(10).fill().map(() => Array(50).fill(0));
      for (let i=0; i<recent.length; i++) {
        let digit = recent[i];
        matrix[digit][i] = 1;
      }
      let existingChart = Chart.getChart(canvas);
      if (existingChart) existingChart.destroy();
      
      new Chart(ctx, {
        type: 'matrix',
        data: {
          labels: Array(50).fill(''),
          datasets: [{
            label: 'Digit',
            data: matrix.flatMap((row, d) => row.map((v, t) => ({ x: t, y: d, v: v }))),
            backgroundColor(ctx) {
              let value = ctx.raw.v;
              if (value === 0) return '#1e293b';
              let alpha = 0.3 + value * 0.7;
              return `rgba(56, 189, 248, ${alpha})`;
            },
            borderWidth: 0,
            width: ({ chart }) => (chart.chartArea || {}).width / 50,
            height: ({ chart }) => (chart.chartArea || {}).height / 10,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { enabled: false } },
          scales: {
            x: { display: false, offset: true },
            y: { display: true, reverse: true, ticks: { stepSize: 1, color: '#94a3b8' } }
          }
        }
      });
    }

    // ==== CONSENSUS ====
    function detectConsensus() {
      const signals = [];
      markets.forEach(m => {
        let arr = store[m.sym];
        if (!arr || arr.length < 1000) return;
        let signal = getAdvancedSignal(m.sym);
        if (signal) {
          let health = computeMarketHealth(m.sym, getCounts(m.sym), arr.length, signal, getEvenP(m.sym), getOddP(m.sym));
          if (health >= 50) signals.push({ sym: m.sym, bias: signal, health });
        }
      });
      if (signals.length >= 2) {
        let biasCount = { 'BUY EVEN': 0, 'BUY ODD': 0 };
        signals.forEach(s => biasCount[s.bias]++);
        let consensusBias = biasCount['BUY EVEN'] > biasCount['BUY ODD'] ? 'EVEN' : 'ODD';
        let count = Math.max(biasCount['BUY EVEN'], biasCount['BUY ODD']);
        if (count >= 2) {
          return { active: true, bias: consensusBias, symbols: signals.filter(s => s.bias.includes(consensusBias)).map(s=>s.sym) };
        }
      }
      return { active: false };
    }

    function getCounts(sym) {
      let arr = store[sym];
      if (!arr) return Array(10).fill(0);
      let counts = Array(10).fill(0);
      arr.forEach(d => counts[d]++);
      return counts;
    }
    function getEvenP(sym) {
      let counts = getCounts(sym);
      let total = counts.reduce((a,b)=>a+b,0);
      let even = counts[0]+counts[2]+counts[4]+counts[6]+counts[8];
      return (even/total)*100;
    }
    function getOddP(sym) {
      let counts = getCounts(sym);
      let total = counts.reduce((a,b)=>a+b,0);
      let odd = counts[1]+counts[3]+counts[5]+counts[7]+counts[9];
      return (odd/total)*100;
    }

    // ==== DYNAMIC THRESHOLD OPTIMIZER ====
    function recomputeOptimalThresholds() {
      const completed = tradeLog.filter(t => t.outcome !== 'pending');
      if (completed.length < 20) return;
      let best = { winRate: 0, z: 1.96, opp: 12, margin: 5 };
      for (let z of [1.65, 1.96, 2.33, 2.58]) {
        for (let opp of [10, 12, 14, 16]) {
          for (let margin of [3, 5, 7, 9]) {
            const subset = completed.filter(t => {
              const str = parseFloat(t.strength) || 0;
              const conf = parseFloat(t.confidence) || 0;
              const minStrength = 40 + (z-1.65)*30;
              const minConf = 30 + (opp-10)*10;
              return str >= minStrength && conf >= minConf;
            });
            if (subset.length < 5) continue;
            const wins = subset.filter(t => t.outcome === 'win').length;
            const rate = (wins / subset.length) * 100;
            if (rate > best.winRate) { best = { winRate: rate, z, opp, margin }; }
          }
        }
      }
      if (best.winRate > 0) optimalParams = { zThreshold: best.z, maxOpposing: best.opp, minMargin: best.margin };
    }

    // ==== SIGNAL DETECTION ====
    function isStatisticallySignificant(evenCount, oddCount, total) {
      let observed = evenCount / total;
      let expected = 0.5;
      let stdErr = Math.sqrt(0.5 * 0.5 / total);
      let z = Math.abs(observed - expected) / stdErr;
      return z > optimalParams.zThreshold;
    }

    function checkMultiTimeframeAlignment(sym) {
      let arrShort = storeShort[sym], arrMed = storeMedium[sym], arrLong = store[sym];
      if (!arrShort || arrShort.length < 50) return false;
      if (!arrMed || arrMed.length < 200) return false;
      if (!arrLong || arrLong.length < 800) return false;
      function getParityBias(arr) {
        let evens = arr.filter(d => d%2===0).length;
        let odds = arr.length - evens;
        if (evens > odds) return "EVEN";
        if (odds > evens) return "ODD";
        return null;
      }
      let biasShort = getParityBias(arrShort), biasMed = getParityBias(arrMed), biasLong = getParityBias(arrLong);
      let votes = [biasShort, biasMed, biasLong].filter(b => b !== null);
      let evenVotes = votes.filter(v => v === "EVEN").length;
      let oddVotes = votes.filter(v => v === "ODD").length;
      if (evenVotes >= 2) return "EVEN";
      if (oddVotes >= 2) return "ODD";
      return null;
    }

    function getAdvancedSignal(sym) {
      let arr = store[sym];
      if (!arr || arr.length < 1000) return null;
      let tfBias = checkMultiTimeframeAlignment(sym);
      if (!tfBias) return null;
      let counts = getCounts(sym);
      let total = arr.length;
      let evenSum = counts[0]+counts[2]+counts[4]+counts[6]+counts[8];
      let oddSum = total - evenSum;
      if (!isStatisticallySignificant(evenSum, oddSum, total)) return null;
      let opposingDigits = (tfBias === "EVEN") ? [1,3,5,7,9] : [0,2,4,6,8];
      let maxOpposing = Math.max(...opposingDigits.map(d => (counts[d]/total)*100));
      if (maxOpposing >= optimalParams.maxOpposing) return null;
      let evenP = (evenSum/total)*100, oddP = (oddSum/total)*100;
      let margin = Math.abs(evenP - oddP);
      if (margin < optimalParams.minMargin) return null;
      return tfBias === "EVEN" ? "BUY EVEN" : "BUY ODD";
    }

    function computeSignalStrength(evenP, oddP, perc, signalType, sym) {
      if (!signalType) return 0;
      let diff = Math.abs(evenP - oddP);
      let volFactor = volatilityFactors[sym] || 1.0;
      if (signalType === "BUY EVEN") {
        let oddDigits = [1,3,5,7,9];
        let maxOpposing = Math.max(...oddDigits.map(d => parseFloat(perc[d])));
        let distanceToMax = Math.max(0, optimalParams.maxOpposing - maxOpposing);
        let composite = (diff * 0.5 + distanceToMax * 5) / volFactor;
        return Math.min(100, composite);
      } else {
        let evenDigits = [0,2,4,6,8];
        let maxOpposing = Math.max(...evenDigits.map(d => parseFloat(perc[d])));
        let distanceToMax = Math.max(0, optimalParams.maxOpposing - maxOpposing);
        let composite = (diff * 0.5 + distanceToMax * 5) / volFactor;
        return Math.min(100, composite);
      }
    }

    function computeConfidence(evenP, oddP, perc, signalType) {
      if (!signalType) return "—";
      let opposing = (signalType === "BUY EVEN") ? [1,3,5,7,9] : [0,2,4,6,8];
      let maxOpposing = Math.max(...opposing.map(d => parseFloat(perc[d])));
      let margin = optimalParams.maxOpposing - maxOpposing;
      let rawConf = (margin / optimalParams.maxOpposing) * 100;
      rawConf = Math.min(100, Math.max(0, rawConf));
      return `${rawConf.toFixed(0)}%`;
    }

    function computeMarketHealth(sym, counts, total, signalType, evenP, oddP) {
      if (!store[sym] || store[sym].length < 1000) return 0;
      let evenSum = counts[0]+counts[2]+counts[4]+counts[6]+counts[8];
      let oddSum = total - evenSum;
      let observed = evenSum / total;
      let expected = 0.5;
      let stdErr = Math.sqrt(0.5 * 0.5 / total);
      let z = Math.abs(observed - expected) / stdErr;
      let sigScore = Math.min(100, (z / 3) * 100);
      let tfBias = checkMultiTimeframeAlignment(sym);
      let tfScore = tfBias ? 100 : 0;
      let opposing = (signalType === "BUY EVEN") ? [1,3,5,7,9] : [0,2,4,6,8];
      let maxOpposing = Math.max(...opposing.map(d => (counts[d]/total)*100));
      let oppScore = Math.max(0, 100 - (maxOpposing / optimalParams.maxOpposing) * 100);
      let margin = Math.abs(evenP - oddP);
      let marginScore = Math.min(100, (margin / 15) * 100);
      return Math.round(sigScore * 0.3 + tfScore * 0.3 + oppScore * 0.2 + marginScore * 0.2);
    }

    function getExitSuggestion(sym, signalType, counts, total) {
      if (!signalType) return "";
      let opposing = (signalType === "BUY EVEN") ? [1,3,5,7,9] : [0,2,4,6,8];
      let maxOpposing = Math.max(...opposing.map(d => (counts[d]/total)*100));
      let threshold = optimalParams.maxOpposing * 0.9;
      if (maxOpposing >= threshold) return `⚠️ Exit soon: opposing ${maxOpposing.toFixed(1)}%`;
      return "🎯 Hold until opposing > " + threshold.toFixed(1) + "%";
    }

    function computeCorrelationMatrix() {
      const symbols = markets.map(m => m.sym).filter(s => store[s] && store[s].length >= 100);
      if (symbols.length < 2) return { symbols, matrix: [] };
      const windowSize = 100;
      let matrix = [];
      for (let i=0; i<symbols.length; i++) {
        let row = [];
        for (let j=0; j<symbols.length; j++) {
          if (i===j) { row.push(1); continue; }
          let s1 = symbols[i], s2 = symbols[j];
          let arr1 = store[s1].slice(-windowSize).map(d => d%2===0 ? 0 : 1);
          let arr2 = store[s2].slice(-windowSize).map(d => d%2===0 ? 0 : 1);
          let mean1 = arr1.reduce((a,b)=>a+b,0)/arr1.length;
          let mean2 = arr2.reduce((a,b)=>a+b,0)/arr2.length;
          let num=0, den1=0, den2=0;
          for (let k=0; k<arr1.length; k++) {
            let d1 = arr1[k]-mean1, d2 = arr2[k]-mean2;
            num += d1*d2;
            den1 += d1*d1;
            den2 += d2*d2;
          }
          let corr = den1 && den2 ? num / Math.sqrt(den1*den2) : 0;
          row.push(corr);
        }
        matrix.push(row);
      }
      return { symbols, matrix };
    }

    function renderCorrelationHeatmap() {
      const { symbols, matrix } = computeCorrelationMatrix();
      if (!symbols.length) return '<div>Insufficient data</div>';
      let html = '<div class="correlation-grid">';
      html += '<div></div>';
      symbols.forEach(s => html += `<div style="font-weight:bold;">${s}</div>`);
      for (let i=0; i<symbols.length; i++) {
        html += `<div style="font-weight:bold;">${symbols[i]}</div>`;
        for (let j=0; j<symbols.length; j++) {
          let val = matrix[i][j];
          let color = val > 0.5 ? '#4ade80' : val < -0.5 ? '#f87171' : '#94a3b8';
          html += `<div class="corr-cell" style="background:${color}20; color:${color}">${val.toFixed(2)}</div>`;
        }
      }
      html += '</div>';
      return html;
    }

    function recordSignal(symbol, signalType, strength, confidence) {
      let id = Date.now() + Math.random();
      let entry = { id, symbol, signalType, strength, confidence, timestamp: nowStr(), outcome: "pending" };
      tradeLog.push(entry);
      if (!marketStats[symbol]) marketStats[symbol] = { totalSignals:0, wins:0, losses:0 };
      marketStats[symbol].totalSignals++;
      if (tradeLog.filter(t=>t.outcome!=='pending').length % 20 === 0) recomputeOptimalThresholds();
      throttledStatsUpdate();
      setTimeout(() => resolveSignalOutcome(symbol, signalType, id), 150);
      return id;
    }

    function resolveSignalOutcome(symbol, predictedType, tradeId) {
      let lastDigit = lastDigitMap[symbol];
      if (lastDigit === undefined) return;
      let isEven = lastDigit % 2 === 0;
      let predictedEven = (predictedType === "BUY EVEN");
      let win = (predictedEven && isEven) || (!predictedEven && !isEven);
      let trade = tradeLog.find(t => t.id === tradeId);
      if (trade && trade.outcome === "pending") {
        trade.outcome = win ? "win" : "loss";
        if (marketStats[trade.symbol]) {
          if (win) marketStats[trade.symbol].wins++;
          else marketStats[trade.symbol].losses++;
        }
        let counts = getCounts(symbol);
        let total = counts.reduce((a,b)=>a+b,0);
        let evenP = (counts[0]+counts[2]+counts[4]+counts[6]+counts[8])/total*100;
        let oddP = 100 - evenP;
        let features = getMLFeatures(symbol, evenP, oddP);
        mlModel.update(features, win ? 1 : 0);
        throttledStatsUpdate();
      }
    }

    // ==== REPLAY ====
    function enterReplayMode() {
      replayMode = true;
      markets.forEach(m => { if (storeFullHistory[m.sym]) replaySnapshot[m.sym] = [...storeFullHistory[m.sym]]; });
      replayIndex = 0;
      renderReplayControls();
    }
    function exitReplayMode() { replayMode = false; renderReplayControls(); renderAllMarkets(); }
    function replayTick(forward = true) {
      if (!replayMode) return;
      const maxLen = Math.max(...Object.values(replaySnapshot).map(a => a.length));
      if (forward && replayIndex < maxLen - 1) replayIndex++;
      else if (!forward && replayIndex > 0) replayIndex--;
      markets.forEach(m => {
        let hist = replaySnapshot[m.sym];
        if (hist) {
          let slice = hist.slice(0, replayIndex+1);
          store[m.sym] = slice.slice(-1000);
          storeShort[m.sym] = slice.slice(-100);
          storeMedium[m.sym] = slice.slice(-500);
          if (slice.length) lastDigitMap[m.sym] = slice[slice.length-1];
        }
      });
      renderAllMarkets();
      renderReplayControls();
    }
    function renderReplayControls() {
      let container = document.getElementById('replayBar');
      if (!container) {
        let leftDiv = document.querySelector('.left');
        container = document.createElement('div');
        container.id = 'replayBar';
        leftDiv.prepend(container);
      }
      const maxLen = Math.max(...Object.values(replaySnapshot).map(a => a.length||0));
      container.innerHTML = `
        <div class="replay-controls">
          <button id="replayBtn">${replayMode ? 'Exit Replay' : 'Replay Mode'}</button>
          ${replayMode ? `
            <button id="replayPrev">◀ Prev</button>
            <button id="replayNext">Next ▶</button>
            <span style="margin:0 10px;">Tick ${replayIndex+1} / ${maxLen}</span>
            <input type="range" min="0" max="${maxLen-1}" value="${replayIndex}" class="slider" id="replaySlider">
          ` : ''}
        </div>
      `;
      document.getElementById('replayBtn').onclick = () => replayMode ? exitReplayMode() : enterReplayMode();
      if (replayMode) {
        document.getElementById('replayPrev').onclick = () => replayTick(false);
        document.getElementById('replayNext').onclick = () => replayTick(true);
        document.getElementById('replaySlider').oninput = (e) => { replayIndex = parseInt(e.target.value); replayTick(); };
      }
    }

    // ==== OPTIMIZED RENDERING ====
    let renderScheduled = false;
    let marketElements = {};

    function scheduleRender() {
      if (renderScheduled) return;
      renderScheduled = true;
      requestAnimationFrame(() => {
        if (!replayMode) renderAllMarkets();
        renderScheduled = false;
      });
    }

    function renderAllMarkets() {
      let wrap = document.getElementById("markets");
      if (!wrap) return;
      
      // Create containers if missing
      markets.forEach(m => {
        if (!marketElements[m.sym]) {
          let div = document.createElement("div");
          div.id = `market-${m.sym}`;
          div.className = "market";
          wrap.appendChild(div);
          marketElements[m.sym] = div;
        }
      });

      let marketDataArray = [];
      markets.forEach(m => {
        let arr = store[m.sym];
        if (!arr || arr.length < 1000) return;
        let signalType = getAdvancedSignal(m.sym);
        let isSignal = signalType !== null;
        let counts = getCounts(m.sym);
        let total = arr.length;
        let perc = counts.map(c => ((c/total)*100).toFixed(1));
        let evenSum = counts[0]+counts[2]+counts[4]+counts[6]+counts[8];
        let oddSum = total - evenSum;
        let evenP = (evenSum/total)*100, oddP = (oddSum/total)*100;
        
        let strength = 0, confidence = "—", health = 0, mlProb = null;
        if (isSignal) {
          strength = computeSignalStrength(evenP, oddP, perc, signalType, m.sym);
          confidence = computeConfidence(evenP, oddP, perc, signalType);
          if (!window._lastSignalTick || window._lastSignalTick !== lastDigitMap[m.sym]) {
            window._lastSignalTick = lastDigitMap[m.sym];
            recordSignal(m.sym, signalType, strength.toFixed(1), confidence);
          }
          if (isSignal) audio.play();
        }
        health = computeMarketHealth(m.sym, counts, total, signalType, evenP, oddP);
        let exitMsg = getExitSuggestion(m.sym, signalType, counts, total);
        let regime = classifyRegime(m.sym);
        let reversal = detectReversalPattern(m.sym, counts, total, evenP, oddP);
        let features = getMLFeatures(m.sym, evenP, oddP);
        mlProb = mlModel.predict(features);
        let momentum = computeBiasMomentum(m.sym);
        
        // Track signal timestamps for ranking
        if (isSignal) {
          lastSignalTime[m.sym] = Date.now();
        } else if (!lastSignalTime[m.sym]) {
          lastSignalTime[m.sym] = 0; // never had a signal
        }
        // if signal just appeared, update time
        if (!previousSignalState[m.sym] && isSignal) {
          lastSignalTime[m.sym] = Date.now();
        }
        let prevState = previousSignalState[m.sym] || false;
        let trendChanged = (prevState !== isSignal);
        if (trendChanged) marketTrendChangeFlag[m.sym] = Date.now();
        previousSignalState[m.sym] = isSignal;
        
        // Ranking score: active signals get 1e9 + composite; inactive get recency timestamp
        let sortScore = isSignal ? 1e9 + (strength * (parseFloat(confidence) || 0) / 100) : (lastSignalTime[m.sym] || 0);
        
        marketDataArray.push({
          sym: m.sym, name: m.name, price: priceMap[m.sym] || "—",
          evenP, oddP, signalType, isSignal, strength, confidence, health, exitMsg,
          regime, reversal, mlProb, momentum,
          perc, counts, arr, lastDigit: lastDigitMap[m.sym],
          repCount: (()=>{ let c=0, ld=arr[arr.length-1]; for(let i=arr.length-1;i>=0;i--){if(arr[i]===ld)c++;else break;} return c; })(),
          trendChanged, sortScore
        });
      });
      
      // Sort: active first (by strength), then recently signalled (recency), then never signalled alphabetically
      marketDataArray.sort((a,b) => {
        if (a.isSignal && !b.isSignal) return -1;
        if (!a.isSignal && b.isSignal) return 1;
        if (a.isSignal && b.isSignal) return b.sortScore - a.sortScore;
        // Both inactive: sort by lastSignalTime descending (more recent first)
        if (a.sortScore !== b.sortScore) return b.sortScore - a.sortScore;
        return a.name.localeCompare(b.name);
      });
      
      let consensus = detectConsensus();
      let oldAlert = document.getElementById('consensusAlert');
      if (oldAlert) oldAlert.remove();
      if (consensus.active) {
        let alertDiv = document.createElement('div');
        alertDiv.id = 'consensusAlert';
        alertDiv.className = 'consensus-alert';
        alertDiv.innerHTML = `🤝 CONSENSUS SIGNAL: ${consensus.bias} bias across ${consensus.symbols.join(', ')} (${consensus.symbols.length} markets)`;
        wrap.prepend(alertDiv);
      }
      
      marketDataArray.forEach((data, idx) => {
        let container = marketElements[data.sym];
        if (!container) return;
        
        let isSignal = data.isSignal;
        let barWidth = Math.min(100, data.strength);
        let healthWidth = data.health;
        let mlProbPercent = (data.mlProb * 100).toFixed(1);
        let mlColor = data.mlProb > 0.55 ? '#4ade80' : (data.mlProb < 0.45 ? '#f87171' : '#facc15');
        
        let sortedDigits = [...data.counts].map((v,i)=>({v,i})).sort((a,b)=>b.v-a.v);
        let most = sortedDigits[0].i, second = sortedDigits[1].i, least = sortedDigits[9].i, secondLeast = sortedDigits[8].i;
        let last = data.arr[data.arr.length-1], rep = data.repCount;
        
        function box(i){
          let cls="";
          if(i===most) cls="most";
          else if(i===second) cls="second";
          else if(i===least) cls="least";
          else if(i===secondLeast) cls="secondLeast";
          let pointer = (i===last) ? `<div class="pointer ${i%2==0?'even':'odd'}">●</div>` : "";
          let flash = (data.lastDigit===i)?"flash":"";
          let repeatFx = (i===last && rep>=2)?"repeat":"";
          let counter = (i===last && rep>=2)?`<div class="repeat-count">x${rep}</div>`:"";
          return `<div class="box ${cls} ${flash} ${repeatFx}">${pointer}${counter}<div class="digit">${i}</div><div class="percent">${data.perc[i]}%</div></div>`;
        }
        
        // Momentum badge
        let mom = data.momentum;
        let momClass = mom.label === 'up' ? 'momentum-up' : (mom.label === 'down' ? 'momentum-down' : 'momentum-neutral');
        let momText = mom.label === 'up' ? `📈 EVENS RISING +${mom.value.toFixed(1)}%` :
                      mom.label === 'down' ? `📉 ODDS RISING ${mom.value.toFixed(1)}%` :
                      `➖ steady ${mom.value.toFixed(1)}%`;
        let momentumHtml = `<span class="momentum-badge ${momClass}">${momText}</span>`;
        
        let trendHtml = '';
        if (data.trendChanged) {
          trendHtml = !isSignal && previousSignalState[data.sym] ? '<span class="stop-signal">⛔ SIGNAL ENDED</span>' : '<span class="trend-change">🔄 NEW SIGNAL</span>';
        }
        let reversalHtml = data.reversal ? `<span class="reversal-warning">${data.reversal}</span>` : '';
        
        container.className = "market " + (isSignal ? "signal" : "");
        if (idx === 0 && isSignal) container.classList.add("ranked-first");
        
        container.innerHTML = `
          <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap;">
            <div>
              <b>${data.name}</b> 
              <span class="small-badge" style="background:${data.regime.color}">🌊 ${data.regime.type}</span>
              ${trendHtml} ${reversalHtml} ${momentumHtml}
            </div>
            <div style="display:flex; align-items:center;">
              <span class="small-badge">❤️ ${data.health}%</span>
              <div class="health-bar-bg"><div class="health-bar-fill" style="width:${healthWidth}%;"></div></div>
              <span class="ml-prob" style="color:${mlColor}">🤖 ML: ${mlProbPercent}% even</span>
            </div>
          </div>
          <div class="price">${data.price}</div>
          <div class="win">🎲 EVEN ${data.evenP.toFixed(1)}% | ODD ${data.oddP.toFixed(1)}%</div>
          <div class="metrics">
            <div class="metric-item"><span class="metric-label">💪 STRENGTH</span><span class="strength-value">${data.strength.toFixed(1)}%</span>
            <div class="strength-bar-bg"><div class="strength-bar-fill" style="width:${barWidth}%;"></div></div></div>
            <div class="metric-item"><span class="metric-label">🎯 CONFIDENCE</span><span class="confidence-value">${data.confidence}</span>
            ${isSignal ? '<span class="confidence-badge" style="background:#22c55e20;">🔥 ACTIVE</span>' : '<span class="confidence-badge" style="background:#334155;">⚡ IDLE</span>'}</div>
          </div>
          ${isSignal ? `<div class="signal-text ${data.signalType==='BUY EVEN'?'buy-even':'buy-odd'}">🚀 ${data.signalType} (strength ${data.strength.toFixed(1)}% | conf ${data.confidence}) <span class="exit-suggestion">${data.exitMsg}</span></div>` : ''}
          <canvas id="sparkline-${data.sym}" class="sparkline-canvas"></canvas>
          <div style="height:80px; margin:5px 0;"><canvas id="heatmap-${data.sym}" width="200" height="80" style="width:100%; height:100%;"></canvas></div>
          <div class="grid">${[0,2,4,6,8].map(box).join("")}</div>
          <div class="grid">${[1,3,5,7,9].map(box).join("")}</div>
        `;
        
        setTimeout(() => {
          drawSparkline(data.sym);
          renderHeatmap(data.sym);
        }, 10);
      });
      
      throttledStatsUpdate();
      if (!replayMode) renderReplayControls();
    }

    // Throttled stats panel
    let statsUpdateScheduled = false;
    function throttledStatsUpdate() {
      if (statsUpdateScheduled) return;
      statsUpdateScheduled = true;
      setTimeout(() => {
        renderStatsPanel();
        statsUpdateScheduled = false;
      }, 200);
    }

    function renderStatsPanel() {
      let panel = document.getElementById("statsPanel");
      if (!panel) return;
      
      let totalSignals = tradeLog.length;
      let totalWins = tradeLog.filter(t => t.outcome === "win").length;
      let totalLosses = tradeLog.filter(t => t.outcome === "loss").length;
      let pending = tradeLog.filter(t => t.outcome === "pending").length;
      let overallWinRate = totalSignals - pending > 0 ? (totalWins / (totalWins + totalLosses) * 100).toFixed(1) : "—";
      
      let bestMarket = "—", bestRate = 0;
      for (let sym in marketStats) {
        let s = marketStats[sym];
        if (s.wins + s.losses > 0) {
          let rate = (s.wins / (s.wins + s.losses) * 100);
          if (rate > bestRate) { bestRate = rate; bestMarket = sym; }
        }
      }
      let marketName = markets.find(m => m.sym === bestMarket)?.name || bestMarket;
      
      let recHtml = `
        <div class="recommendation-box">
          <div class="rec-title">🧠 SELF-LEARNING OPTIMIZER</div>
          <div class="stat-row"><span class="stat-label">Z threshold:</span><span class="stat-value">${optimalParams.zThreshold.toFixed(2)}</span></div>
          <div class="stat-row"><span class="stat-label">Max opposing %:</span><span class="stat-value">${optimalParams.maxOpposing}%</span></div>
          <div class="stat-row"><span class="stat-label">Min margin %:</span><span class="stat-value">${optimalParams.minMargin}%</span></div>
          <div class="stat-row"><span class="stat-label">Trained on:</span><span class="stat-value">${tradeLog.filter(t=>t.outcome!=='pending').length} trades</span></div>
        </div>
      `;
      
      let corrHtml = `
        <div class="stats-panel">
          <div class="stats-title">🔗 CORRELATION HEATMAP (100t)</div>
          ${renderCorrelationHeatmap()}
        </div>
      `;
      
      let recentHtml = tradeLog.slice(-10).reverse().map(log => {
        let outcomeClass = log.outcome === "win" ? "log-win" : (log.outcome === "loss" ? "log-loss" : "log-pending");
        let outcomeText = log.outcome === "win" ? "✓ WIN" : (log.outcome === "loss" ? "✗ LOSS" : "⌛ pending");
        return `<div class="log-entry"><span>${log.timestamp}</span> <span>${log.symbol}</span> <span>${log.signalType}</span><span class="${outcomeClass}">${outcomeText}</span><span>💪${log.strength}%</span></div>`;
      }).join("");
      
      panel.innerHTML = `
        <div class="stats-panel">
          <div class="stats-title">📊 BACKTEST ENGINE</div>
          <div class="stat-row"><span class="stat-label">Total signals:</span><span class="stat-value">${totalSignals}</span></div>
          <div class="stat-row"><span class="stat-label">Wins / Losses:</span><span class="stat-value">${totalWins} / ${totalLosses}</span></div>
          <div class="stat-row"><span class="stat-label">Overall win rate:</span><span class="stat-value ${overallWinRate > 55 ? 'winrate-good' : (overallWinRate < 45 ? 'winrate-bad' : '')}">${overallWinRate}%</span></div>
          <div class="stat-row"><span class="stat-label">🔥 Best market:</span><span class="stat-value">${marketName} ${bestRate.toFixed(1)}%</span></div>
          <div class="stat-row"><span class="stat-label">⏳ Pending signals:</span><span class="stat-value">${pending}</span></div>
          <div class="stat-row"><span class="stat-label">🤖 ML weights:</span><span class="stat-value">${mlModel.weights.map(w=>w.toFixed(3)).join(', ')}</span></div>
        </div>
        ${recHtml}
        ${corrHtml}
        <div class="stats-panel">
          <div class="stats-title">📋 RECENT SIGNALS</div>
          <div class="signal-log">${recentHtml || "<div>No signals yet</div>"}</div>
        </div>
      `;
    }

    // ==== WEBSOCKET ====
    ws.onopen = () => {
      ws.send(JSON.stringify({authorize: token}));
      markets.forEach(m => {
        store[m.sym] = []; storeShort[m.sym] = []; storeMedium[m.sym] = []; storeFullHistory[m.sym] = [];
        historyLoaded[m.sym] = false;
        ws.send(JSON.stringify({ticks_history: m.sym, count: 1000, end: "latest", style: "ticks"}));
        ws.send(JSON.stringify({ticks: m.sym, subscribe: 1}));
      });
    };

    ws.onmessage = (msg) => {
      let d = JSON.parse(msg.data);
      if (d.history) {
        let s = d.echo_req.ticks_history;
        let pip = pipMap[s] || 2;
        let prices = d.history.prices.map(p => parseFloat(p).toFixed(pip));
        let digits = prices.map(p => parseInt(p.slice(-1)));
        store[s] = digits.slice(-1000);
        storeShort[s] = digits.slice(-100);
        storeMedium[s] = digits.slice(-500);
        storeFullHistory[s] = digits;
        historyLoaded[s] = true;
        scheduleRender();
      }
      if (d.tick && !replayMode) {
        let s = d.tick.symbol;
        pipMap[s] = d.tick.pip_size;
        let price = parseFloat(d.tick.quote).toFixed(pipMap[s]);
        let digit = parseInt(price.slice(-1));
        priceMap[s] = price;
        lastDigitMap[s] = digit;
        if (!historyLoaded[s]) return;
        store[s].push(digit); storeShort[s].push(digit); storeMedium[s].push(digit); storeFullHistory[s].push(digit);
        if (store[s].length > 1000) store[s].shift();
        if (storeShort[s].length > 100) storeShort[s].shift();
        if (storeMedium[s].length > 500) storeMedium[s].shift();
        if (storeFullHistory[s].length > 5000) storeFullHistory[s].shift();
        scheduleRender();
      }
    };

    markets.forEach(m => { marketElements[m.sym] = null; lastSignalTime[m.sym] = 0; });
    renderAllMarkets();
  })();
</script>
</body>
</html>

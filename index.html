<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Digit Analyzer SAFE RESTORE</title>

<style>
body{background:#0f172a;color:white;font-family:Arial;margin:0;}
.wrapper{display:flex;}
.left{width:70%;padding:10px;display:flex;flex-direction:column;gap:8px;}
.right{width:30%;border-left:1px solid #1e293b;padding:10px;}

.market{border:1px solid #1e293b;padding:6px;border-radius:6px;}
.signal{animation:blink 0.6s infinite;border:2px solid yellow;}
@keyframes blink{0%{opacity:1;}50%{opacity:0.4;}100%{opacity:1;}}

.price{text-align:center;font-size:22px;color:#38bdf8;font-weight:bold;}
.win{text-align:center;font-size:12px;}

.grid{
display:grid;
grid-template-columns:repeat(5,2.5cm);
gap:10px;
justify-content:center;
margin-top:8px;
}

.box{
width:2.5cm;height:2.5cm;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:relative;
border-radius:6px;
border:1px solid #1e293b;
}

.most{background:green;}
.second{background:blue;}
.secondLeast{background:orange;}
.least{background:red;}

.digit{font-size:42px;font-weight:bold;}
.percent{font-size:13px;}

.pointer{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:44px;
font-weight:bold;
animation:pulse 0.6s infinite;
text-shadow:0 0 10px black;
}
.pointer.even{color:lime;}
.pointer.odd{color:red;}

@keyframes pulse{
0%{transform:translate(-50%,-50%) scale(1);}
50%{transform:translate(-50%,-50%) scale(1.3);}
100%{transform:translate(-50%,-50%) scale(1);}
}

.flash{animation:flash 0.25s;}
@keyframes flash{0%{box-shadow:0 0 25px white;}100%{box-shadow:none;}}

.repeat{
box-shadow:0 0 20px yellow;
}
.repeat-count{
position:absolute;
top:4px;
right:6px;
color:yellow;
font-weight:bold;
font-size:12px;
}

.tick{
display:grid;
grid-template-columns:repeat(50,1fr);
font-size:10px;
margin-top:8px;
text-align:center;
}
.e{color:lime;}
.o{color:red;}

.signal-text{text-align:center;font-weight:bold;}

.signal-meta{
text-align:center;
font-size:11px;
opacity:0.9;
}
</style>
</head>

<body>

<div class="wrapper">
<div class="left" id="markets"></div>
<div class="right"></div>
</div>

<script>

let token="PUT_TOKEN_HERE";

const markets=[
{sym:"R_10",name:"Volatility 10 Index"},
{sym:"R_25",name:"Volatility 25 Index"},
{sym:"R_50",name:"Volatility 50 Index"},
{sym:"R_75",name:"Volatility 75 Index"},
{sym:"R_100",name:"Volatility 100 Index"},
{sym:"1HZ10V",name:"Volatility 10 (1s)"},
{sym:"1HZ15V",name:"Volatility 15 (1s)"},
{sym:"1HZ25V",name:"Volatility 25 (1s)"},
{sym:"1HZ30V",name:"Volatility 30 (1s)"},
{sym:"1HZ50V",name:"Volatility 50 (1s)"},
{sym:"1HZ75V",name:"Volatility 75 (1s)"},
{sym:"1HZ90V",name:"Volatility 90 (1s)"},
{sym:"1HZ100V",name:"Volatility 100 (1s)"},
{sym:"JD10",name:"Jump 10 Index"},
{sym:"JD25",name:"Jump 25 Index"},
{sym:"JD50",name:"Jump 50 Index"},
{sym:"JD75",name:"Jump 75 Index"},
{sym:"JD100",name:"Jump 100 Index"}
];

let ws=new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");

let store={},priceMap={},historyLoaded={};

let audio=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

markets.forEach(m=>{
store[m.sym]=[];
historyLoaded[m.sym]=false;
});

ws.onopen=()=>{
ws.send(JSON.stringify({authorize:token}));

markets.forEach(m=>{
ws.send(JSON.stringify({
ticks_history:m.sym,
count:1000,
end:"latest",
style:"ticks"
}));

ws.send(JSON.stringify({ticks:m.sym,subscribe:1}));
});
};

ws.onmessage=(msg)=>{
try{
let d=JSON.parse(msg.data);

if(d.history && d.echo_req?.ticks_history){
let s=d.echo_req.ticks_history;

store[s]=(d.history.prices||[])
.map(p=>{
let n=parseFloat(p);
if(isNaN(n)) return 0;
return parseInt(n.toString().slice(-1));
});

historyLoaded[s]=true;
}

if(d.tick){
let s=d.tick.symbol;
if(!store[s]) store[s]=[];

let price=parseFloat(d.tick.quote);
if(isNaN(price)) return;

priceMap[s]=price.toFixed(2);

let digit=parseInt(price.toString().slice(-1));
if(isNaN(digit)) digit=0;

store[s].push(digit);
if(store[s].length>1000) store[s].shift();

render();
}

}catch(e){}
};

function repeat(arr){
let last=arr[arr.length-1];
let c=0;
for(let i=arr.length-1;i>=0;i--){
if(arr[i]===last)c++;
else break;
}
return c;
}

function render(){

let wrap=document.getElementById("markets");
wrap.innerHTML="";

markets.forEach(m=>{

let arr=store[m.sym];
if(!arr || arr.length<20) return;

let counts=Array(10).fill(0);
arr.forEach(d=>counts[d]);

let total=arr.length||1;

let even=[0,2,4,6,8];
let odd=[1,3,5,7,9];

let evenSum=even.reduce((s,i)=>s+counts[i],0);
let oddSum=odd.reduce((s,i)=>s+counts[i],0);

let evenP=(evenSum/total*100);
let oddP=(oddSum/total*100);

let signal="";
let isSignal=false;

if(evenP>oddP && odd.every(i=>((counts[i]/total*100)||0)<10)){
signal="BUY EVEN";isSignal=true;
}
else if(oddP>evenP && even.every(i=>((counts[i]/total*100)||0)<10)){
signal="BUY ODD";isSignal=true;
}

if(isSignal) audio.play();

let maxIndex = counts.indexOf(Math.max(...counts));
let rep = repeat(arr);

function box(i){

let cls="";
if(i===maxIndex) cls="most";

let pointer = (i===arr[arr.length-1])
? `<div class="pointer ${i%2==0?'even':'odd'}">●</div>`
:"";

let counter = (i===arr[arr.length-1] && rep>=2)
? `<div class="repeat-count">x${rep}</div>`
:"";

return `
<div class="box ${cls}">
${pointer}
${counter}
<div class="digit">${i}</div>
<div class="percent">${((counts[i]/total)*100).toFixed(1)}%</div>
</div>
`;
}

let ticks=arr.slice(-50).map(d=>`<span class="${d%2==0?'e':'o'}">${d%2==0?'E':'O'}</span>`).join("");

let div=document.createElement("div");
div.className="market "+(isSignal?"signal":"");

div.innerHTML=`
<b>${m.name}</b>
<div class="price">${priceMap[m.sym]||"..."}</div>
<div class="win">EVEN ${evenP.toFixed(1)}% | ODD ${oddP.toFixed(1)}%</div>

${isSignal?`<div class="signal-text">${signal}</div>`:""}

<div class="grid">
${[0,1,2,3,4].map(box).join("")}
</div>

<div class="grid">
${[5,6,7,8,9].map(box).join("")}
</div>

<div class="tick">${ticks}</div>
`;

wrap.appendChild(div);

});
}

</script>

</body>
</html>
